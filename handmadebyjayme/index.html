<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAYME M. CARLETON</title>
  
  <link rel="icon" type="image/png" href="https://jaymecarleton.com/wp-content/uploads/2015/11/leaf-only.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    :root {
      --forest: #2D3A2D;     
      --sage: #4F5D4F;       
      --wood: #C2A378;       
      --clay: #E8E2D6;       
      --wall: #F9F7F2;       
      --charcoal: #2C3333;   
      --white: #FFFFFF;
      --border: #e8e4dd;
      --font-header: 'Playfair Display', serif;
      --font-body: 'Inter', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--wall);
      font-family: var(--font-body);
      color: var(--charcoal);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    a { color: var(--wood); text-decoration: none; transition: 0.2s; cursor: pointer; }
    a:hover { color: var(--forest); }

    .site-wrapper { display: flex; min-height: 100vh; }

    /* --- SIDEBAR --- */
    .sidebar {
      width: 280px; background-color: var(--clay); padding: 4rem 2.5rem;
      position: fixed; height: 100vh; display: flex; flex-direction: column;
      border-right: 1px solid rgba(0,0,0,0.05); z-index: 1000; transition: transform 0.3s ease-in-out;
    }

    .sidebar-brand { margin-bottom: 5rem; cursor: pointer; }
    .sidebar-brand h1 {
      font-family: var(--font-header); font-size: 1.6rem; color: var(--forest);
      text-transform: uppercase; letter-spacing: 0.15em; line-height: 1.2; font-weight: 500;
    }

    .nav-links { display: flex; flex-direction: column; gap: 1.75rem; }
    .nav-links a {
      color: var(--charcoal); text-decoration: none; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.15em; font-size: 0.7rem; transition: all 0.3s ease; opacity: 0.5;
    }
    .nav-links a:hover, .nav-links a.active { opacity: 1; color: var(--forest); transform: translateX(4px); }

    /* --- MOBILE HEADER & HAMBURGER --- */
    .mobile-nav-bar { display: none; position: fixed; top: 0; left: 0; right: 0; height: 60px; background: var(--clay); z-index: 900; padding: 0 1.5rem; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(0,0,0,0.05); }
    .mobile-brand { font-family: var(--font-header); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.1em; color: var(--forest); font-weight: 600; }
    .hamburger { background: none; border: none; cursor: pointer; display: flex; flex-direction: column; gap: 5px; padding: 10px; z-index: 1100; }
    .hamburger span { display: block; width: 22px; height: 2px; background: var(--forest); transition: 0.3s; }
    .menu-open .sidebar { transform: translateX(0); }
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 950; }
    .menu-open .sidebar-overlay { display: block; }

    /* --- MAIN CONTENT --- */
    main { flex: 1; margin-left: 280px; padding: 5rem 4rem; max-width: 1400px; transition: opacity 0.3s; }

    /* --- HERO LAYOUTS --- */
    #hero-container { display: none; grid-template-columns: 1.2fr 1.5fr; gap: 5rem; align-items: start; margin-top: 1rem; margin-bottom: 4rem; }
    .profile-card img { width: 100%; border-radius: 100px 30px 100px 30px; display: block; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    .profile-card img.is-logo { width: 128px; height: 128px; border-radius: 50%; mix-blend-mode: multiply; margin: 0 auto; box-shadow: none; }
    
    .hero-text h1 { font-family: var(--font-header); font-size: 2.8rem; color: var(--forest); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1.5rem; font-weight: 400; }
    .hero-text p { font-size: 1.15rem; margin-bottom: 1.5rem; color: #444; }

    .shop-cta { display: inline-block; background-color: var(--forest); color: white; padding: 1.2rem 2.5rem; text-decoration: none; text-transform: uppercase; letter-spacing: 0.2em; font-size: 0.8rem; font-weight: 700; margin-top: 2rem; border-radius: 2px; transition: 0.3s; cursor: pointer; border: none; }
    .shop-cta:hover { background-color: var(--wood); transform: translateY(-2px); }

    .signature { margin-top: 3rem; font-family: var(--font-header); font-weight: 500; color: var(--forest); text-transform: uppercase; font-size: 1.4rem; letter-spacing: 0.1em; }
    .signature small { display: block; font-family: var(--font-body); font-weight: normal; font-size: 0.75rem; letter-spacing: 0.1em; color: var(--sage); margin-top: 8px; }

    /* --- JOURNAL / FEED --- */
    .section-header-flex { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 3.5rem; border-bottom: 2px solid var(--clay); padding-bottom: 1.5rem; }
    .section-title { font-family: var(--font-header); font-size: 2.8rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--forest); font-weight: 400; }

    .post-card { display: grid; grid-template-columns: 280px 1fr; gap: 3rem; background: var(--white); padding: 2.5rem; margin-bottom: 2.5rem; border-radius: 4px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
    .post-thumb { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 2px; background: var(--clay); }
    .post-card h3 { font-family: var(--font-header); font-size: 2rem; color: var(--forest); text-transform: uppercase; margin-bottom: 0.5rem; font-weight: 400; }
    .post-excerpt { color: #666; margin-bottom: 1.5rem; }
    .post-date { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--sage); }

    /* --- PORTFOLIO --- */
    .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem; }
    .portfolio-card { aspect-ratio: 1; overflow: hidden; position: relative; border-radius: 4px; background: var(--clay); }
    .portfolio-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
    .portfolio-card:hover img { transform: scale(1.05); }
    .portfolio-overlay { position: absolute; inset: 0; background: rgba(45,58,45,0.85); display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; padding: 20px; text-align: center; }
    .portfolio-card:hover .portfolio-overlay { opacity: 1; }
    .portfolio-overlay h4 { color: #fff; font-family: var(--font-header); text-transform: uppercase; letter-spacing: 0.1em; }

    /* --- ARTICLE PAGE --- */
    .article-content { max-width: 900px; margin: 0 auto; background: var(--white); padding: 5rem; border-radius: 4px; }
    .article-content h1 { font-family: var(--font-header); font-size: 3rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1rem; color: var(--forest); font-weight: 400; }
    .article-body { font-size: 1.15rem; line-height: 1.8; color: #333; }
    .article-body p { margin-bottom: 1.5rem; }
    .article-body img { display: block; max-width: 100%; height: auto; margin: 3.5rem auto; border-radius: 2px; }

    /* --- RESUME --- */
    .resume-container { max-width: 1000px; margin: 0 auto; background: var(--white); padding: 6rem; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
    .res-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; }
    .res-row { display: grid; grid-template-columns: 240px 1fr; gap: 4rem; margin-bottom: 3rem; align-items: start; }
    .res-label { font-weight: 700; text-transform: uppercase; font-size: 0.95rem; color: var(--charcoal); letter-spacing: 0.05em; }
    .res-content strong { display: block; font-size: 1.1rem; margin-bottom: 2px; }
    .res-content em { font-size: 0.95rem; color: var(--sage); display: block; margin-bottom: 12px; }

    /* --- BACKSTAGE (ADMIN) --- */
    #admin-view { display: none; position: fixed; inset: 0; background: var(--wall); z-index: 5000; padding: 40px; overflow-y: auto; }
    .admin-card { max-width: 1100px; margin: 0 auto; background: #fff; border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); height: 85vh; display: flex; flex-direction: column; }
    .admin-header { background: var(--forest); color: #fff; padding: 25px; display: flex; justify-content: space-between; align-items: center; border-radius: 8px 8px 0 0; }
    .admin-main { display: grid; grid-template-columns: 240px 1fr; flex: 1; overflow: hidden; }
    .admin-sidebar { border-right: 1px solid var(--border); overflow-y: auto; padding: 20px; background: var(--wall); }
    .admin-tab { width: 100%; padding: 15px; background: none; border: 1px solid transparent; cursor: pointer; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: #999; text-align: left; transition: 0.2s; }
    .admin-tab.active { color: var(--forest); border-color: var(--border); background: #fff; }
    .admin-body { padding: 30px; overflow-y: auto; }
    .admin-group { margin-bottom: 20px; }
    .admin-group label { display: block; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; color: var(--sage); margin-bottom: 8px; }
    .admin-group input, .admin-group textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 4px; outline: none; font-family: inherit; font-size: 0.9rem; }
    .admin-group textarea { height: 150px; }
    .admin-actions { padding: 20px 30px; background: var(--wall); text-align: right; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }

    /* Admin Entries UI */
    .admin-item-card { border: 1px solid var(--border); border-radius: 6px; padding: 1.5rem; margin-bottom: 1.5rem; position: relative; background: #fff; }
    .remove-item { position: absolute; top: 1rem; right: 1rem; color: #e11d48; font-size: 0.6rem; font-weight: 700; cursor: pointer; text-transform: uppercase; background: none; border: none; }
    .add-row-btn { width: 100%; padding: 15px; border: 2px dashed var(--border); background: none; color: #999; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; cursor: pointer; margin-bottom: 2rem; transition: 0.2s; }
    .add-row-btn:hover { border-color: var(--forest); color: var(--forest); }

    /* Footer */
    footer { margin-top: 8rem; padding: 4rem 0; border-top: 1px solid var(--border); }
    .copyright { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--sage); margin-bottom: 8px; font-weight: 600; }
    .credit { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.15em; opacity: 0.6; color: var(--forest); }

    @media (max-width: 1024px) {
      .sidebar { transform: translateX(-100%); width: 280px; }
      .mobile-nav-bar { display: flex; }
      main { margin-left: 0; padding: 80px 20px 40px; }
      #hero-container { grid-template-columns: 1fr; gap: 3rem; text-align: center; }
      .post-card { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body id="body-context">

  <div class="mobile-nav-bar">
    <div class="mobile-brand" onclick="switchView('home')">Jayme M. Carleton</div>
    <button class="hamburger" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </button>
  </div>
  <div class="sidebar-overlay" onclick="toggleMenu()"></div>

  <div class="site-wrapper">
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-brand" onclick="switchView('home')">
        <h1>Jayme M.<br>Carleton</h1>
      </div>
      <div class="nav-links">
        <a onclick="switchView('journal')" id="nav-journal">Journal</a>
        <a onclick="switchView('portfolio')" id="nav-portfolio">Portfolio</a>
        <a onclick="switchView('handmade')" id="nav-handmade">Handmade</a>
        <a onclick="switchView('resume')" id="nav-resume">Resume</a>
        <a onclick="switchView('contact')" id="nav-contact">Contact</a>
      </div>
    </nav>

    <main id="main-content">
      <div id="hero-container">
        <div class="profile-card">
          <img id="hero-image" src="" alt="Jayme">
        </div>
        <div class="hero-text" id="hero-text"></div>
      </div>

      <div id="app-root"></div>

      <footer>
        <div class="social-links" style="margin-bottom: 1.5rem;">
          <a href="https://www.linkedin.com/in/jaymecarleton" target="_blank" style="text-transform:uppercase; font-size:0.75rem; font-weight:700; letter-spacing:0.1em;">LinkedIn</a>
        </div>
        <div class="copyright">SECOND NATURE | &copy; 2015-<span id="copy-year">2026</span></div>
        <div class="credit">Developed by <a href="https://minescout.net/ai" target="_blank">Minescout AI</a></div>
      </footer>
    </main>
  </div>

  <!-- Backstage Manager -->
  <div id="admin-view">
    <div class="admin-card">
      <header class="admin-header">
        <h2 style="font-family:'Playfair Display'; font-weight:400; letter-spacing:0.05em;">Backstage Manager</h2>
        <button onclick="closeAdmin()" style="background:none; border:1px solid #fff; color:#fff; cursor:pointer; padding:5px 15px; font-size:0.6rem;">CLOSE</button>
      </header>
      
      <div class="admin-main">
        <aside class="admin-sidebar">
          <div style="font-size:0.6rem; color:#999; text-transform:uppercase; margin-bottom:10px; font-weight:bold;">Pages</div>
          <button class="admin-tab active" onclick="switchAdminTab('welcome', this)">Welcome</button>
          <button class="admin-tab" onclick="switchAdminTab('handmade', this)">Handmade (Intro)</button>
          <button class="admin-tab" onclick="switchAdminTab('contact', this)">Contact</button>
          <button class="admin-tab" onclick="switchAdminTab('resume', this)">Resume</button>
          <button class="admin-tab" onclick="switchAdminTab('journal', this)" style="border-top:1px solid #ddd; margin-top:10px; padding-top:15px;">Entries Archive</button>
        </aside>

        <div class="admin-body">
          <div id="admin-editor-panels"></div>
        </div>
      </div>

      <div class="admin-actions">
        <span id="sync-status" style="font-size:0.65rem; color:#999;">Ready for sync.</span>
        <button class="shop-cta" style="margin-top:0;" id="save-btn" onclick="saveToWorker()">Publish Updates</button>
      </div>
    </div>
  </div>

  <script>
    /* --- CONFIG --- */
    const BACKEND_URL = 'https://backend.tmcarleton11.workers.dev/';
    const SITE_ID = 'handmadebyjayme';
    
    let siteData = {
      welcome: "# Welcome\nMy name is Jayme.",
      handmade: "# Handmade\nWelcome to my studio.",
      contact: "# Let's Connect\nThank you for visiting.",
      resume: "# Professional History",
      journal: [] 
    };

    let adminTab = 'welcome';

    /* --- SPA ENGINE --- */
    async function initSPA() {
      document.getElementById('copy-year').textContent = new Date().getFullYear();
      await fetchSiteData();
      
      window.onpopstate = () => handleRoute();
      handleRoute();
    }

    async function fetchSiteData() {
      try {
        const res = await fetch(BACKEND_URL, { headers: { 'X-Site-Id': SITE_ID } });
        if (res.ok) {
          const d = await res.json();
          siteData = { ...siteData, ...d };
        }
      } catch (e) { console.warn("Fetch failed, using defaults."); }
    }

    function handleRoute() {
      const hash = window.location.hash.replace('#', '') || 'home';
      const root = document.getElementById('app-root');
      const hero = document.getElementById('hero-container');
      const textMount = document.getElementById('hero-text');
      const imgMount = document.getElementById('hero-image');

      root.innerHTML = '';
      hero.style.display = 'none';
      document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));

      if (hash.startsWith('view/')) {
        const slug = hash.split('/')[1];
        const post = siteData.journal.find(p => slugify(p.title) === slug);
        if (post) renderPost(root, post);
        return;
      }

      if (['home', 'handmade', 'contact'].includes(hash)) {
        hero.style.display = 'grid';
        const key = hash === 'home' ? 'welcome' : hash;
        
        if (hash === 'handmade') imgMount.src = "https://jaymecarleton.com/wp-content/uploads/2015/11/leaf-only.png";
        else if (hash === 'contact') imgMount.src = "https://jaymecarleton.com/wp-content/uploads/2015/11/jayme.jpg";
        else imgMount.src = "https://i.postimg.cc/NGX3ZDdw/PXL-20251224-004703169.jpg";

        textMount.innerHTML = marked.parse(siteData[key] || '');
        if (hash === 'handmade') {
          textMount.innerHTML += `<a href="https://etsy.com/shop/HandmadeByJayme" target="_blank" class="shop-cta">Visit Shop on Etsy</a>`;
          renderFeed(root, 'Creation Log', p => p.tags.toLowerCase().includes('handmade'));
        } else if (hash === 'home') {
          textMount.insertAdjacentHTML('beforeend', `<div class="signature">JAYME M. CARLETON<small>CSBA, LEED GREEN ASSOCIATE</small></div>`);
        }
      } else {
        if (hash === 'journal') renderJournal(root);
        else if (hash === 'portfolio') renderPortfolio(root);
        else if (hash === 'resume') renderResume(root);
      }
      window.scrollTo(0, 0);
    }

    function switchView(slug) {
      window.location.hash = slug;
      handleRoute();
    }

    /* --- RENDERING --- */
    function renderJournal(root) {
      root.innerHTML = `<h2 class="section-title">Journal</h2><p style="margin-bottom:3rem; color:var(--sage); font-weight:600; text-transform:uppercase; letter-spacing:0.1em;">Thoughts on sustainable living and design.</p>`;
      siteData.journal.forEach(post => {
        root.innerHTML += `
          <article class="post-card">
            <img src="${post.image}" class="post-thumb" onerror="this.src='https://via.placeholder.com/400?text=Syncing...'">
            <div>
              <span class="post-date">${post.date}</span>
              <h3>${post.title}</h3>
              <p class="post-excerpt">${post.excerpt}</p>
              <a onclick="switchView('view/${slugify(post.title)}')" style="font-weight:700; border-bottom:1px solid;">READ ENTRY ➔</a>
            </div>
          </article>
        `;
      });
    }

    function renderFeed(root, title, filterFn) {
      root.innerHTML += `<h2 class="section-title" style="margin-top:5rem;">${title}</h2>`;
      siteData.journal.filter(filterFn).forEach(post => {
        root.innerHTML += `
          <article class="post-card" style="grid-template-columns:200px 1fr; padding:1.5rem; margin-top:2rem;">
            <img src="${post.image}" class="post-thumb" style="height:200px;" onerror="this.src='https://via.placeholder.com/200?text=Syncing...'">
            <div>
              <h3>${post.title}</h3>
              <p class="post-excerpt" style="font-size:0.9rem;">${post.excerpt}</p>
              <a onclick="switchView('view/${slugify(post.title)}')" style="font-weight:700; font-size:0.75rem;">READ ENTRY ➔</a>
            </div>
          </article>`;
      });
    }

    function renderPortfolio(root) {
      root.innerHTML = `<h2 class="section-title">Portfolio</h2><p style="margin-bottom:3rem; color:var(--sage); font-weight:600; text-transform:uppercase; letter-spacing:0.1em;">Archive of Sustainable Projects.</p>`;
      const portGrid = document.createElement('div');
      portGrid.className = 'portfolio-grid';
      siteData.journal.filter(p => p.tags.toLowerCase().includes('portfolio')).forEach(item => {
        portGrid.innerHTML += `
          <div class="portfolio-card" onclick="switchView('view/${slugify(item.title)}')">
            <img src="${item.image}" onerror="this.src='https://via.placeholder.com/400?text=Syncing...'">
            <div class="portfolio-overlay"><h4>${item.title}</h4></div>
          </div>`;
      });
      root.appendChild(portGrid);
    }

    function renderResume(root) {
      root.innerHTML = `<div class="resume-container">${formatResumeHtml(marked.parse(siteData.resume))}</div>`;
    }

    function renderPost(root, post) {
      root.innerHTML = `
        <div class="article-content">
          <a onclick="window.history.back()" class="back-btn" style="display:inline-block; margin-bottom:2rem; font-size:0.7rem; font-weight:700; text-transform:uppercase; color:var(--wood);">← Back</a>
          <span class="post-date" style="display:block; margin-bottom:1rem;">${post.date}</span>
          <h1 style="font-family:var(--font-header); font-size:3rem; text-transform:uppercase; color:var(--forest); margin-bottom:3rem;">${post.title}</h1>
          <div class="article-body">${marked.parse(post.content)}</div>
        </div>`;
    }

    /* --- ADMIN LOGIC --- */
    window.addEventListener('keydown', e => {
      if (e.shiftKey && e.key.toLowerCase() === 'j') {
        document.getElementById('admin-view').style.display = 'block';
        loadAdminPanel();
      }
    });

    function closeAdmin() { document.getElementById('admin-view').style.display = 'none'; }
    function toggleMenu() { document.body.classList.toggle('menu-open'); }

    function switchAdminTab(slug, btn) {
      document.querySelectorAll('.admin-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      saveAdminState();
      adminTab = slug;
      loadAdminPanel();
    }

    function loadAdminPanel() {
      const container = document.getElementById('admin-editor-panels');
      if (adminTab === 'journal') {
        container.innerHTML = `
          <div style="margin-bottom:2rem;"><p style="font-size:0.75rem; color:var(--sage); font-weight:bold;">Entries Archive</p></div>
          <div id="admin-list-items"></div>
          <button class="add-row-btn" onclick="addJournalItem()">+ Add New Entry</button>
        `;
        renderAdminList();
      } else {
        container.innerHTML = `
          <div class="admin-group">
            <label>Editing: ${adminTab.toUpperCase()}</label>
            <textarea id="admin-field-editor" spellcheck="false" style="height:450px;">${siteData[adminTab] || ''}</textarea>
            <p style="font-size:0.6rem; color:#999; margin-top:10px;">Use Markdown formatting.</p>
          </div>
        `;
      }
    }

    function renderAdminList() {
      const listDiv = document.getElementById('admin-list-items');
      listDiv.innerHTML = siteData.journal.map((item, idx) => `
        <div class="admin-item-card" data-index="${idx}">
          <button class="remove-item" onclick="removeJournalItem(${idx})">Delete</button>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:15px;">
            <div class="admin-group"><label>Title</label><input type="text" class="item-title" value="${item.title}"></div>
            <div class="admin-group"><label>Date</label><input type="text" class="item-date" value="${item.date}"></div>
          </div>
          <div class="admin-group"><label>Image URL</label><input type="text" class="item-image" value="${item.image}"></div>
          <div class="admin-group"><label>Excerpt</label><input type="text" class="item-excerpt" value="${item.excerpt}"></div>
          <div class="admin-group"><label>Tags (e.g. Handmade, Portfolio)</label><input type="text" class="item-tags" value="${item.tags}"></div>
          <div class="admin-group" style="margin-bottom:0;"><label>Content</label><textarea class="item-content" style="height:150px;">${item.content}</textarea></div>
        </div>
      `).join('');
    }

    function addJournalItem() {
      saveAdminState();
      siteData.journal.unshift({ title: "New Entry", date: "", image: "", excerpt: "", content: "", tags: "Handmade" });
      renderAdminList();
    }

    function removeJournalItem(idx) {
      if(!confirm("Erase this entry?")) return;
      siteData.journal.splice(idx, 1);
      renderAdminList();
    }

    function saveAdminState() {
      if (adminTab === 'journal') {
        const cards = Array.from(document.querySelectorAll('.admin-item-card'));
        siteData.journal = cards.map(card => ({
          title: card.querySelector('.item-title').value,
          date: card.querySelector('.item-date').value,
          image: card.querySelector('.item-image').value,
          excerpt: card.querySelector('.item-excerpt').value,
          tags: card.querySelector('.item-tags').value,
          content: card.querySelector('.item-content').value
        }));
      } else {
        const editor = document.getElementById('admin-field-editor');
        if(editor) siteData[adminTab] = editor.value;
      }
    }

    async function saveToWorker() {
      saveAdminState();
      const key = prompt("Enter Minescout Node Key:");
      if (!key) return;
      const status = document.getElementById('sync-status');
      status.innerText = "Syncing...";
      try {
        const res = await fetch(BACKEND_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Site-Id': SITE_ID },
          body: JSON.stringify({ key: key, data: siteData })
        });
        if (res.ok) {
          status.innerText = "Node Synchronized ✓";
          handleRoute();
          setTimeout(() => status.innerText = "Ready.", 3000);
        } else alert("Auth Failed.");
      } catch (e) { alert("Server error."); }
    }

    /* --- HELPERS --- */
    function formatResumeHtml(html) {
      const div = document.createElement('div');
      div.innerHTML = html;
      div.querySelectorAll('h3').forEach(h => {
        const section = h.innerText.toLowerCase();
        if(['education', 'history', 'recognitions', 'certifications'].some(type => section.includes(type))) {
          const list = h.nextElementSibling;
          if(list && list.tagName === 'UL') {
            const grid = document.createElement('div');
            grid.className = 'res-grid';
            list.querySelectorAll('li').forEach(li => {
              const item = document.createElement('div');
              item.innerHTML = li.innerHTML;
              grid.appendChild(item);
            });
            list.replaceWith(grid);
          }
        } else if(section.includes('experience')) {
          let current = h.nextElementSibling;
          while(current && current.tagName !== 'H3') {
            if(current.tagName === 'P' && current.querySelector('strong')) {
              const row = document.createElement('div'); row.className = 'res-row';
              const label = document.createElement('div'); label.className = 'res-label';
              const strong = current.querySelector('strong');
              label.innerHTML = strong.innerHTML;
              const content = document.createElement('div');
              const clone = current.cloneNode(true);
              clone.querySelector('strong').remove();
              if(clone.innerText.trim()) content.appendChild(clone);
              let sibling = current.nextElementSibling;
              while(sibling && !(sibling.tagName === 'P' && sibling.querySelector('strong')) && sibling.tagName !== 'H3') {
                const next = sibling.nextElementSibling;
                content.appendChild(sibling);
                sibling = next;
              }
              row.appendChild(label); row.appendChild(content);
              current.replaceWith(row);
              current = sibling;
            } else current = current.nextElementSibling;
          }
        }
      });
      return div.innerHTML;
    }

    function slugify(text) { return text.toString().toLowerCase().replace(/\s+/g, '-').replace(/[^\w\-]+/g, '').replace(/\-\-+/g, '-').replace(/^-+/, '').replace(/-+$/, ''); }

    window.onload = initSPA;
  </script>
