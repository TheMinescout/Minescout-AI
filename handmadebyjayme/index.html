<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>handmade by jayme</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    /* --- 90s HIP-HOP CSS STYLES --- */
    :root {
      --neon-yellow: #FFDE00;
      --hot-pink: #FF007F;
      --cyan: #00E5FF;
      --black: #111111;
      --white: #FAFAFA;
      
      --font-graffiti: 'Permanent Marker', cursive;
      --font-body: 'Space Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--neon-yellow);
      background-image: radial-gradient(var(--black) 2px, transparent 2px);
      background-size: 30px 30px;
      font-family: var(--font-body);
      color: var(--black);
      line-height: 1.6;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    /* --- HEADER --- */
    header {
      background: var(--black);
      color: var(--cyan);
      padding: 2rem;
      border: 4px solid var(--black);
      box-shadow: 12px 12px 0px var(--cyan);
      text-align: center;
      margin-bottom: 3rem;
      transform: rotate(-1deg);
    }

    header h1 {
      font-family: var(--font-graffiti);
      font-size: clamp(2.5rem, 5vw, 4.5rem);
      letter-spacing: 2px;
      text-transform: uppercase;
      text-shadow: 4px 4px 0px var(--hot-pink);
      line-height: 1.1;
      cursor: pointer;
    }

    /* --- LAYOUT GRID --- */
    .layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 3rem;
    }

    /* --- SIDEBAR (Nav & Profile) --- */
    aside {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    nav {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    nav a {
      background: var(--white);
      color: var(--black);
      text-decoration: none;
      font-weight: 700;
      text-transform: uppercase;
      padding: 15px 20px;
      border: 4px solid var(--black);
      box-shadow: 6px 6px 0px var(--hot-pink);
      transition: all 0.1s ease-in-out;
      text-align: center;
      font-size: 1.1rem;
    }

    nav a:hover, nav a.active {
      transform: translate(4px, 4px);
      box-shadow: 2px 2px 0px var(--hot-pink);
      background: var(--cyan);
    }

    .profile-card {
      background: var(--hot-pink);
      border: 4px solid var(--black);
      box-shadow: 8px 8px 0px var(--black);
      padding: 1.5rem;
      text-align: center;
      transform: rotate(2deg);
    }

    .profile-card img {
      width: 100%;
      border: 4px solid var(--black);
      border-radius: 50%;
      margin-bottom: 1rem;
      filter: grayscale(100%) contrast(120%);
      background: var(--white);
    }

    .profile-card h2 {
      font-family: var(--font-graffiti);
      color: var(--neon-yellow);
      text-shadow: 2px 2px 0px var(--black);
      font-size: 1.8rem;
      line-height: 1.2;
    }

    .profile-card p {
      color: var(--white);
      font-weight: 700;
      font-size: 0.85rem;
      margin-top: 0.5rem;
      background: var(--black);
      padding: 5px;
    }

    /* --- DYNAMIC CONTENT AREA --- */
    main {
      background: var(--white);
      border: 4px solid var(--black);
      box-shadow: 12px 12px 0px var(--black);
      padding: 3rem;
      min-height: 500px;
    }

    .page-title {
      font-family: var(--font-graffiti);
      font-size: 3rem;
      color: var(--black);
      margin-bottom: 2rem;
      text-transform: uppercase;
      text-shadow: 3px 3px 0px var(--cyan);
      border-bottom: 4px solid var(--black);
      display: inline-block;
      padding-right: 20px;
    }

    /* Blog Post Cards (List View) */
    .post-card {
      border: 4px solid var(--black);
      padding: 1.5rem;
      margin-bottom: 2rem;
      background: var(--white);
      box-shadow: 6px 6px 0px var(--neon-yellow);
      transition: all 0.2s ease;
    }

    .post-card:hover {
      transform: translateY(-5px);
      box-shadow: 10px 10px 0px var(--hot-pink);
    }

    .post-card h3 {
      font-family: var(--font-graffiti);
      font-size: 2rem;
      color: var(--cyan);
      text-shadow: 2px 2px 0px var(--black);
      margin-bottom: 0.5rem;
    }

    .post-card .excerpt {
      font-weight: 700;
      margin-bottom: 1rem;
    }

    .btn-read {
      display: inline-block;
      background: var(--black);
      color: var(--white);
      padding: 8px 15px;
      text-decoration: none;
      font-weight: 700;
      text-transform: uppercase;
      border: 2px solid var(--black);
    }
    .btn-read:hover { background: var(--hot-pink); }

    /* Markdown Styling (Single Article View) */
    .article-content h1 { font-family: var(--font-graffiti); font-size: 2.5rem; color: var(--black); background: var(--hot-pink); padding: 5px 15px; border: 4px solid var(--black); display: inline-block; margin-top: 2rem; margin-bottom: 1rem; }
    .article-content h2, .article-content h3 { font-family: var(--font-graffiti); color: var(--cyan); text-shadow: 2px 2px 0px var(--black); margin-top: 1.5rem; margin-bottom: 1rem; }
    .article-content p { margin-bottom: 1.5rem; font-size: 1.1rem; font-weight: 700; }
    .article-content img { max-width: 100%; border: 4px solid var(--black); box-shadow: 8px 8px 0px var(--neon-yellow); margin: 1rem 0; filter: grayscale(20%) contrast(120%); }
    .article-content hr { border: none; border-top: 4px dashed var(--black); margin: 3rem 0; }
    .article-content blockquote { background: var(--black); color: var(--neon-yellow); padding: 1rem 2rem; border-left: 8px solid var(--hot-pink); font-style: italic; margin: 1.5rem 0; }
    .article-content ul, .article-content ol { margin-bottom: 1.5rem; margin-left: 2rem; font-weight: 700; font-size: 1.1rem; }
    .article-content li { margin-bottom: 0.5rem; }

    .back-btn {
      display: inline-block;
      margin-bottom: 2rem;
      font-weight: 700;
      color: var(--hot-pink);
      text-decoration: none;
      text-transform: uppercase;
      border-bottom: 4px solid var(--hot-pink);
    }

    /* --- FOOTER --- */
    footer {
      margin-top: 4rem;
      text-align: center;
      font-weight: 700;
      background: var(--black);
      color: var(--white);
      padding: 2rem;
      border: 4px solid var(--black);
    }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      nav { flex-direction: row; flex-wrap: wrap; }
      nav a { flex: 1; min-width: 120px; }
      .profile-card { transform: rotate(0deg); max-width: 400px; margin: 0 auto; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1 onclick="window.location.hash='#journal'">handmade by jayme</h1>
    </header>

    <div class="layout">
      
      <aside>
        <nav id="main-nav">
          <a href="#journal" class="nav-link">Journal</a>
          <a href="#portfolio" class="nav-link">Portfolio</a>
          <a href="#resume" class="nav-link">Resume</a>
          <a href="#contact" class="nav-link">Contact</a>
        </nav>

        <div class="profile-card">
          <img src="https://i.postimg.cc/NGX3ZDdw/PXL-20251224-004703169.jpg" alt="Jayme">
          <h2>Jayme M. Carleton</h2>
          <p>CSBA, LEED Green Associate</p>
        </div>
      </aside>

      <main id="app-root">
        <h2 class="page-title">Loading...</h2>
        <p>Dropping the needle on the record...</p>
      </main>

    </div>

    <footer>
      <p>Second Nature | Copyright © 2015-2026. All Rights Reserved.</p>
    </footer>
  </div>

  <script>
    // --- GOOGLE DOCS ROUTER LOGIC ---
    
    // Your specific Google Apps Script Web App URL
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz5WP1tULDww98Dic3jsbntYEwhkGlsZKvz_ep_oX241gDrKKtorZjNWrjkHeMdczxP/exec';
    
    let siteData = {
      pages: {},
      posts: []
    };

    async function initApp() {
      try {
        const response = await fetch(APPS_SCRIPT_URL);
        if (!response.ok) throw new Error('Network response failed');
        
        const rawText = await response.text();
        parseGoogleDoc(rawText);
        
        window.addEventListener('hashchange', handleRoute);
        handleRoute();

      } catch (error) {
        document.getElementById('app-root').innerHTML = `
          <h2 class="page-title">System Error</h2>
          <p style="color: var(--hot-pink);">Could not connect to the Google Doc database.</p>
        `;
      }
    }

    function parseGoogleDoc(text) {
      const sections = text.split(/(^#\s+.+$)/m);
      
      for (let i = 1; i < sections.length; i += 2) {
        const titleLine = sections[i];
        const contentBody = sections[i + 1] ? sections[i + 1].trim() : '';
        
        const rawTitle = titleLine.replace(/^#\s+/, '').trim();
        const slug = slugify(rawTitle);

        if (slug === 'instructions') continue;

        const htmlContent = marked.parse(contentBody);

        if (['portfolio', 'resume', 'contact'].includes(slug)) {
          siteData.pages[slug] = { title: rawTitle, content: htmlContent };
        } else {
          const plainText = contentBody.replace(/[#*\[\]\(\)>_]/g, ''); 
          const excerpt = plainText.substring(0, 150) + '...';
          
          siteData.posts.push({ title: rawTitle, slug: slug, content: htmlContent, excerpt: excerpt });
        }
      }
      
      siteData.posts.reverse();
    }

    function handleRoute() {
      const hash = window.location.hash.replace('#', '') || 'journal';
      const root = document.getElementById('app-root');
      
      document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
      const activeLink = document.querySelector(`a[href="#${hash}"]`);
      if(activeLink) activeLink.classList.add('active');

      if (hash === 'journal') {
        renderJournal(root);
      } else if (siteData.pages[hash]) {
        renderPage(root, siteData.pages[hash]);
      } else {
        const post = siteData.posts.find(p => p.slug === hash);
        if (post) {
          renderPost(root, post);
        } else {
          root.innerHTML = `<h2 class="page-title">404</h2><p>Track not found.</p>`;
        }
      }
      
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderJournal(root) {
      let html = `<h2 class="page-title">The Journal</h2>`;
      
      if (siteData.posts.length === 0) {
        html += `<p>No tracks dropped yet. Check back soon.</p>`;
      } else {
        siteData.posts.forEach(post => {
          html += `
            <article class="post-card">
              <h3>${post.title}</h3>
              <p class="excerpt">${post.excerpt}</p>
              <a href="#${post.slug}" class="btn-read">Drop the Needle ➔</a>
            </article>
          `;
        });
      }
      root.innerHTML = html;
    }

    function renderPage(root, page) {
      root.innerHTML = `
        <h2 class="page-title">${page.title}</h2>
        <div class="article-content">${page.content}</div>
      `;
    }

    function renderPost(root, post) {
      root.innerHTML = `
        <a href="#journal" class="back-btn">⇦ Back to Tracks</a>
        <div class="article-content">
          <h1 style="margin-top:0;">${post.title}</h1>
          ${post.content}
        </div>
      `;
    }

    function slugify(text) {
      return text.toString().toLowerCase()
        .replace(/\s+/g, '-')
        .replace(/[^\w\-]+/g, '')
        .replace(/\-\-+/g, '-')
        .replace(/^-+/, '')
        .replace(/-+$/, '');
    }

    window.onload = initApp;
  </script>
</body>
</html>
