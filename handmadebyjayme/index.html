<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAYME M. CARLETON | Art & Environment</title>
  
  <link rel="icon" type="image/png" href="https://jaymecarleton.com/wp-content/uploads/2015/11/leaf-only.png">

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --forest: #2D3A2D;     
      --sage: #4F5D4F;       
      --wood: #C2A378;       
      --clay: #E8E2D6;       
      --wall: #F9F7F2;       
      --charcoal: #2C3333;   
      --white: #FFFFFF;
      --border: #e8e4dd;
      --sidebar-width: 280px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--wall);
      font-family: 'Inter', sans-serif;
      color: var(--charcoal);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* --- SIDEBAR --- */
    .sidebar {
      width: var(--sidebar-width); background-color: var(--clay); padding: 4rem 2.5rem;
      position: fixed; height: 100vh; display: flex; flex-direction: column;
      border-right: 1px solid rgba(0,0,0,0.05); z-index: 1000;
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .brand { margin-bottom: 5rem; cursor: pointer; }
    .brand h1 {
      font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--forest);
      text-transform: uppercase; letter-spacing: 0.15em; line-height: 1.2; font-weight: 500;
    }

    .nav-list { display: flex; flex-direction: column; gap: 1.75rem; }
    .nav-btn {
      background: none; border: none; text-align: left;
      color: var(--charcoal); font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.15em; font-size: 0.7rem; cursor: pointer; opacity: 0.5; transition: 0.3s;
    }
    .nav-btn.active { opacity: 1; color: var(--forest); transform: translateX(5px); }

    /* --- MAIN --- */
    main { margin-left: var(--sidebar-width); padding: 5rem 4rem; max-width: 1400px; min-height: 100vh; }

    /* --- HERO --- */
    .hero-grid { display: grid; grid-template-columns: 1.2fr 1.5fr; gap: 5rem; align-items: start; }
    .hero-img-wrap img { width: 100%; border-radius: 100px 30px 100px 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
    .hero-text h2 { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--forest); text-transform: uppercase; margin-bottom: 1.5rem; }
    .hero-text p { font-size: 1.1rem; color: #444; white-space: pre-wrap; }

    /* --- JOURNAL / GALLERY --- */
    .section-title { font-family: 'Playfair Display', serif; font-size: 2.8rem; text-transform: uppercase; color: var(--forest); margin-bottom: 3rem; border-bottom: 2px solid var(--clay); padding-bottom: 1rem; }
    .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 3rem; }
    .photo-card { background: var(--white); padding: 15px; border-radius: 4px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
    .photo-card img { width: 100%; aspect-ratio: 4/3; object-fit: cover; }
    .photo-card h3 { font-family: 'Playfair Display', serif; text-align: center; margin-top: 15px; color: var(--forest); text-transform: uppercase; font-size: 0.9rem; letter-spacing: 0.1em; }

    /* --- SMART ROWS (Resume/Portfolio) --- */
    .res-row { display: grid; grid-template-columns: 240px 1fr; gap: 4rem; margin-bottom: 3rem; }
    .res-label { font-weight: 700; text-transform: uppercase; font-size: 0.95rem; color: var(--charcoal); letter-spacing: 0.05em; border-left: 4px solid var(--wood); padding-left: 15px; }
    .res-content { white-space: pre-wrap; color: #444; }

    /* --- ADMIN PANEL (Fern Style) --- */
    .admin-card { background: white; border-radius: 8px; box-shadow: 0 30px 80px rgba(0,0,0,0.15); width: 100%; max-width: 1200px; overflow: hidden; }
    .admin-header { background: var(--forest); color: white; padding: 2rem; display: flex; justify-content: space-between; align-items: center; }
    .admin-nav { display: flex; background: var(--clay); padding: 0 1rem; border-bottom: 1px solid #ddd; }
    .admin-nav-btn { background: none; border: none; padding: 1.2rem 1.5rem; font-family: 'Space Mono', monospace; font-size: 11px; text-transform: uppercase; cursor: pointer; border-bottom: 3px solid transparent; }
    .admin-nav-btn.active { border-bottom-color: var(--forest); color: var(--forest); font-weight: 700; }
    .admin-content { padding: 3.5rem; background: #fafafa; max-height: 70vh; overflow-y: auto; }
    .input-box { background: white; border: 1px solid #eee; padding: 2rem; margin-bottom: 2rem; border-radius: 8px; position: relative; }
    .input-row label { display: block; font-family: 'Space Mono', monospace; font-size: 10px; text-transform: uppercase; color: var(--wood); margin-bottom: 8px; font-weight: 700; }
    .input-row input, .input-row textarea { width: 100%; padding: 14px; border: 1.5px solid #eee; border-radius: 4px; margin-bottom: 1rem; font-family: inherit; font-size: 1rem; }
    .btn-save { background: var(--forest); color: white; border: none; padding: 1.5rem; width: 100%; font-family: 'Space Mono'; font-weight: bold; text-transform: uppercase; cursor: pointer; font-size: 12px; }

    @media (max-width: 1024px) {
      .sidebar { transform: translateX(-100%); position: fixed; }
      main { margin-left: 0; padding: 3rem 1.5rem; }
      .hero-grid, .res-row { grid-template-columns: 1fr; gap: 2rem; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const SITE_ID = "handmadebyjayme"; 
    const WORKER_URL = "https://backend.tmcarleton11.workers.dev/"; 

    // --- REUSABLE VIEW COMPONENTS ---
    const Hero = ({ data }) => (
      <div className="hero-grid">
        <div className="hero-img-wrap">
          <img src={data?.image} alt="Jayme Profile" />
        </div>
        <div className="hero-text">
          <h2>{data?.title}</h2>
          <p>{data?.text}</p>
        </div>
      </div>
    );

    const Gallery = ({ title, items }) => (
      <div>
        <h2 className="section-title">{title}</h2>
        <div className="photo-grid">
          {items?.map((item, i) => (
            <div key={i} className="photo-card">
              <img src={item.url} alt={item.title} />
              <h3>{item.title}</h3>
            </div>
          ))}
        </div>
      </div>
    );

    const SmartGrid = ({ title, items }) => (
      <div>
        <h2 className="section-title">{title}</h2>
        {items?.map((item, i) => (
          <div key={i} className="res-row">
            <div className="res-label">{item.label}</div>
            <div className="res-content">{item.content}</div>
          </div>
        ))}
      </div>
    );

    // --- MAIN APP ---
    const App = () => {
      const [view, setView] = useState('home');
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [adminTab, setAdminTab] = useState('home');
      const [adminKey, setAdminKey] = useState("");
      const [isAuthed, setIsAuthed] = useState(false);

      useEffect(() => {
        fetch(WORKER_URL, { headers: { 'X-Site-Id': SITE_ID } })
          .then(res => res.json())
          .then(d => { setData(d); setLoading(false); })
          .catch(e => { console.error("Sync Error:", e); setLoading(false); });

        if (window.location.hash === "#admin") setView('admin');
      }, []);

      const saveChanges = async () => {
        const response = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Site-Id': SITE_ID },
          body: JSON.stringify({ key: adminKey, data: data })
        });
        if (response.ok) alert("Archive Deployed Successfully.");
        else alert("Verification Failed.");
      };

      if (loading) return <div style={{padding:'5rem', textAlign:'center', fontFamily:'Playfair Display', color:'var(--wood)'}}>Synchronizing Jayme's Archive...</div>;

      return (
        <div style={{ display: 'flex' }}>
          {view !== 'admin' && (
            <aside className="sidebar">
              <div className="brand" onClick={() => setView('home')}>
                <h1>Jayme M.<br/>Carleton</h1>
              </div>
              <nav className="nav-list">
                {['home', 'journal', 'portfolio', 'resume', 'about'].map(tab => (
                  <button key={tab} onClick={() => setView(tab)} className={`nav-btn ${view === tab ? 'active' : ''}`}>
                    {tab}
                  </button>
                ))}
              </nav>
            </aside>
          )}

          <main style={view === 'admin' ? {marginLeft: 0, width: '100%', display: 'flex', justifyContent: 'center', background: '#eee'} : {}}>
            {view === 'admin' ? (
              <AdminPanel 
                data={data} setData={setData} 
                adminTab={adminTab} setAdminTab={setAdminTab}
                isAuthed={isAuthed} setIsAuthed={setIsAuthed}
                adminKey={adminKey} setAdminKey={setAdminKey}
                saveChanges={saveChanges} exit={() => setView('home')}
              />
            ) : (
              <div>
                {view === 'home' && <Hero data={data.welcome} />}
                {view === 'about' && <Hero data={data.about} />}
                {view === 'journal' && <Gallery title="Journal" items={data.photos} />}
                {view === 'portfolio' && <SmartGrid title="Portfolio" items={data.resume} />}
                {view === 'resume' && <SmartGrid title="Resume" items={data.skills} />}
              </div>
            )}
          </main>
        </div>
      );
    };

    // --- ADMIN COMPONENT (Fern Backend Logic) ---
    const AdminPanel = ({ data, setData, adminTab, setAdminTab, isAuthed, setIsAuthed, adminKey, setAdminKey, saveChanges, exit }) => {
      const addItem = (target) => {
        const newItem = target === 'photos' ? { title: "New Entry", url: "" } : { label: "New Label", content: "Details..." };
        setData({ ...data, [target]: [newItem, ...(data[target] || [])] });
      };

      const updateItem = (target, index, field, value) => {
        const newList = [...data[target]];
        newList[index][field] = value;
        setData({ ...data, [target]: newList });
      };

      const removeItem = (target, index) => {
        setData({ ...data, [target]: data[target].filter((_, i) => i !== index) });
      };

      return (
        <div className="admin-card">
          <header className="admin-header">
            <h2>BACKSTAGE | {SITE_ID.toUpperCase()}</h2>
            <button onClick={exit} style={{background:'white', border:'none', padding:'8px 15px', borderRadius:'4px', fontWeight:'700', cursor:'pointer'}}>EXIT</button>
          </header>

          {!isAuthed ? (
            <div style={{padding: '4rem', background: 'white'}}>
              <div className="input-row">
                <label>Archive Access Key</label>
                <input type="password" value={adminKey} onChange={e => setAdminKey(e.target.value)} onKeyDown={e => e.key === 'Enter' && setIsAuthed(true)} />
              </div>
              <button className="btn-save" onClick={() => setIsAuthed(true)}>Verify Archive Access</button>
            </div>
          ) : (
            <div>
              <nav className="admin-nav">
                {['home', 'journal', 'portfolio', 'resume', 'about'].map(t => (
                  <button key={t} onClick={() => setAdminTab(t)} className={`admin-nav-btn ${adminTab === t ? 'active' : ''}`}>{t}</button>
                ))}
              </nav>
              <div className="admin-content">
                {(adminTab === 'home' || adminTab === 'about') && (
                  <div className="input-box">
                    <div className="input-row">
                      <label>Headline</label>
                      <input value={data[adminTab === 'home' ? 'welcome' : 'about']?.title} onChange={e => setData({...data, [adminTab === 'home' ? 'welcome' : 'about']: {...data[adminTab === 'home' ? 'welcome' : 'about'], title: e.target.value}})} />
                    </div>
                    <div className="input-row">
                      <label>Narrative Text</label>
                      <textarea rows="10" value={data[adminTab === 'home' ? 'welcome' : 'about']?.text} onChange={e => setData({...data, [adminTab === 'home' ? 'welcome' : 'about']: {...data[adminTab === 'home' ? 'welcome' : 'about'], text: e.target.value}})} />
                    </div>
                    <div className="input-row">
                      <label>Image URL</label>
                      <input value={data[adminTab === 'home' ? 'welcome' : 'about']?.image} onChange={e => setData({...data, [adminTab === 'home' ? 'welcome' : 'about']: {...data[adminTab === 'home' ? 'welcome' : 'about'], image: e.target.value}})} />
                    </div>
                  </div>
                )}

                {adminTab === 'journal' && (
                  <section>
                    <button onClick={() => addItem('photos')} style={{marginBottom:'1rem'}}>+ Add Photo Entry</button>
                    {data.photos.map((p, i) => (
                      <div key={i} className="input-box">
                        <button onClick={() => removeItem('photos', i)} style={{position:'absolute', right:'1rem', top:'1rem', color:'red', border:'none', background:'none', cursor:'pointer'}}>Remove</button>
                        <div className="input-row"><label>Title</label><input value={p.title} onChange={e => updateItem('photos', i, 'title', e.target.value)} /></div>
                        <div className="input-row"><label>Image URL</label><input value={p.url} onChange={e => updateItem('photos', i, 'url', e.target.value)} /></div>
                      </div>
                    ))}
                  </section>
                )}

                {(adminTab === 'portfolio' || adminTab === 'resume') && (
                  <section>
                    <button onClick={() => addItem(adminTab === 'portfolio' ? 'resume' : 'skills')} style={{marginBottom:'1rem'}}>+ Add Data Row</button>
                    {data[adminTab === 'portfolio' ? 'resume' : 'skills'].map((item, i) => (
                      <div key={i} className="input-box">
                        <button onClick={() => removeItem(adminTab === 'portfolio' ? 'resume' : 'skills', i)} style={{position:'absolute', right:'1rem', top:'1rem', color:'red', border:'none', background:'none', cursor:'pointer'}}>Remove</button>
                        <div className="input-row"><label>Label</label><input value={item.label} onChange={e => updateItem(adminTab === 'portfolio' ? 'resume' : 'skills', i, 'label', e.target.value)} /></div>
                        <div className="input-row"><label>Content Details</label><textarea rows="4" value={item.content} onChange={e => updateItem(adminTab === 'portfolio' ? 'resume' : 'skills', i, 'content', e.target.value)} /></div>
                      </div>
                    ))}
                  </section>
                )}
              </div>
              <div style={{padding:'2rem', background:'white'}}>
                <button className="btn-save" onClick={saveChanges}>Deploy Live Updates</button>
              </div>
            </div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
