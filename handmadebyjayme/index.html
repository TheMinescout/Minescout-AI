<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAYME M. CARLETON</title>
  
  <link rel="icon" type="image/png" href="https://jaymecarleton.com/wp-content/uploads/2015/11/leaf-only.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    :root {
      --forest: #2D3A2D; --sage: #4F5D4F; --wood: #C2A378; --clay: #E8E2D6;
      --wall: #F9F7F2; --charcoal: #2C3333; --white: #FFFFFF; --border: #e8e4dd;
      --font-header: 'Playfair Display', serif; --font-body: 'Inter', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: var(--wall); font-family: var(--font-body); color: var(--charcoal); line-height: 1.6; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
    a { color: var(--wood); text-decoration: none; transition: 0.2s; }
    a:hover { color: var(--forest); }

    .site-wrapper { display: flex; min-height: 100vh; }
    .sidebar { width: 280px; background-color: var(--clay); padding: 4rem 2.5rem; position: fixed; height: 100vh; display: flex; flex-direction: column; border-right: 1px solid rgba(0,0,0,0.05); z-index: 1000; }
    .sidebar-brand { margin-bottom: 5rem; cursor: pointer; }
    .sidebar-brand h1 { font-family: var(--font-header); font-size: 1.6rem; color: var(--forest); text-transform: uppercase; letter-spacing: 0.15em; line-height: 1.2; font-weight: 500; }
    .nav-links { display: flex; flex-direction: column; gap: 1.75rem; }
    .nav-links button { background: none; border: none; text-align: left; color: var(--charcoal); font-weight: 600; text-transform: uppercase; letter-spacing: 0.15em; font-size: 0.7rem; transition: 0.3s; opacity: 0.5; cursor: pointer; }
    .nav-links button.active { opacity: 1; color: var(--forest); transform: translateX(4px); }

    main { flex: 1; margin-left: 280px; padding: 5rem 4rem; max-width: 1400px; }
    #hero-container { display: grid; grid-template-columns: 1.2fr 1.5fr; gap: 5rem; align-items: start; margin-top: 1rem; }
    .profile-card img { width: 100%; border-radius: 100px 30px 100px 30px; display: block; }
    .profile-card img.is-logo { width: 128px; height: 128px; border-radius: 50%; mix-blend-mode: multiply; margin: 0 auto; }
    .hero-text h2 { font-family: var(--font-header); font-size: 2.5rem; color: var(--forest); text-transform: uppercase; margin-bottom: 1.5rem; }

    .section-header-flex { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 3.5rem; border-bottom: 2px solid var(--clay); padding-bottom: 1.5rem; }
    .section-title { font-family: var(--font-header); font-size: 2.8rem; text-transform: uppercase; color: var(--forest); }
    .filter-pills { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .pill { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; padding: 8px 16px; border: 1px solid var(--border); border-radius: 50px; cursor: pointer; background: var(--white); transition: 0.2s; }
    .pill.active { background: var(--forest); color: var(--white); border-color: var(--forest); }

    .post-card { display: grid; grid-template-columns: 280px 1fr; gap: 3rem; background: var(--white); padding: 2.5rem; margin-bottom: 2.5rem; border-radius: 4px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
    .post-thumb { width: 100%; height: 200px; object-fit: cover; border-radius: 2px; background: var(--clay); }

    .resume-container { max-width: 1000px; margin: 0 auto; background: var(--white); padding: 6rem; border-radius: 4px; }
    .res-row { display: grid; grid-template-columns: 240px 1fr; gap: 4rem; margin-bottom: 3rem; }
    .res-label { font-weight: 700; text-transform: uppercase; font-size: 0.95rem; color: var(--charcoal); border-left: 4px solid var(--wood); padding-left: 15px; }

    /* Admin Styles */
    #admin-root { position: fixed; inset: 0; z-index: 9999; background: #eee; overflow-y: auto; padding: 2rem 0; display: none; }
    .admin-card { background: white; width: 95%; max-width: 1100px; margin: 0 auto; border-radius: 8px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); overflow: hidden; }
    .admin-header { background: var(--forest); color: white; padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; }
    .admin-nav { display: flex; background: #f1f3f1; border-bottom: 1px solid #ddd; overflow-x: auto; }
    .admin-nav-btn { background: none; border: none; padding: 1rem 1.5rem; font-family: 'Space Mono', monospace; font-size: 11px; text-transform: uppercase; cursor: pointer; }
    .admin-nav-btn.active { color: var(--forest); font-weight: 700; border-bottom: 3px solid var(--forest); }
    .admin-content { padding: 2rem; background: #fafafa; }
    .input-box { background: white; border: 1px solid #eee; padding: 1.5rem; margin-bottom: 1rem; border-radius: 6px; position: relative; }
    .input-row label { display: block; font-family: 'Space Mono', monospace; font-size: 10px; color: var(--wood); margin-bottom: 5px; font-weight: 700; text-transform: uppercase; }
    .input-row input, .input-row textarea { width: 100%; padding: 10px; border: 1.5px solid #eee; border-radius: 4px; font-family: inherit; font-size: 14px; }
    .btn-save { background: var(--forest); color: white; border: none; padding: 1rem; width: 100%; font-family: 'Space Mono'; font-weight: bold; text-transform: uppercase; cursor: pointer; }

    @media (max-width: 1024px) { .sidebar { display: none; } main { margin-left: 0; padding: 2rem; } .hero-grid, .post-card, .res-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <div id="admin-root"></div>

  <div id="frontend-root">
    <div class="site-wrapper">
      <nav class="sidebar">
        <div class="sidebar-brand" onclick="window.location.pathname='/'"><h1>Jayme M.<br>Carleton</h1></div>
        <div class="nav-links">
          <button id="nav-home" onclick="navigateTo('/')">Home</button>
          <button id="nav-journal" onclick="navigateTo('/journal/')">Journal</button>
          <button id="nav-portfolio" onclick="navigateTo('/portfolio/')">Portfolio</button>
          <button id="nav-handmade" onclick="navigateTo('/handmade/')">Handmade</button>
          <button id="nav-resume" onclick="navigateTo('/resume/')">Resume</button>
          <button id="nav-contact" onclick="navigateTo('/contact/')">Contact</button>
        </div>
      </nav>

      <main>
        <div id="hero-container">
          <div class="profile-card"><img id="hero-image" src="" alt=""></div>
          <div class="hero-text" id="hero-target"></div>
        </div>
        <div id="app-root"></div>
        <footer style="margin-top: 5rem; padding-top: 3rem; border-top: 1px solid #eee;">
          <div class="copyright">SECOND NATURE | &copy; 2015-2026. ALL RIGHTS RESERVED.</div>
          <div class="credit">Modernized by <a href="https://minescout.net/ai" target="_blank">Minescout AI</a></div>
        </footer>
      </main>
    </div>
  </div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const WORKER_URL = "https://backend.tmcarleton11.workers.dev/"; 
    const SITE_ID = "handmadebyjayme"; 

    let globalData = null;
    let currentFilter = 'all';

    window.navigateTo = (url) => { window.history.pushState(null, null, url); handleRoute(); };

    async function initApp() {
      const response = await fetch(WORKER_URL, { headers: { 'X-Site-Id': SITE_ID } });
      globalData = await response.json();
      
      if (window.location.hash === "#admin") {
        document.getElementById('frontend-root').style.display = 'none';
        document.getElementById('admin-root').style.display = 'block';
      }
      handleRoute();
    }

    function handleRoute() {
      const path = window.location.pathname;
      const slug = path.replace(/^\/|\/$/g, '').split('/').pop() || 'home';
      const root = document.getElementById('app-root');
      const hero = document.getElementById('hero-container');
      const target = document.getElementById('hero-target');
      const img = document.getElementById('hero-image');

      document.querySelectorAll('.nav-links button').forEach(b => b.classList.remove('active'));
      const btn = document.getElementById('nav-' + (slug || 'home'));
      if(btn) btn.classList.add('active');

      if (['home', '', 'handmade', 'contact'].includes(slug)) {
        const key = (slug === 'home' || slug === '') ? 'welcome' : slug;
        root.innerHTML = '';
        if (globalData?.pages?.[key]) {
          hero.style.display = 'grid';
          img.src = globalData.pages[key].image || "";
          img.className = slug === 'handmade' ? 'is-logo' : '';
          target.innerHTML = `<h2>${globalData.pages[key].title || ''}</h2>` + marked.parse(globalData.pages[key].content || '');
        }
      } else {
        hero.style.display = 'none';
        if (slug === 'journal') renderJournal(root);
        else if (slug === 'portfolio' || slug === 'resume') renderGrid(root, slug);
      }
    }

    function renderJournal(root) {
      const tags = Array.from(new Set(globalData.posts?.flatMap(p => p.category?.split(',').map(t => t.trim())) || [])).sort();
      root.innerHTML = `<div class="section-header-flex"><h2 class="section-title">Journal</h2><div class="filter-pills"><span class="pill ${currentFilter==='all'?'active':''}" onclick="setFilter('all')">All</span>${tags.map(t => `<span class="pill ${currentFilter===t?'active':''}" onclick="setFilter('${t}')">${t}</span>`).join('')}</div></div><div id="posts"></div>`;
      const pDiv = document.getElementById('posts');
      const filtered = currentFilter === 'all' ? globalData.posts : globalData.posts.filter(p => p.category?.includes(currentFilter));
      pDiv.innerHTML = filtered?.map(p => `<article class="post-card"><img src="${p.image}" class="post-thumb"><div><span style="font-size:11px; font-weight:700; color:var(--sage); text-transform:uppercase;">${p.date}</span><h3>${p.title}</h3><p>${p.content?.substring(0, 200)}...</p></div></article>`).join('') || '';
    }

    window.setFilter = (t) => { currentFilter = t; renderJournal(document.getElementById('app-root')); };

    function renderGrid(root, slug) {
      const items = globalData[slug] || [];
      root.innerHTML = `<div class="resume-container"><h2 class="section-title">${slug}</h2>${items.map(i => `<div class="res-row"><div class="res-label">${i.label}</div><div class="res-content">${marked.parse(i.content || '')}</div></div>`).join('')}</div>`;
    }

    const AdminApp = () => {
      const [data, setData] = useState(null);
      const [tab, setTab] = useState('welcome');
      const [key, setKey] = useState("");
      const [authed, setAuthed] = useState(false);

      useEffect(() => { fetch(WORKER_URL, { headers: { 'X-Site-Id': SITE_ID } }).then(r => r.json()).then(setData); }, []);

      const save = async () => {
        await fetch(WORKER_URL, { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Site-Id': SITE_ID }, body: JSON.stringify({ key, data }) });
        alert("Archive Updated.");
      };

      if (!data) return null;

      return (
        <div className="admin-card">
          <div className="admin-header"><h2>BACKSTAGE</h2><button onClick={() => window.location.hash=""}>EXIT</button></div>
          {!authed ? (
            <div style={{padding:'3rem'}}><input type="password" placeholder="Key" onChange={e=>setKey(e.target.value)} style={{width:'100%', padding:'15px', marginBottom:'1rem'}}/><button className="btn-save" onClick={()=>setAuthed(true)}>Verify</button></div>
          ) : (
            <div>
              <nav className="admin-nav">{['welcome', 'handmade', 'contact', 'posts', 'portfolio', 'resume'].map(t => <button key={t} onClick={()=>setTab(t)} className={`admin-nav-btn ${tab===t?'active':''}`}>{t}</button>)}</nav>
              <div className="admin-content">
                {['welcome', 'handmade', 'contact'].includes(tab) && (
                  <div className="input-box">
                    <div className="input-row"><label>Image URL</label><input value={data.pages?.[tab]?.image || ''} onChange={e=>{let d={...data}; d.pages[tab].image=e.target.value; setData(d);}}/></div>
                    <div className="input-row"><label>Title</label><input value={data.pages?.[tab]?.title || ''} onChange={e=>{let d={...data}; d.pages[tab].title=e.target.value; setData(d);}}/></div>
                    <div className="input-row"><label>Content (Markdown)</label><textarea rows="10" value={data.pages?.[tab]?.content || ''} onChange={e=>{let d={...data}; d.pages[tab].content=e.target.value; setData(d);}}/></div>
                  </div>
                )}
                {tab === 'posts' && (
                  <div>
                    <button onClick={()=>{let d={...data}; d.posts.unshift({title:"New", date:"2026", content:"", image:"", category:""}); setData(d);}}>+ Add Post</button>
                    {data.posts?.map((p, i) => (
                      <div key={i} className="input-box">
                        <button onClick={()=>{let d={...data}; d.posts.splice(i,1); setData(d);}} style={{float:'right', color:'red'}}>Remove</button>
                        <div className="input-row"><label>Title</label><input value={p.title} onChange={e=>{let d={...data}; d.posts[i].title=e.target.value; setData(d);}}/></div>
                        <div className="input-row"><label>Date</label><input value={p.date} onChange={e=>{let d={...data}; d.posts[i].date=e.target.value; setData(d);}}/></div>
                        <div className="input-row"><label>Category</label><input value={p.category} onChange={e=>{let d={...data}; d.posts[i].category=e.target.value; setData(d);}}/></div>
                        <div className="input-row"><label>Image URL</label><input value={p.image} onChange={e=>{let d={...data}; d.posts[i].image=e.target.value; setData(d);}}/></div>
                        <div className="input-row"><label>Content</label><textarea value={p.content} onChange={e=>{let d={...data}; d.posts[i].content=e.target.value; setData(d);}}/></div>
                      </div>
                    ))}
                  </div>
                )}
                {['portfolio', 'resume'].includes(tab) && (
                  <div>
                    <button onClick={()=>{let d={...data}; d[tab].unshift({label:"New", content:""}); setData(d);}}>+ Add Section</button>
                    {data[tab]?.map((item, i) => (
                      <div key={i} className="input-box">
                        <button onClick={()=>{let d={...data}; d[tab].splice(i,1); setData(d);}} style={{float:'right', color:'red'}}>Remove</button>
                        <div className="input-row"><label>Label</label><input value={item.label} onChange={e=>{let d={...data}; d[tab][i].label=e.target.value; setData(d);}}/></div>
                        <div className="input-row"><label>Content</label><textarea value={item.content} onChange={e=>{let d={...data}; d[tab][i].content=e.target.value; setData(d);}}/></div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
              <button className="btn-save" onClick={save}>Sync to Live Site</button>
            </div>
          )}
        </div>
      );
    };

    initApp();
    const adminRoot = ReactDOM.createRoot(document.getElementById('admin-root'));
    adminRoot.render(<AdminApp />);
    window.addEventListener('popstate', handleRoute);
  </script>
</body>
</html>
