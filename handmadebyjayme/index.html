<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAYME M. CARLETON</title>
  
  <link rel="icon" type="image/png" href="https://jaymecarleton.com/wp-content/uploads/2015/11/leaf-only.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    :root {
      --forest: #2D3A2D; --sage: #4F5D4F; --wood: #C2A378; --clay: #E8E2D6;
      --wall: #F9F7F2; --charcoal: #2C3333; --white: #FFFFFF; --border: #e8e4dd;
      --font-header: 'Playfair Display', serif; --font-body: 'Inter', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: var(--wall); font-family: var(--font-body); color: var(--charcoal); line-height: 1.6; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
    
    .site-wrapper { display: flex; min-height: 100vh; }
    .sidebar { width: 280px; background-color: var(--clay); padding: 4rem 2.5rem; position: fixed; height: 100vh; display: flex; flex-direction: column; border-right: 1px solid rgba(0,0,0,0.05); z-index: 1000; }
    .sidebar-brand { margin-bottom: 5rem; cursor: pointer; }
    .sidebar-brand h1 { font-family: var(--font-header); font-size: 1.6rem; color: var(--forest); text-transform: uppercase; letter-spacing: 0.15em; line-height: 1.2; font-weight: 500; }
    .nav-links { display: flex; flex-direction: column; gap: 1.75rem; }
    .nav-links button { background: none; border: none; text-align: left; color: var(--charcoal); font-weight: 600; text-transform: uppercase; letter-spacing: 0.15em; font-size: 0.7rem; transition: 0.3s; opacity: 0.5; cursor: pointer; outline: none; }
    .nav-links button.active { opacity: 1; color: var(--forest); transform: translateX(4px); }

    main { flex: 1; margin-left: 280px; padding: 5rem 4rem; max-width: 1400px; }
    #hero-container { display: grid; grid-template-columns: 1.2fr 1.5fr; gap: 5rem; align-items: start; margin-top: 1rem; }
    .profile-card img { width: 100%; border-radius: 100px 30px 100px 30px; display: block; }
    .profile-card img.is-logo { width: 128px; height: 128px; border-radius: 50%; mix-blend-mode: multiply; margin: 0 auto; }
    .hero-text h2 { font-family: var(--font-header); font-size: 2.5rem; color: var(--forest); text-transform: uppercase; margin-bottom: 1.5rem; }
    .hero-text-body { white-space: pre-wrap; }

    .section-header-flex { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 3.5rem; border-bottom: 2px solid var(--clay); padding-bottom: 1.5rem; }
    .section-title { font-family: var(--font-header); font-size: 2.8rem; text-transform: uppercase; color: var(--forest); }
    .filter-pills { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .pill { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; padding: 8px 16px; border: 1px solid var(--border); border-radius: 50px; cursor: pointer; background: var(--white); transition: 0.2s; }
    .pill.active { background: var(--forest); color: var(--white); border-color: var(--forest); }

    .post-card { display: grid; grid-template-columns: 280px 1fr; gap: 3rem; background: var(--white); padding: 2.5rem; margin-bottom: 2.5rem; border-radius: 4px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
    .post-thumb { width: 100%; height: 200px; object-fit: cover; border-radius: 2px; background: var(--clay); }
    .post-content-text { white-space: pre-wrap; color: #444; }

    .res-row { display: grid; grid-template-columns: 240px 1fr; gap: 4rem; margin-bottom: 3rem; }
    .res-label { font-weight: 700; text-transform: uppercase; font-size: 0.95rem; color: var(--charcoal); border-left: 4px solid var(--wood); padding-left: 15px; }

    /* Admin UI Overlay */
    .admin-overlay { position: fixed; inset: 0; z-index: 99999; background: #f4f4f4; overflow-y: auto; padding: 40px 0; }
    .admin-card { background: white; width: 95%; max-width: 1100px; margin: 0 auto; border-radius: 12px; box-shadow: 0 40px 100px rgba(0,0,0,0.2); overflow: hidden; font-family: sans-serif; }
    .admin-header { background: var(--forest); color: white; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; }
    .admin-nav { display: flex; background: #eee; border-bottom: 1px solid #ddd; overflow-x: auto; }
    .admin-nav-btn { background: none; border: none; padding: 15px 25px; font-family: 'Space Mono', monospace; font-size: 11px; text-transform: uppercase; cursor: pointer; color: #666; }
    .admin-nav-btn.active { background: white; color: var(--forest); font-weight: bold; border-top: 3px solid var(--forest); }
    .admin-content { padding: 40px; background: white; }
    .input-box { border: 1px solid #eee; padding: 25px; margin-bottom: 20px; border-radius: 8px; background: #fafafa; position: relative; }
    .input-row { margin-bottom: 15px; }
    .input-row label { display: block; font-size: 10px; font-weight: bold; text-transform: uppercase; color: var(--wood); margin-bottom: 5px; }
    .input-row input, .input-row textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-family: inherit; font-size: 15px; background: white; }
    .btn-save { background: var(--forest); color: white; border: none; padding: 20px; width: 100%; font-family: 'Space Mono'; font-weight: bold; text-transform: uppercase; cursor: pointer; }

    @media (max-width: 1024px) { .sidebar { display: none; } main { margin-left: 0; padding: 2rem; } #hero-container, .post-card, .res-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body id="body-context">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;
    const WORKER_URL = "https://backend.tmcarleton11.workers.dev/"; 
    const SITE_ID = "handmadebyjayme"; 

    const MainApp = () => {
      const [view, setView] = useState('home');
      const [data, setData] = useState(null);
      const [filter, setFilter] = useState('all');
      const [isAdminMode, setIsAdminMode] = useState(window.location.hash === "#admin");
      const [isAuthed, setIsAuthed] = useState(false);
      const [adminKey, setAdminKey] = useState("");
      const [adminTab, setAdminTab] = useState('welcome');

      const fetchData = useCallback(async () => {
        try {
          const res = await fetch(WORKER_URL, { headers: { 'X-Site-Id': SITE_ID } });
          const json = await response.json();
          setData(json);
        } catch (e) {
          // If fetch fails, we'll wait for admin to set it up
        }
      }, []);

      useEffect(() => {
        const load = async () => {
          const res = await fetch(WORKER_URL, { headers: { 'X-Site-Id': SITE_ID } });
          const json = await res.json();
          setData(json);
        };
        load();
        
        const handleHash = () => setIsAdminMode(window.location.hash === "#admin");
        window.addEventListener('hashchange', handleHash);
        return () => window.removeEventListener('hashchange', handleHash);
      }, []);

      const navigate = (slug) => {
        window.history.pushState(null, null, slug === 'home' ? '/' : '/' + slug + '/');
        setView(slug);
        setFilter('all');
        window.scrollTo(0,0);
      };

      const saveToWorker = async (updatedData) => {
        const res = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Site-Id': SITE_ID },
          body: JSON.stringify({ key: adminKey, data: updatedData })
        });
        if (res.ok) {
           setData(updatedData);
           alert("Changes Saved Successfully.");
        } else {
           alert("Verification Failed.");
        }
      };

      if (!data) return <div style={{padding:'5rem', textAlign:'center', fontFamily:'Playfair Display', color:'var(--wood)'}}>Synchronizing Archive...</div>;

      if (isAdminMode) {
        return (
          <div className="admin-overlay">
            <div className="admin-card">
              <div className="admin-header">
                <h2>JAYME BACKSTAGE</h2>
                <button onClick={() => {window.location.hash = ""; setIsAdminMode(false);}} style={{color:'white', background:'rgba(0,0,0,0.2)', padding:'8px 15px', border:'none', borderRadius:'4px', cursor:'pointer'}}>EXIT</button>
              </div>
              {!isAuthed ? (
                <div style={{padding:'40px'}}>
                  <label style={{display:'block', marginBottom:'10px', fontSize:'12px', fontWeight:'bold'}}>ARCHIVE ACCESS KEY</label>
                  <input type="password" value={adminKey} onChange={e=>setAdminKey(e.target.value)} style={{width:'100%', padding:'15px', marginBottom:'15px', border:'1px solid #ddd'}} onKeyDown={e => e.key === 'Enter' && setIsAuthed(true)} />
                  <button className="btn-save" onClick={()=>setIsAuthed(true)}>Enter Archive</button>
                </div>
              ) : (
                <AdminPanel 
                    initialData={data} 
                    onSave={saveToWorker} 
                    currentTab={adminTab} 
                    setTab={setAdminTab} 
                />
              )}
            </div>
          </div>
        );
      }

      const allTags = Array.from(new Set(data.posts?.flatMap(p => p.category?.split(',').map(t => t.trim())) || [])).sort();
      const currentSlug = view === '' ? 'home' : view;

      return (
        <div className="site-wrapper">
          <aside className="sidebar">
            <div className="sidebar-brand" onClick={() => navigate('home')}><h1>Jayme M.<br/>Carleton</h1></div>
            <div className="nav-links">
              {['journal', 'portfolio', 'handmade', 'resume', 'contact'].map(slug => (
                <button key={slug} id={"nav-"+slug} className={view === slug ? 'active' : ''} onClick={() => navigate(slug)}>{slug}</button>
              ))}
            </div>
          </aside>

          <main>
            {['home', '', 'handmade', 'contact'].includes(currentSlug) && (
              <div id="hero-container" style={{display: 'grid'}}>
                <div className="profile-card">
                  <img src={data.pages?.[currentSlug === 'home' || currentSlug === '' ? 'welcome' : currentSlug]?.image} className={currentSlug === 'handmade' ? 'is-logo' : ''} />
                </div>
                <div className="hero-text">
                  <h2>{data.pages?.[currentSlug === 'home' || currentSlug === '' ? 'welcome' : currentSlug]?.title}</h2>
                  <div className="hero-text-body">{data.pages?.[currentSlug === 'home' || currentSlug === '' ? 'welcome' : currentSlug]?.content}</div>
                  {(currentSlug === 'home' || currentSlug === '') && <div className="signature">JAYME M. CARLETON<small>CSBA, LEED GREEN ASSOCIATE</small></div>}
                  {currentSlug === 'handmade' && <a href="https://etsy.com/shop/HandmadeByJayme" target="_blank" className="shop-cta" style={{marginTop:'2rem'}}>Visit Shop on Etsy</a>}
                </div>
              </div>
            )}

            {currentSlug === 'journal' && (
              <div>
                <div className="section-header-flex">
                  <h2 className="section-title">Journal</h2>
                  <div className="filter-pills">
                    <span className={`pill ${filter === 'all' ? 'active' : ''}`} onClick={() => setFilter('all')}>All</span>
                    {allTags.map(t => <span key={t} className={`pill ${filter === t ? 'active' : ''}`} onClick={() => setFilter(t)}>{t}</span>)}
                  </div>
                </div>
                {data.posts?.filter(p => filter === 'all' || p.category?.includes(filter)).map((p, i) => (
                  <article key={i} className="post-card">
                    <img src={p.image} className="post-thumb" />
                    <div>
                      <span style={{fontSize:'11px', fontWeight:'700', color:'var(--sage)', textTransform:'uppercase'}}>{p.date}</span>
                      <h3>{p.title}</h3>
                      <p className="post-content-text">{p.content}</p>
                    </div>
                  </article>
                ))}
              </div>
            )}

            {(currentSlug === 'portfolio' || currentSlug === 'resume') && (
              <div className="resume-container">
                <h2 className="section-title" style={{marginBottom:'4rem'}}>{currentSlug}</h2>
                {data[currentSlug]?.map((item, i) => (
                  <div key={i} className="res-row">
                    <div className="res-label">{item.label}</div>
                    <div className="res-content">{item.content}</div>
                  </div>
                ))}
              </div>
            )}
          </main>
        </div>
      );
    };

    /* SEPARATED ADMIN PANEL TO PREVENT FREEZING */
    const AdminPanel = ({ initialData, onSave, currentTab, setTab }) => {
      const [localData, setLocalData] = useState(initialData);

      const updatePage = (field, val) => {
        const d = {...localData};
        d.pages[currentTab][field] = val;
        setLocalData(d);
      };

      const updateList = (target, index, field, val) => {
        const d = {...localData};
        d[target][index][field] = val;
        setLocalData(d);
      };

      const addRow = (t) => {
        const d = {...localData};
        const newItem = t === 'posts' ? {title:"", date:"", content:"", image:"", category:""} : {label:"", content:""};
        if(!d[t]) d[t] = [];
        d[t].unshift(newItem);
        setLocalData(d);
      };

      const removeRow = (t, i) => {
        const d = {...localData};
        d[t].splice(i, 1);
        setLocalData(d);
      };

      return (
        <div>
          <nav className="admin-nav">
            {['welcome', 'handmade', 'contact', 'posts', 'portfolio', 'resume'].map(t => (
              <button key={t} onClick={()=>setTab(t)} className={`admin-nav-btn ${currentTab===t?'active':''}`}>{t}</button>
            ))}
          </nav>
          <div className="admin-content">
            {['welcome', 'handmade', 'contact'].includes(currentTab) && (
              <div className="input-box">
                <div className="input-row"><label>Main Photo URL</label><input value={localData.pages[currentTab].image || ''} onChange={e=>updatePage('image', e.target.value)}/></div>
                <div className="input-row"><label>Title</label><input value={localData.pages[currentTab].title || ''} onChange={e=>updatePage('title', e.target.value)}/></div>
                <div className="input-row"><label>Narrative Content</label><textarea rows="12" value={localData.pages[currentTab].content || ''} onChange={e=>updatePage('content', e.target.value)}/></div>
              </div>
            )}
            {currentTab === 'posts' && (
              <div>
                <button onClick={()=>addRow('posts')} style={{marginBottom:'20px', padding:'10px 20px', cursor:'pointer'}}>+ Add Journal Entry</button>
                {localData.posts?.map((p, i) => (
                  <div key={i} className="input-box">
                    <button onClick={()=>removeRow('posts', i)} style={{float:'right', color:'red', border:'none', background:'none', cursor:'pointer', fontWeight:'bold'}}>REMOVE</button>
                    <div className="input-row"><label>Title</label><input value={p.title} onChange={e=>updateList('posts', i, 'title', e.target.value)}/></div>
                    <div className="input-row"><label>Category</label><input value={p.category} onChange={e=>updateList('posts', i, 'category', e.target.value)}/></div>
                    <div className="input-row"><label>Image URL</label><input value={p.image} onChange={e=>updateList('posts', i, 'image', e.target.value)}/></div>
                    <div className="input-row"><label>Content</label><textarea rows="5" value={p.content} onChange={e=>updateList('posts', i, 'content', e.target.value)}/></div>
                  </div>
                ))}
              </div>
            )}
            {['portfolio', 'resume'].includes(currentTab) && (
              <div>
                <button onClick={()=>addRow(currentTab)} style={{marginBottom:'20px', padding:'10px 20px', cursor:'pointer'}}>+ Add Row</button>
                {localData[currentTab]?.map((row, i) => (
                  <div key={i} className="input-box">
                    <button onClick={()=>removeRow(currentTab, i)} style={{float:'right', color:'red', border:'none', background:'none', cursor:'pointer', fontWeight:'bold'}}>REMOVE</button>
                    <div className="input-row"><label>Label</label><input value={row.label} onChange={e=>updateList(currentTab, i, 'label', e.target.value)}/></div>
                    <div className="input-row"><label>Details</label><textarea rows="5" value={row.content} onChange={e=>updateList(currentTab, i, 'content', e.target.value)}/></div>
                  </div>
                ))}
              </div>
            )}
          </div>
          <button className="btn-save" onClick={() => onSave(localData)}>Push Updates to Live Site</button>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MainApp />);
  </script>
</body>
</html>
