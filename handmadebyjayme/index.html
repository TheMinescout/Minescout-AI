<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAYME M. CARLETON</title>
  
  <link rel="icon" type="image/png" href="https://jaymecarleton.com/wp-content/uploads/2015/11/leaf-only.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    :root {
      --forest: #2D3A2D;     
      --sage: #4F5D4F;       
      --wood: #C2A378;       
      --clay: #E8E2D6;       
      --wall: #F9F7F2;       
      --charcoal: #2C3333;   
      --white: #FFFFFF;
      --border: #e8e4dd;
      --font-header: 'Playfair Display', serif;
      --font-body: 'Inter', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--wall);
      font-family: var(--font-body);
      color: var(--charcoal);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    a { color: var(--wood); text-decoration: none; transition: 0.2s; }
    a:hover { color: var(--forest); }

    .site-wrapper { display: flex; min-height: 100vh; }

    /* --- SIDEBAR --- */
    .sidebar {
      width: 280px; background-color: var(--clay); padding: 4rem 2.5rem;
      position: fixed; height: 100vh; display: flex; flex-direction: column;
      border-right: 1px solid rgba(0,0,0,0.05); z-index: 1000; transition: transform 0.3s ease-in-out;
    }

    .sidebar-brand { margin-bottom: 5rem; cursor: pointer; }
    .sidebar-brand h1 {
      font-family: var(--font-header); font-size: 1.6rem; color: var(--forest);
      text-transform: uppercase; letter-spacing: 0.15em; line-height: 1.2; font-weight: 500;
    }

    .nav-links { display: flex; flex-direction: column; gap: 1.75rem; }
    .nav-links a {
      color: var(--charcoal); text-decoration: none; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.15em; font-size: 0.7rem; transition: all 0.3s ease; opacity: 0.5;
    }
    .nav-links a:hover, .nav-links a.active { opacity: 1; color: var(--forest); transform: translateX(4px); }

    /* --- MOBILE HEADER & HAMBURGER --- */
    .mobile-nav-bar { display: none; position: fixed; top: 0; left: 0; right: 0; height: 60px; background: var(--clay); z-index: 900; padding: 0 1.5rem; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(0,0,0,0.05); }
    .mobile-brand { font-family: var(--font-header); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.1em; color: var(--forest); font-weight: 600; }
    .hamburger { background: none; border: none; cursor: pointer; display: flex; flex-direction: column; gap: 5px; padding: 10px; z-index: 1100; }
    .hamburger span { display: block; width: 22px; height: 2px; background: var(--forest); transition: 0.3s; }
    .menu-open .hamburger span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .menu-open .hamburger span:nth-child(2) { opacity: 0; }
    .menu-open .hamburger span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.3); z-index: 950; opacity: 0; transition: 0.3s; }

    /* --- MAIN CONTENT --- */
    main { flex: 1; margin-left: 280px; padding: 5rem 4rem; max-width: 1400px; transition: opacity 0.3s; }

    /* --- HERO LAYOUTS --- */
    #hero-container { display: none; grid-template-columns: 1.2fr 1.5fr; gap: 5rem; align-items: start; margin-top: 1rem; }
    .profile-card img { width: 100%; border-radius: 100px 30px 100px 30px; display: block; filter: contrast(1.02) saturate(0.95); }
    .profile-card img.is-logo { width: 128px; height: 128px; border-radius: 50%; mix-blend-mode: multiply; filter: contrast(1.1); margin: 0 auto; }
    
    .hero-text h1, .hero-text h2 { font-family: var(--font-header); font-size: 2.5rem; color: var(--forest); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1.5rem; font-weight: 400; }
    .hero-text p { font-size: 1.1rem; margin-bottom: 1.5rem; color: #444; }

    .shop-cta { display: inline-block; background-color: var(--forest); color: white; padding: 1.2rem 2.5rem; text-decoration: none; text-transform: uppercase; letter-spacing: 0.2em; font-size: 0.8rem; font-weight: 700; margin-top: 2rem; border-radius: 2px; transition: all 0.3s ease; border: none; cursor: pointer; text-align: center; }
    .shop-cta:hover { background-color: var(--wood); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); color: #fff; }

    .signature { margin-top: 3rem; font-family: var(--font-header); font-weight: 500; color: var(--forest); text-transform: uppercase; font-size: 1.4rem; letter-spacing: 0.1em; }
    .signature small { display: block; font-family: var(--font-body); font-weight: normal; font-size: 0.75rem; letter-spacing: 0.1em; color: var(--sage); margin-top: 8px; }

    /* --- JOURNAL & FEED --- */
    .section-header-flex { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 3.5rem; border-bottom: 2px solid var(--clay); padding-bottom: 1.5rem; }
    .section-title { font-family: var(--font-header); font-size: 2.8rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--forest); font-weight: 400; }
    
    .filter-pills { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 0.5rem; }
    .pill { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; padding: 8px 16px; border: 1px solid var(--border); border-radius: 50px; cursor: pointer; background: var(--white); color: var(--muted); transition: 0.2s; }
    .pill.active { background: var(--forest); color: var(--white); border-color: var(--forest); }

    .post-card { display: grid; grid-template-columns: 280px 1fr; gap: 3rem; background: var(--white); padding: 2.5rem; margin-bottom: 2.5rem; border-radius: 4px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); transition: 0.3s ease; align-items: stretch; }
    .post-card:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(0,0,0,0.04); }
    .post-thumb { width: 100%; height: 100%; min-height: 200px; object-fit: cover; border-radius: 2px; background: var(--clay); }
    .post-card h3 { font-family: var(--font-header); font-size: 2rem; margin-bottom: 1rem; text-transform: uppercase; color: var(--forest); font-weight: 400; line-height: 1.2; }
    .post-excerpt { font-size: 1rem; color: #555; margin-bottom: 2rem; line-height: 1.7; }
    .post-card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--wall); }
    .post-date { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--sage); font-weight: 600; }

    .load-more-btn { display: block; width: 100%; padding: 2rem; background: var(--clay); border: none; font-family: var(--font-body); font-weight: 700; text-transform: uppercase; letter-spacing: 0.2em; font-size: 0.8rem; cursor: pointer; color: var(--forest); transition: 0.2s; margin-top: 1rem; border-radius: 4px; }

    /* --- RESUME --- */
    .resume-container { max-width: 1000px; margin: 0 auto; background: var(--white); padding: 6rem; border-radius: 4px; }
    .resume-meta { text-align: center; margin-bottom: 5rem; border-bottom: 3px solid var(--forest); padding-bottom: 2rem; }
    .resume-meta h1 { font-family: var(--font-header); font-size: 4rem; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.5rem; color: var(--forest); line-height: 1; }
    .res-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; }
    .res-row { display: grid; grid-template-columns: 240px 1fr; gap: 4rem; margin-bottom: 3rem; align-items: start; }
    .res-label { font-weight: 700; text-transform: uppercase; font-size: 0.95rem; color: var(--charcoal); letter-spacing: 0.05em; }

    /* --- PORTFOLIO --- */
    .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 3rem; }
    .portfolio-card { position: relative; overflow: hidden; border-radius: 4px; background: var(--clay); aspect-ratio: 4/3; }
    .portfolio-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1); }
    .portfolio-card:hover img { transform: scale(1.05); }
    .portfolio-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(45,58,45,0.9), transparent 60%); display: flex; flex-direction: column; justify-content: flex-end; padding: 2rem; opacity: 0; transition: 0.3s; }
    .portfolio-card:hover .portfolio-overlay { opacity: 1; }

    footer { margin-top: 8rem; padding: 4rem 0; border-top: 1px solid rgba(0,0,0,0.05); }

    @media (max-width: 1024px) {
      .sidebar { transform: translateX(-100%); width: 80%; max-width: 300px; box-shadow: 10px 0 30px rgba(0,0,0,0.1); }
      .mobile-nav-bar { display: flex; }
      .menu-open .sidebar { transform: translateX(0); }
      .menu-open .sidebar-overlay { display: block; opacity: 1; }
      main { margin-left: 0; padding: 6rem 2rem 4rem 2rem; }
      #hero-container { grid-template-columns: 1fr; gap: 3rem; text-align: center; }
      .post-card { grid-template-columns: 1fr; gap: 1.5rem; }
      .res-row { grid-template-columns: 1fr; gap: 1rem; }
    }
  </style>
</head>
<body id="body-context">

  <div class="mobile-nav-bar">
    <div class="mobile-brand" onclick="navigateTo('/')">Jayme M. Carleton</div>
    <button class="hamburger" id="menu-toggle" aria-label="Toggle Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
  <div class="sidebar-overlay" id="menu-overlay"></div>

  <div class="site-wrapper">
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-brand" onclick="navigateTo('/')">
        <h1>Jayme M.<br>Carleton</h1>
      </div>
      <div class="nav-links">
        <a href="/journal/" class="nav-link" data-link>Journal</a>
        <a href="/portfolio/" class="nav-link" data-link>Portfolio</a>
        <a href="/handmade/" class="nav-link" data-link>Handmade</a>
        <a href="/resume/" class="nav-link" data-link>Resume</a>
        <a href="/contact/" class="nav-link" data-link>Contact</a>
      </div>
    </nav>

    <main>
      <div id="hero-container">
        <div class="profile-card">
          <img id="hero-image" src="https://i.postimg.cc/NGX3ZDdw/PXL-20251224-004703169.jpg" alt="Jayme M. Carleton">
        </div>
        <div class="hero-text" id="hero-target"></div>
      </div>

      <div id="app-root"></div>

      <footer>
        <div class="social-links" style="margin-bottom: 1.5rem;">
          <a href="https://www.linkedin.com/in/jaymecarleton" target="_blank" style="text-decoration:none; font-weight:700; font-size:0.8rem; text-transform:uppercase; color:var(--forest); letter-spacing:0.1em;">LinkedIn</a>
        </div>
        <div class="copyright">SECOND NATURE | &copy; 2015-<span id="copy-year">2026</span>. ALL RIGHTS RESERVED.</div>
        <div class="credit">Modernized by <a href="https://minescout.net/ai" target="_blank">Minescout AI</a></div>
      </footer>
    </main>
  </div>

  <script>
    /* --- CONFIG TO CLOUDFLARE WORKER --- */
    const WORKER_URL = "https://backend.tmcarleton11.workers.dev/"; 
    const SITE_ID = "handmadebyjayme"; 
    const CACHE_KEY = 'jayme_v5_worker_cache';
    const CACHE_TIME = 3600000; 

    const HOME_PHOTO = "https://i.postimg.cc/NGX3ZDdw/PXL-20251224-004703169.jpg";
    const CONTACT_PHOTO = "https://jaymecarleton.com/wp-content/uploads/2015/11/jayme.jpg"; 
    const HANDMADE_LOGO = "https://jaymecarleton.com/wp-content/uploads/2015/11/leaf-only.png";
    const ETSY_LINK = "https://etsy.com/shop/HandmadeByJayme";

    let siteData = { pages: {}, posts: [], tags: new Set() };
    let currentLimit = 5;
    let currentFilter = 'all';

    const body = document.getElementById('body-context');
    const menuToggle = document.getElementById('menu-toggle');
    const menuOverlay = document.getElementById('menu-overlay');

    function toggleMenu() { body.classList.toggle('menu-open'); }
    function closeMenu() { body.classList.remove('menu-open'); }
    menuToggle.onclick = toggleMenu;
    menuOverlay.onclick = closeMenu;

    document.body.addEventListener('click', e => {
      const target = e.target.closest('[data-link]');
      if (target) { e.preventDefault(); closeMenu(); navigateTo(target.getAttribute('href')); }
    });

    function navigateTo(url) { history.pushState(null, null, url); handleRoute(); }

    async function initApp() {
      document.getElementById('copy-year').textContent = new Date().getFullYear();
      const cached = localStorage.getItem(CACHE_KEY);
      if (cached) {
        const { timestamp, data } = JSON.parse(cached);
        if (Date.now() - timestamp < CACHE_TIME) {
          parseWorkerData(data); handleRoute(); fetchFreshData(); return;
        }
      }
      await fetchFreshData();
    }

    async function fetchFreshData() {
      try {
        const response = await fetch(WORKER_URL, { headers: { 'X-Site-Id': SITE_ID } });
        const data = await response.text(); // Workers typically return text or JSON
        localStorage.setItem(CACHE_KEY, JSON.stringify({ timestamp: Date.now(), data: data }));
        parseWorkerData(data);
        handleRoute();
      } catch (e) { console.error("Worker sync error", e); }
    }

    /* Logic to split the Markdown file into pages and posts */
    function parseWorkerData(text) {
      siteData = { pages: {}, posts: [], tags: new Set() };
      const sections = text.split(/(^#\s+.*$)/m);
      for (let i = 1; i < sections.length; i += 2) {
        const titleLine = sections[i];
        let contentBody = sections[i + 1] ? sections[i + 1].trim() : '';
        const rawTitle = titleLine.replace(/^#\s*/, '').trim();
        const slug = slugify(rawTitle);
        if (slug === 'instructions') continue;

        const tags = [];
        const tagMatch = contentBody.match(/Category:\s*([^\n\r]+)/i);
        if (tagMatch) {
            tagMatch[1].split(',').forEach(t => {
                const tag = t.trim();
                tags.push(tag);
                siteData.tags.add(tag);
            });
            contentBody = contentBody.replace(tagMatch[0], ''); 
        }

        const imgMatch = contentBody.match(/!\[.*?\]\((.*?)\)/);
        const thumb = imgMatch ? imgMatch[1] : '';
        const cleanBody = contentBody.replace(/!\[.*?\]\(.*?\)/g, '').replace(/[#*\[\]\(\)>_]/g, '');
        const plainExcerpt = cleanBody.substring(0, 180).trim() + '...';
        const dateMatch = contentBody.match(/\*\*Date:\s*(.*?)\*\*/i);
        const dateStr = dateMatch ? dateMatch[1] : '';

        if (['portfolio', 'resume', 'contact', 'welcome', 'handmade'].includes(slug)) {
          siteData.pages[slug] = { title: rawTitle, content: marked.parse(contentBody) };
        } else {
          siteData.posts.push({ 
            title: rawTitle, slug: slug, rawContent: contentBody, 
            htmlContent: marked.parse(contentBody), thumb: thumb, 
            excerpt: plainExcerpt, tags: tags, dateStr: dateStr,
            dateObj: dateMatch ? new Date(dateMatch[1]) : new Date(0) 
          });
        }
      }
      siteData.posts.sort((a, b) => b.dateObj - a.dateObj);
    }

    function handleRoute() {
      const urlParams = new URLSearchParams(window.location.search);
      currentFilter = urlParams.get('tag') || 'all';
      let path = window.location.pathname;
      let slug = path.replace(/^\/|\/$/g, '').split('/').pop() || 'home';
      const root = document.getElementById('app-root');
      const heroContainer = document.getElementById('hero-container');
      const heroTarget = document.getElementById('hero-target');
      const heroImage = document.getElementById('hero-image');
      
      document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
      const activeLink = document.querySelector(`a[href="/${slug === 'home' ? '' : slug}/"]`);
      if(activeLink) activeLink.classList.add('active');

      if (slug === 'home' || slug === '' || slug === 'handmade' || slug === 'contact') {
        const pageKey = (slug === 'home' || slug === '') ? 'welcome' : slug;
        root.innerHTML = '';
        if (siteData.pages[pageKey]) {
            heroContainer.style.display = 'grid';
            heroImage.className = ''; 
            if (slug === 'handmade') {
                heroImage.src = HANDMADE_LOGO;
                heroImage.classList.add('is-logo');
                let content = siteData.pages[pageKey].content;
                content += `<a href="${ETSY_LINK}" target="_blank" class="shop-cta">Visit Shop on Etsy</a>`;
                heroTarget.innerHTML = content;
                renderFeed(root, 'Creation Log', p => p.tags.includes('Handmade'), 2, true);
            } else {
                heroImage.src = slug === 'contact' ? CONTACT_PHOTO : HOME_PHOTO;
                heroTarget.innerHTML = siteData.pages[pageKey].content;
                if (slug === 'contact') {
                    heroTarget.innerHTML = heroTarget.innerHTML.replace(/<a /g, '<a class="shop-cta" ');
                } else {
                    heroTarget.insertAdjacentHTML('beforeend', `<div class="signature">JAYME M. CARLETON<small>CSBA, LEED GREEN ASSOCIATE</small></div>`);
                }
            }
        }
      } else {
        heroContainer.style.display = 'none'; 
        if (slug === 'journal') { currentLimit = 5; renderJournalView(root); }
        else if (slug === 'portfolio') renderPortfolioHub(root);
        else if (siteData.pages[slug]) renderPage(root, siteData.pages[slug], slug);
        else {
          const post = siteData.posts.find(p => p.slug === slug);
          if (post) renderPost(root, post);
          else root.innerHTML = `<h2 class="section-title">404</h2>`;
        }
      }
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderJournalView(root) {
        root.innerHTML = `
            <div class="section-header-flex">
                <h2 class="section-title">Journal</h2>
                <div class="filter-pills">
                    <span class="pill ${currentFilter === 'all' ? 'active' : ''}" onclick="applyFilter('all')">All</span>
                    ${Array.from(siteData.tags).sort().map(t => `<span class="pill ${currentFilter === t ? 'active' : ''}" onclick="applyFilter('${t}')">${t}</span>`).join('')}
                </div>
            </div>
            <div id="post-feed-target"></div>
        `;
        updateFeed();
    }

    window.applyFilter = (tag) => {
        const url = tag === 'all' ? '/journal/' : `/journal/?tag=${encodeURIComponent(tag)}`;
        navigateTo(url);
    };

    function updateFeed() {
        const target = document.getElementById('post-feed-target');
        let posts = siteData.posts;
        if (currentFilter !== 'all') posts = posts.filter(p => p.tags.includes(currentFilter));

        const visible = posts.slice(0, currentLimit);
        target.innerHTML = visible.map(post => `
            <article class="post-card">
                <img src="${post.thumb || 'https://via.placeholder.com/600x600?text=Jayme+M.+Carleton'}" class="post-thumb" alt="${post.title}">
                <div class="post-card-content">
                    <div>
                        <h3>${post.title}</h3>
                        <p class="post-excerpt">${post.excerpt}</p>
                    </div>
                    <div class="post-card-footer">
                        <a href="/${post.slug}/" class="btn-read" data-link style="font-weight:700; text-transform:uppercase; font-size:0.75rem; letter-spacing:0.1em; border-bottom:1px solid var(--wood);">Read Entry ➔</a>
                        <span class="post-date">${post.dateStr}</span>
                    </div>
                </div>
            </article>
        `).join('');

        if (posts.length > currentLimit) {
            const btn = document.createElement('button');
            btn.className = 'load-more-btn';
            btn.innerText = `Load 10 More Entries`;
            btn.onclick = () => { currentLimit += 10; updateFeed(); };
            target.appendChild(btn);
        }
    }

    function renderPortfolioHub(root) {
      let html = `<h2 class="section-title">Portfolio</h2><div class="portfolio-grid">`;
      const portPosts = siteData.posts.filter(p => p.tags.includes('Portfolio'));
      portPosts.forEach(post => {
        html += `<a href="/${post.slug}/" class="portfolio-card" data-link><img src="${post.thumb}" alt="${post.title}"><div class="portfolio-overlay"><h4>${post.title}</h4></div></a>`;
      });
      html += `</div>`;
      root.innerHTML = html;
    }

    function renderPage(root, page, slug) { 
        if (slug === 'resume') {
            root.innerHTML = `<div class="resume-container"><div class="resume-meta"><h1>Jayme M. Carleton</h1><p>jayme@jaymecarleton.com</p></div>${formatResumeHtml(page.content)}</div>`;
        } else {
            root.innerHTML = `<div class="article-content"><h1>${page.title}</h1>${page.content}</div>`;
        }
    }

    function formatResumeHtml(html) {
        const div = document.createElement('div');
        div.innerHTML = html;
        div.querySelectorAll('h3').forEach(h => {
            const section = h.innerText.toLowerCase();
            if(['education', 'history', 'recognitions'].some(type => section.includes(type))) {
                const list = h.nextElementSibling;
                if(list && list.tagName === 'UL') {
                    const grid = document.createElement('div');
                    grid.className = 'res-grid';
                    list.querySelectorAll('li').forEach(li => {
                        const item = document.createElement('div');
                        item.innerHTML = li.innerHTML;
                        grid.appendChild(item);
                    });
                    list.replaceWith(grid);
                }
            } else if(section.includes('experience')) {
                let current = h.nextElementSibling;
                while(current && current.tagName !== 'H3') {
                    if(current.tagName === 'P' && current.querySelector('strong')) {
                        const row = document.createElement('div');
                        row.className = 'res-row';
                        const label = document.createElement('div');
                        label.className = 'res-label';
                        label.innerHTML = current.querySelector('strong').innerHTML;
                        const content = document.createElement('div');
                        content.className = 'res-content';
                        const clone = current.cloneNode(true);
                        clone.querySelector('strong').remove();
                        if(clone.innerText.trim()) content.appendChild(clone);
                        let sibling = current.nextElementSibling;
                        while(sibling && !(sibling.tagName === 'P' && sibling.querySelector('strong')) && sibling.tagName !== 'H3') {
                            const next = sibling.nextElementSibling;
                            content.appendChild(sibling);
                            sibling = next;
                        }
                        row.appendChild(label);
                        row.appendChild(content);
                        current.replaceWith(row);
                        current = sibling;
                    } else { current = current.nextElementSibling; }
                }
            }
        });
        return div.innerHTML;
    }

    function renderPost(root, post) {
      root.innerHTML = `
        <div class="article-content">
            <a href="/journal/" class="back-btn" data-link style="display:inline-block; margin-bottom:2rem; font-weight:700; text-transform:uppercase; font-size:0.75rem; letter-spacing:0.1em; color:var(--wood);">← Back to Archive</a>
            <h1>${post.title}</h1>
            <span class="article-date">${post.dateStr}</span>
            <div class="article-body">${post.htmlContent}</div>
            ${post.tags.length > 0 ? `<div class="article-tag-section">${post.tags.map(t => `<span>${t}</span>`).join(' ')}</div>` : ''}
        </div>`;
    }

    function renderFeed(root, title, filterFn, limit, skipTitle) {
      if(!skipTitle) root.insertAdjacentHTML('beforeend', `<h2 class="section-title">${title}</h2>`);
      let posts = siteData.posts.filter(filterFn);
      if (limit) posts = posts.slice(0, limit);
      posts.forEach(post => {
        root.insertAdjacentHTML('beforeend', `<article class="post-card" style="grid-template-columns:200px 1fr; padding:1.5rem;"><img src="${post.thumb || 'https://via.placeholder.com/600x600?text=Jayme+M.+Carleton'}" class="post-thumb" style="height:200px;"><div class="post-card-content"><h3>${post.title}</h3><p class="post-excerpt" style="font-size:0.9rem;">${post.excerpt}</p><div class="post-card-footer"><a href="/${post.slug}/" class="btn-read" data-link style="font-weight:700; text-transform:uppercase; font-size:0.7rem;">Read Entry ➔</a><span class="post-date">${post.dateStr}</span></div></div></article>`);
      });
    }

    function slugify(text) { return text.toString().toLowerCase().replace(/\s+/g, '-').replace(/[^\w\-]+/g, '').replace(/\-\-+/g, '-').replace(/^-+/, '').replace(/-+$/, ''); }
    window.onload = initApp;
    window.addEventListener('popstate', handleRoute);
  </script>
</body>
</html>
