<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAYME M. CARLETON | Sustainability & Stewardship</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=http://jaymecarleton.com&size=128">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  
  <!-- Markdown Engine -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    :root {
      /* Organic Modern Palette */
      --forest: #2D3A2D;     
      --sage: #4F5D4F;       
      --wood: #C2A378;       
      --clay: #E8E2D6;       
      --wall: #F9F7F2;       
      --charcoal: #2C3333;   
      --white: #FFFFFF;
      --border: #e8e4dd;
      --font-header: 'Playfair Display', serif;
      --font-body: 'Inter', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--wall);
      font-family: var(--font-body);
      color: var(--charcoal);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    .site-wrapper { display: flex; min-height: 100vh; }

    /* --- SIDEBAR (Desktop) --- */
    .sidebar {
      width: 280px; background-color: var(--clay); padding: 4rem 2.5rem;
      position: fixed; height: 100vh; display: flex; flex-direction: column;
      border-right: 1px solid rgba(0,0,0,0.05); z-index: 1000; transition: transform 0.3s ease-in-out;
    }

    .sidebar-brand { margin-bottom: 5rem; cursor: pointer; }
    .sidebar-brand h1 {
      font-family: var(--font-header); font-size: 1.6rem; color: var(--forest);
      text-transform: uppercase; letter-spacing: 0.15em; line-height: 1.2; font-weight: 500;
    }

    .nav-links { display: flex; flex-direction: column; gap: 1.75rem; }
    .nav-links a {
      color: var(--charcoal); text-decoration: none; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.15em; font-size: 0.7rem; transition: all 0.3s ease; opacity: 0.5;
    }
    .nav-links a:hover, .nav-links a.active { opacity: 1; color: var(--forest); transform: translateX(4px); }

    /* --- MOBILE HEADER & HAMBURGER --- */
    .mobile-nav-bar {
      display: none; position: fixed; top: 0; left: 0; right: 0; height: 60px;
      background: var(--clay); z-index: 900; padding: 0 1.5rem; align-items: center;
      justify-content: space-between; border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    .mobile-brand { font-family: var(--font-header); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.1em; color: var(--forest); font-weight: 600; }
    .hamburger { background: none; border: none; cursor: pointer; display: flex; flex-direction: column; gap: 5px; padding: 10px; z-index: 1100; }
    .hamburger span { display: block; width: 22px; height: 2px; background: var(--forest); transition: 0.3s; }
    .menu-open .hamburger span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .menu-open .hamburger span:nth-child(2) { opacity: 0; }
    .menu-open .hamburger span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.3); z-index: 950; opacity: 0; transition: 0.3s; }

    /* --- MAIN CONTENT --- */
    main { flex: 1; margin-left: 280px; padding: 5rem 4rem; max-width: 1300px; transition: opacity 0.3s; }

    /* --- HERO/LANDING LAYOUTS --- */
    #hero-container {
      display: none; grid-template-columns: 1fr 1.6fr; gap: 4rem; align-items: start; margin-top: 1rem;
    }
    .profile-card img { width: 100%; border-radius: 80px 20px 80px 20px; display: block; filter: contrast(1.02) saturate(0.95); }
    
    /* Logo override: Blends white (#FFFFFF) with background */
    .profile-card img.is-logo { 
      border-radius: 50%; 
      mix-blend-mode: multiply; 
      filter: contrast(1.1); 
    }
    
    .hero-text h1, .hero-text h2 { font-family: var(--font-header); font-size: 2.2rem; color: var(--forest); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1.5rem; font-weight: 400; }
    .hero-text p { font-size: 1rem; margin-bottom: 1.2rem; color: #4a4a4a; }

    /* Reusable Button Style */
    .shop-cta {
      display: inline-block; background-color: var(--forest); color: white;
      padding: 1.2rem 2.5rem; text-decoration: none; text-transform: uppercase;
      letter-spacing: 0.2em; font-size: 0.75rem; font-weight: 700; margin-top: 2rem;
      border-radius: 2px; transition: all 0.3s ease; border: none; cursor: pointer;
      text-align: center;
    }
    .shop-cta:hover { background-color: var(--wood); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); color: white; }

    .signature { margin-top: 3rem; font-family: var(--font-header); font-weight: 500; color: var(--forest); text-transform: uppercase; font-size: 1.2rem; letter-spacing: 0.1em; }
    .signature small { display: block; font-family: var(--font-body); font-weight: normal; font-size: 0.65rem; letter-spacing: 0.1em; color: var(--sage); margin-top: 8px; }

    /* --- DYNAMIC FEED SECTIONS --- */
    .section-title { font-family: var(--font-header); font-size: 2.2rem; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 3.5rem; color: var(--forest); font-weight: 400; }
    .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2.5rem; }
    .portfolio-card { text-decoration: none; color: inherit; transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); }
    .portfolio-card:hover { transform: translateY(-10px); }
    .portfolio-img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; border-radius: 4px; margin-bottom: 1rem; }
    .portfolio-info h4 { font-family: var(--font-header); font-size: 1.1rem; text-transform: uppercase; color: var(--forest); }

    .post-card { background: var(--white); padding: 3rem; margin-bottom: 2rem; border-radius: 4px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
    .post-card h3 { font-family: var(--font-header); font-size: 1.8rem; margin-bottom: 1rem; text-transform: uppercase; color: var(--forest); font-weight: 400; }
    .btn-read { font-weight: 700; color: var(--wood); text-decoration: none; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.15em; border-bottom: 1px solid var(--wood); }

    .article-content, .resume-container { max-width: 900px; margin: 0 auto; background: var(--white); padding: 4rem; border-radius: 4px; }
    .article-content h1, .resume-container h1 { font-family: var(--font-header); font-size: 2.5rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2rem; color: var(--forest); font-weight: 400; border-bottom: 2px solid var(--forest); padding-bottom: 1rem; }
    
    /* --- SPECIALIZED RESUME GRID SYSTEM --- */
    .resume-container h2 { font-family: var(--font-header); font-size: 1.4rem; color: var(--forest); text-transform: uppercase; letter-spacing: 0.15em; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; margin-top: 3rem; margin-bottom: 1.5rem; display: block; width: 100%; clear: both; }
    .resume-container h3 { font-family: var(--font-body); text-transform: uppercase; font-weight: 700; font-size: 0.9rem; color: var(--forest); margin-top: 2rem; margin-bottom: 0.5rem; letter-spacing: 0.05em; }
    
    .res-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem; }
    .res-item { margin-bottom: 1.5rem; }
    .res-item strong { display: block; font-size: 0.95rem; color: var(--charcoal); }
    .res-item em { font-size: 0.85rem; color: var(--sage); font-style: italic; }
    .res-item p { font-size: 0.85rem; color: #555; line-height: 1.4; margin-top: 0.25rem; }

    /* Sidebar-label Grid for Experience */
    .res-row { display: grid; grid-template-columns: 180px 1fr; gap: 2.5rem; margin-bottom: 2.5rem; align-items: start; }
    .res-label { font-family: var(--font-body); font-weight: 700; text-transform: uppercase; font-size: 0.8rem; color: var(--charcoal); line-height: 1.3; }
    .res-content p, .res-content em { font-size: 0.9rem; color: var(--sage); font-style: italic; margin-bottom: 0.75rem; line-height: 1.4; display: block; }
    .res-content ul { list-style: none; padding-left: 0; }
    .res-content li { font-size: 0.88rem; color: #444; position: relative; padding-left: 1.25rem; margin-bottom: 0.5rem; line-height: 1.5; }
    .res-content li::before { content: "•"; position: absolute; left: 0; color: var(--wood); font-weight: bold; }

    .article-content img { display: block; max-width: 100%; height: auto; margin: 3rem auto; }
    .back-btn { display: inline-block; margin-bottom: 2.5rem; text-decoration: none; color: var(--wood); text-transform: uppercase; font-size: 0.75rem; font-weight: 700; }

    footer { margin-top: 8rem; padding: 4rem 0; border-top: 1px solid rgba(0,0,0,0.05); }
    .social-links a { color: var(--forest); text-decoration: none; margin-right: 2.5rem; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }

    /* Modal Styling */
    .ms-modal-overlay { position: fixed; inset: 0; background: rgba(45, 58, 45, 0.4); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 9999; }
    .ms-modal { background: var(--white); padding: 3rem; border-radius: 4px; max-width: 450px; width: 90%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .ms-modal h3 { font-family: var(--font-header); font-size: 1.5rem; color: var(--forest); margin-bottom: 1rem; text-transform: uppercase; }
    .ms-modal p { font-size: 0.9rem; color: var(--muted); margin-bottom: 2rem; }

    @media (max-width: 850px) {
      .mobile-nav-bar { display: flex; }
      .sidebar { transform: translateX(-100%); width: 80%; max-width: 300px; box-shadow: 10px 0 30px rgba(0,0,0,0.1); }
      .menu-open .sidebar { transform: translateX(0); }
      .menu-open .sidebar-overlay { display: block; opacity: 1; }
      main { margin-left: 0; padding: 6rem 1.5rem 3rem 1.5rem; }
      #hero-container { grid-template-columns: 1fr; gap: 2.5rem; }
      .article-content, .resume-container { padding: 2.5rem 1.5rem; }
      .res-grid, .res-row { grid-template-columns: 1fr; gap: 1rem; }
      .res-label { margin-bottom: 0.5rem; }
    }
  </style>
</head>
<body id="body-context">

  <div class="mobile-nav-bar">
    <div class="mobile-brand" onclick="navigateTo('/')">Jayme M. Carleton</div>
    <button class="hamburger" id="menu-toggle" aria-label="Toggle Menu">
      <span></span><span></span><span></span>
    </button>
  </div>

  <div class="sidebar-overlay" id="menu-overlay"></div>

  <div class="site-wrapper">
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-brand" onclick="navigateTo('/')">
        <h1>Jayme M.<br>Carleton</h1>
      </div>
      <div class="nav-links">
        <a href="/journal/" class="nav-link" data-link>Journal</a>
        <a href="/portfolio/" class="nav-link" data-link>Portfolio</a>
        <a href="/handmade/" class="nav-link" data-link>Handmade</a>
        <a href="/resume/" class="nav-link" data-link>Resume</a>
        <a href="/contact/" class="nav-link" data-link>Contact</a>
      </div>
    </nav>

    <main>
      <div id="hero-container">
        <div class="profile-card">
          <img id="hero-image" src="https://i.postimg.cc/NGX3ZDdw/PXL-20251224-004703169.jpg" alt="Jayme M. Carleton">
        </div>
        <div class="hero-text" id="hero-target"></div>
      </div>

      <div id="app-root"></div>

      <footer>
        <div class="social-links">
          <a href="https://www.linkedin.com/in/jaymecarleton" target="_blank">LinkedIn</a>
        </div>
        <p>SECOND NATURE | &copy; 2015-2026. ALL RIGHTS RESERVED.</p>
      </footer>
    </main>
  </div>

  <script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz5WP1tULDww98Dic3jsbntYEwhkGlsZKvz_ep_oX241gDrKKtorZjNWrjkHeMdczxP/exec'; 
    const CACHE_KEY = 'jayme_content_cache';
    const CACHE_TIME = 3600000; 

    const HOME_PHOTO = "https://i.postimg.cc/NGX3ZDdw/PXL-20251224-004703169.jpg";
    const HANDMADE_LOGO = "https://jaymecarleton.com/wp-content/uploads/2015/11/leaf-only.png";

    let siteData = { pages: {}, posts: [] };
    const portSlugs = ['east-sammamish-park-south-site-2020', 'green-access-home-at-suncadia-2010', 'the-urban-lodge-2007', 'the-built-green-home-at-suncadia-2006'];

    const body = document.getElementById('body-context');
    const menuToggle = document.getElementById('menu-toggle');
    const menuOverlay = document.getElementById('menu-overlay');

    function toggleMenu() { body.classList.toggle('menu-open'); }
    function closeMenu() { body.classList.remove('menu-open'); }
    menuToggle.onclick = toggleMenu;
    menuOverlay.onclick = closeMenu;

    document.body.addEventListener('click', e => {
      const target = e.target.closest('[data-link]');
      if (target) { e.preventDefault(); closeMenu(); navigateTo(target.getAttribute('href')); }
    });

    function navigateTo(url) { history.pushState(null, null, url); handleRoute(); }

    async function initApp() {
      const cached = localStorage.getItem(CACHE_KEY);
      if (cached) {
        const { timestamp, data } = JSON.parse(cached);
        if (Date.now() - timestamp < CACHE_TIME) {
          parseGoogleDoc(data);
          handleRoute();
          fetchFreshData(); 
          return;
        }
      }
      await fetchFreshData();
    }

    async function fetchFreshData() {
      try {
        const response = await fetch(APPS_SCRIPT_URL);
        const rawText = await response.text();
        localStorage.setItem(CACHE_KEY, JSON.stringify({ timestamp: Date.now(), data: rawText }));
        parseGoogleDoc(rawText);
        handleRoute();
      } catch (e) { console.error("Sync failed", e); }
    }

    function parseGoogleDoc(text) {
      siteData = { pages: {}, posts: [] };
      const sections = text.split(/(^#\s+.*$)/m);
      for (let i = 1; i < sections.length; i += 2) {
        const titleLine = sections[i];
        const contentBody = sections[i + 1] ? sections[i + 1].trim() : '';
        const rawTitle = titleLine.replace(/^#\s*/, '').trim();
        const slug = slugify(rawTitle);
        if (slug === 'instructions') continue;
        
        const htmlContent = marked.parse(contentBody.replace(/href="(\/[^"]+)"/g, 'href="$1" data-link'));
        const excerpt = contentBody.replace(/[#*\[\]\(\)>_]/g, '').substring(0, 160) + '...';
        const imgMatch = contentBody.match(/!\[.*?\]\((.*?)\)/);
        const thumb = imgMatch ? imgMatch[1] : '';
        const dateMatch = contentBody.match(/\*\*Date:\s*(.*?)\*\*/i);
        
        const isHandmade = contentBody.toLowerCase().includes('category: handmade');
        
        if (['portfolio', 'resume', 'contact', 'welcome', 'handmade'].includes(slug)) {
          siteData.pages[slug] = { title: rawTitle, content: htmlContent };
        } else {
          siteData.posts.push({ 
            title: rawTitle, slug: slug, content: htmlContent, excerpt: excerpt, 
            thumb: thumb, date: dateMatch ? new Date(dateMatch[1]) : new Date(0),
            isHandmade: isHandmade
          });
        }
      }
      siteData.posts.sort((a, b) => b.date - a.date);
    }

    window.showShopPlaceholder = () => {
        const overlay = document.createElement('div');
        overlay.className = 'ms-modal-overlay';
        overlay.onclick = (e) => { if(e.target === overlay) overlay.remove(); };
        overlay.innerHTML = `
            <div class="ms-modal">
                <h3>Visit Shop</h3>
                <p>PLACEHOLDER FOR SHOP LINK<br><small>ASK JAYME CARLETON TO UPDATE LINK IF YOU CAN SEE THIS</small></p>
                <button onclick="this.closest('.ms-modal-overlay').remove()" class="shop-cta" style="margin-top:0;">Close</button>
            </div>
        `;
        document.body.appendChild(overlay);
    };

    /** * Custom Resume Formatter 
     * Converts simple Markdown headers/lists into the multi-column Grid layout 
     * seen in the high-end WordPress Ethos theme.
     */
    function formatResumeHtml(html) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(`<div>${html}</div>`, 'text/html');
        const container = doc.querySelector('div');
        
        const headers = Array.from(container.querySelectorAll('h2, h3'));
        
        headers.forEach(header => {
            const sectionTitle = header.innerText.toLowerCase();
            
            // Layout A: 2-Column Grid (Education, History)
            if (sectionTitle.includes('education') || sectionTitle.includes('history')) {
                const wrapper = document.createElement('div');
                wrapper.className = 'res-grid';
                
                let current = header.nextElementSibling;
                while (current && current.tagName !== 'H2' && current.tagName !== 'H3') {
                    if (current.tagName === 'UL') {
                        Array.from(current.querySelectorAll('li')).forEach(li => {
                            const item = document.createElement('div');
                            item.className = 'res-item';
                            item.innerHTML = li.innerHTML;
                            wrapper.appendChild(item);
                        });
                        const toRemove = current;
                        current = current.nextElementSibling;
                        toRemove.remove();
                    } else {
                        current = current.nextElementSibling;
                    }
                }
                header.after(wrapper);
            }
            
            // Layout B: Sidebar Row (Experience)
            if (sectionTitle.includes('experience')) {
                let current = header.nextElementSibling;
                while (current && current.tagName !== 'H2') {
                    // Detect if this paragraph is a "Job Label" block
                    if (current.tagName === 'P' && current.querySelector('strong')) {
                        const row = document.createElement('div');
                        row.className = 'res-row';
                        
                        const label = document.createElement('div');
                        label.className = 'res-label';
                        
                        // Extract JUST the bold text for the label
                        const strong = current.querySelector('strong');
                        label.innerHTML = strong.innerHTML;
                        
                        const content = document.createElement('div');
                        content.className = 'res-content';
                        
                        // If there was text outside the strong tag (like the italic desc), move it to content
                        const clone = current.cloneNode(true);
                        const s = clone.querySelector('strong');
                        if(s) s.remove();
                        if(clone.innerText.trim().length > 0) {
                            content.appendChild(clone);
                        }
                        
                        // Gather siblings until the next Label paragraph or next Header
                        let sibling = current.nextElementSibling;
                        while (sibling && !(sibling.tagName === 'P' && sibling.querySelector('strong')) && sibling.tagName !== 'H2' && sibling.tagName !== 'H3') {
                            const nextSibling = sibling.nextElementSibling;
                            content.appendChild(sibling);
                            sibling = nextSibling;
                        }
                        
                        row.appendChild(label);
                        row.appendChild(content);
                        const nextRef = sibling;
                        current.replaceWith(row);
                        current = nextRef; 
                    } else {
                        current = current.nextElementSibling;
                    }
                }
            }
        });
        
        return container.innerHTML;
    }

    function handleRoute() {
      let path = window.location.pathname;
      let slug = path.replace(/^\/|\/$/g, '').split('/').pop() || 'home';
      const root = document.getElementById('app-root');
      const heroContainer = document.getElementById('hero-container');
      const heroTarget = document.getElementById('hero-target');
      const heroImage = document.getElementById('hero-image');
      
      document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
      const activeLink = document.querySelector(`a[href="/${slug}/"]`);
      if(activeLink) activeLink.classList.add('active');

      if (slug === 'home' || slug === '' || slug === 'handmade') {
        const pageKey = slug === 'handmade' ? 'handmade' : 'welcome';
        root.innerHTML = '';
        
        if (siteData.pages[pageKey]) {
            heroContainer.style.display = 'grid';
            if (slug === 'handmade') {
                heroImage.src = HANDMADE_LOGO;
                heroImage.classList.add('is-logo');
            } else {
                heroImage.src = HOME_PHOTO;
                heroImage.classList.remove('is-logo');
            }

            heroTarget.innerHTML = siteData.pages[pageKey].content;
            
            if (slug === 'handmade') {
              const btn = document.createElement('button');
              btn.className = 'shop-cta';
              btn.innerText = 'Visit Shop';
              btn.onclick = showShopPlaceholder;
              heroTarget.appendChild(btn);
              renderFeed(root, 'Recent Creations', p => p.isHandmade, 2);
            } else {
              const sig = document.createElement('div');
              sig.className = 'signature';
              sig.innerHTML = `JAYME M. CARLETON<small>CSBA, LEED GREEN ASSOCIATE</small>`;
              heroTarget.appendChild(sig);
            }
        } else {
           heroContainer.style.display = 'none';
        }
      } else {
        heroContainer.style.display = 'none'; 
        root.innerHTML = '';
        if (slug === 'journal') renderFeed(root, 'Journal', p => !portSlugs.includes(p.slug));
        else if (slug === 'portfolio') renderPortfolioHub(root);
        else if (siteData.pages[slug]) renderPage(root, siteData.pages[slug], slug);
        else {
          const post = siteData.posts.find(p => p.slug === slug);
          if (post) renderPost(root, post);
          else root.innerHTML = `<h2 class="section-title">404</h2>`;
        }
      }
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderFeed(root, title, filterFn, limit = null) {
      let html = `<h2 class="section-title">${title}</h2>`;
      let posts = siteData.posts.filter(filterFn);
      if (limit) posts = posts.slice(0, limit);
      
      if (posts.length === 0) html += '<p style="color:var(--sage)">New entries coming soon.</p>';
      posts.forEach(post => {
        html += `<article class="post-card"><h3>${post.title}</h3><p class="excerpt">${post.excerpt}</p><a href="/${post.slug}/" class="btn-read" data-link>Read Entry</a></article>`;
      });
      root.insertAdjacentHTML('beforeend', html);
    }

    function renderPortfolioHub(root) {
      let html = `<h2 class="section-title">Portfolio</h2><div class="portfolio-grid">`;
      siteData.posts.filter(p => portSlugs.includes(p.slug)).forEach(post => {
        html += `<a href="/${post.slug}/" class="portfolio-card" data-link><img src="${post.thumb}" class="portfolio-img" alt="${post.title}"><div class="portfolio-info"><h4>${post.title}</h4></div></a>`;
      });
      html += `</div>`;
      root.innerHTML = html;
    }

    function renderPage(root, page, slug) { 
        const isResume = slug === 'resume';
        const isContact = slug === 'contact';
        let content = page.content;
        
        if (isResume) {
            content = formatResumeHtml(content);
        }
        
        if (isContact) {
            // Transform LinkedIn link into the standard button style
            content = content.replace(/<a /g, '<a class="shop-cta" ');
        }
        
        root.innerHTML = `<div class="${isResume ? 'resume-container' : 'article-content'}"><h1>${page.title}</h1>${content}</div>`; 
    }

    function renderPost(root, post) {
      const isP = portSlugs.includes(post.slug);
      const isH = post.isHandmade;
      let backUrl = isP ? '/portfolio/' : (isH ? '/handmade/' : '/journal/');
      root.innerHTML = `<div class="article-content"><a href="${backUrl}" class="back-btn" data-link>← Back</a><h1>${post.title}</h1>${post.content}</div>`;
    }

    function slugify(text) { return text.toString().toLowerCase().replace(/\s+/g, '-').replace(/[^\w\-]+/g, '').replace(/\-\-+/g, '-').replace(/^-+/, '').replace(/-+$/, ''); }
    window.onload = initApp;
    window.addEventListener('popstate', handleRoute);
  </script>
</body>
</html>
