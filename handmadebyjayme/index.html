<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAYME M. CARLETON</title>
  
  <link rel="icon" type="image/png" href="https://jaymecarleton.com/wp-content/uploads/2015/11/leaf-only.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <!-- Core Engines -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    :root {
      --forest: #2D3A2D;     
      --sage: #4F5D4F;       
      --wood: #C2A378;       
      --clay: #E8E2D6;       
      --wall: #F9F7F2;       
      --charcoal: #2C3333;   
      --white: #FFFFFF;
      --border: #e8e4dd;
      --font-header: 'Playfair Display', serif;
      --font-body: 'Inter', sans-serif;
    }

    /* --- Standard Cursor Enabled --- */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--wall);
      font-family: var(--font-body);
      color: var(--charcoal);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    a { color: var(--wood); text-decoration: none; transition: 0.2s; cursor: pointer; }
    a:hover { color: var(--forest); }

    .site-wrapper { display: flex; min-height: 100vh; }

    /* --- SIDEBAR --- */
    .sidebar {
      width: 280px; background-color: var(--clay); padding: 4rem 2.5rem;
      position: fixed; height: 100vh; display: flex; flex-direction: column;
      border-right: 1px solid rgba(0,0,0,0.05); z-index: 1000; transition: transform 0.3s ease-in-out;
    }

    .sidebar-brand { margin-bottom: 5rem; cursor: pointer; }
    .sidebar-brand h1 {
      font-family: var(--font-header); font-size: 1.6rem; color: var(--forest);
      text-transform: uppercase; letter-spacing: 0.15em; line-height: 1.2; font-weight: 500;
    }

    .nav-links { display: flex; flex-direction: column; gap: 1.75rem; }
    .nav-btn {
      background: none; border: none; text-align: left;
      color: var(--charcoal); text-decoration: none; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.15em; font-size: 0.7rem; transition: all 0.3s ease; opacity: 0.5; cursor: pointer;
    }
    .nav-btn:hover, .nav-btn.active { opacity: 1; color: var(--forest); transform: translateX(4px); }

    /* --- MOBILE HEADER --- */
    .mobile-nav-bar { display: none; position: fixed; top: 0; left: 0; right: 0; height: 60px; background: var(--clay); z-index: 900; padding: 0 1.5rem; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(0,0,0,0.05); }
    .mobile-brand { font-family: var(--font-header); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.1em; color: var(--forest); font-weight: 600; }
    .hamburger { background: none; border: none; cursor: pointer; display: flex; flex-direction: column; gap: 5px; padding: 10px; z-index: 1100; }
    .hamburger span { display: block; width: 22px; height: 2px; background: var(--forest); transition: 0.3s; }
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 950; }

    /* --- MAIN CONTENT --- */
    main { flex: 1; margin-left: 280px; padding: 5rem 4rem; max-width: 1400px; transition: opacity 0.3s; }

    /* --- HERO LAYOUTS --- */
    .hero-container { display: grid; grid-template-columns: 1.2fr 1.5fr; gap: 5rem; align-items: start; margin-top: 1rem; margin-bottom: 5rem; }
    .profile-card img { width: 100%; border-radius: 100px 30px 100px 30px; display: block; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    .profile-card img.is-logo { width: 128px; height: 128px; border-radius: 50%; mix-blend-mode: multiply; margin: 0 auto; box-shadow: none; }
    
    .hero-text h1 { font-family: var(--font-header); font-size: 2.8rem; color: var(--forest); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1.5rem; font-weight: 400; }
    .hero-text p { font-size: 1.15rem; margin-bottom: 1.5rem; color: #444; }

    .shop-cta { display: inline-block; background-color: var(--forest); color: white; padding: 1.2rem 2.5rem; text-decoration: none; text-transform: uppercase; letter-spacing: 0.2em; font-size: 0.8rem; font-weight: 700; margin-top: 2rem; border-radius: 2px; transition: 0.3s; cursor: pointer; border: none; }
    .shop-cta:hover { background-color: var(--wood); transform: translateY(-2px); }

    .signature { margin-top: 3rem; font-family: var(--font-header); font-weight: 500; color: var(--forest); text-transform: uppercase; font-size: 1.4rem; letter-spacing: 0.1em; }
    .signature small { display: block; font-family: var(--font-body); font-weight: normal; font-size: 0.75rem; letter-spacing: 0.1em; color: var(--sage); margin-top: 8px; }

    /* --- FEED / LISTING --- */
    .section-title { font-family: var(--font-header); font-size: 3rem; color: var(--forest); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3rem; font-weight: 400; border-bottom: 2px solid var(--clay); padding-bottom: 1rem; }
    .post-card { display: grid; grid-template-columns: 280px 1fr; gap: 3rem; background: var(--white); padding: 2.5rem; margin-bottom: 2.5rem; border-radius: 4px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
    .post-thumb { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 2px; background: var(--clay); }
    .post-card h3 { font-family: var(--font-header); font-size: 2rem; color: var(--forest); text-transform: uppercase; margin-bottom: 0.5rem; font-weight: 400; line-height: 1.2; }
    .post-excerpt { color: #666; margin-bottom: 1.5rem; font-size: 1rem; }
    .post-date { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--sage); }

    /* --- PORTFOLIO --- */
    .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem; }
    .portfolio-card { aspect-ratio: 1; overflow: hidden; position: relative; border-radius: 4px; background: var(--clay); cursor: pointer; }
    .portfolio-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
    .portfolio-card:hover img { transform: scale(1.05); }
    .portfolio-overlay { position: absolute; inset: 0; background: rgba(45,58,45,0.85); display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; padding: 20px; text-align: center; }
    .portfolio-card:hover .portfolio-overlay { opacity: 1; }
    .portfolio-overlay h4 { color: #fff; font-family: var(--font-header); text-transform: uppercase; letter-spacing: 0.1em; font-size: 1.4rem; }

    /* --- BACKSTAGE (ADMIN) --- */
    #admin-view { position: fixed; inset: 0; background: var(--wall); z-index: 5000; padding: 40px; overflow-y: auto; display: none; }
    .admin-card { max-width: 1100px; margin: 0 auto; background: #fff; border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); height: 85vh; display: flex; flex-direction: column; }
    .admin-header { background: var(--forest); color: #fff; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; border-radius: 8px 8px 0 0; }
    .admin-main { display: grid; grid-template-columns: 240px 1fr; flex: 1; overflow: hidden; }
    .admin-sidebar { border-right: 1px solid var(--border); overflow-y: auto; padding: 20px; background: var(--wall); }
    .admin-tab-btn { width: 100%; padding: 12px 15px; background: none; border: 1px solid transparent; cursor: pointer; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: #999; text-align: left; transition: 0.2s; border-radius: 4px; margin-bottom: 5px; }
    .admin-tab-btn.active { color: var(--forest); border-color: var(--border); background: #fff; }
    
    .admin-body { padding: 40px; overflow-y: auto; }
    .admin-group { margin-bottom: 25px; }
    .admin-group label { display: block; font-size: 0.62rem; font-weight: 700; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; letter-spacing: 0.1em; }
    .admin-group input, .admin-group textarea { width: 100%; padding: 12px; border: 1.5px solid var(--border); border-radius: 4px; outline: none; font-family: inherit; font-size: 0.95rem; background: #fdfdfd; }
    .admin-group textarea { height: 180px; resize: vertical; }

    /* Admin List Entry Cards */
    .admin-entry-card { border: 1.5px solid var(--border); border-radius: 8px; padding: 2rem; margin-bottom: 2rem; background: #fff; position: relative; }
    .remove-item { position: absolute; top: 1.5rem; right: 1.5rem; color: #e11d48; font-size: 0.6rem; font-weight: 700; cursor: pointer; text-transform: uppercase; background: none; border: none; }
    .add-btn { width: 100%; padding: 20px; border: 2px dashed var(--border); background: none; color: #999; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; cursor: pointer; border-radius: 6px; transition: 0.2s; }
    .add-btn:hover { border-color: var(--forest); color: var(--forest); }

    .admin-footer { padding: 20px 30px; background: var(--wall); border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }

    @media (max-width: 1024px) {
      .sidebar { transform: translateX(-100%); }
      .mobile-nav-bar { display: flex; }
      body.menu-open .sidebar { transform: translateX(0); }
      body.menu-open .sidebar-overlay { display: block; }
      main { margin-left: 0; padding: 80px 20px 40px; }
      .hero-container { grid-template-columns: 1fr; gap: 3rem; text-align: center; }
      .post-card { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    /* --- CONFIG --- */
    const BACKEND_URL = 'https://backend.tmcarleton11.workers.dev/';
    const SITE_ID = 'handmadebyjayme';

    const HOME_PHOTO = "https://i.postimg.cc/NGX3ZDdw/PXL-20251224-004703169.jpg";
    const CONTACT_PHOTO = "https://jaymecarleton.com/wp-content/uploads/2015/11/jayme.jpg";
    const HANDMADE_LOGO = "https://jaymecarleton.com/wp-content/uploads/2015/11/leaf-only.png";

    function App() {
      const [view, setView] = useState('home');
      const [data, setData] = useState(null);
      const [isAdmin, setIsAdmin] = useState(false);
      const [adminTab, setAdminTab] = useState('welcome');
      const [adminSecret, setAdminSecret] = useState('');
      const [isMenuOpen, setIsMenuOpen] = useState(false);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const fetchSite = async () => {
          try {
            const res = await fetch(BACKEND_URL, { headers: { 'X-Site-Id': SITE_ID } });
            if (res.ok) setData(await res.json());
          } catch (e) { console.error("Sync standby."); }
          setLoading(false);
        };
        fetchSite();

        const handleHash = () => {
          const h = window.location.hash.replace('#', '') || 'home';
          if (h === 'admin') setIsAdmin(true);
          else {
            setIsAdmin(false);
            setView(h);
          }
        };
        window.addEventListener('hashchange', handleHash);
        handleHash();
        return () => window.removeEventListener('hashchange', handleHash);
      }, []);

      const saveToProduction = async () => {
        const key = prompt("Enter Minescout Node Secret:");
        if (!key) return;
        const res = await fetch(BACKEND_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Site-Id': SITE_ID },
          body: JSON.stringify({ key, data })
        });
        if (res.ok) alert("Node Synchronized ✓");
        else alert("Verification Failed.");
      };

      if (loading) return <div style={{height:'100vh', display:'flex', alignItems:'center', justifyContent:'center', color: '#C2A378', fontStyle:'italic'}}>Connecting to Minescout Engine...</div>;
      if (!data) return <div style={{padding:'4rem'}}>Fatal Error: Data Node missing.</div>;

      if (isAdmin) {
        return (
          <div id="admin-view" style={{display: 'block'}}>
            <div className="admin-card">
              <header className="admin-header">
                <h2>BACKSTAGE MANAGER</h2>
                <button onClick={() => window.location.hash = 'home'}>EXIT</button>
              </header>
              <div className="admin-main">
                <aside className="admin-sidebar">
                  {['welcome', 'handmade', 'contact', 'resume', 'journal'].map(t => (
                    <button key={t} className={`admin-tab-btn ${adminTab === t ? 'active' : ''}`} onClick={() => setAdminTab(t)}>
                      {t}
                    </button>
                  ))}
                </aside>
                <div className="admin-body">
                  {adminTab !== 'journal' ? (
                    <div className="admin-group">
                      <label>Page Text (Markdown)</label>
                      <textarea 
                        value={data[adminTab]} 
                        onChange={(e) => setData({...data, [adminTab]: e.target.value})}
                      />
                    </div>
                  ) : (
                    <div>
                      {data.journal.map((item, idx) => (
                        <div key={idx} className="admin-entry-card">
                          <button className="remove-item" onClick={() => {
                            const next = [...data.journal];
                            next.splice(idx, 1);
                            setData({...data, journal: next});
                          }}>Delete Entry</button>
                          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:20}}>
                             <div className="admin-group"><label>Title</label><input value={item.title} onChange={e => {
                               const next = [...data.journal]; next[idx].title = e.target.value; setData({...data, journal: next});
                             }} /></div>
                             <div className="admin-group"><label>Date</label><input value={item.date} onChange={e => {
                               const next = [...data.journal]; next[idx].date = e.target.value; setData({...data, journal: next});
                             }} /></div>
                          </div>
                          <div className="admin-group"><label>Image URL</label><input value={item.image} onChange={e => {
                               const next = [...data.journal]; next[idx].image = e.target.value; setData({...data, journal: next});
                             }} /></div>
                          <div className="admin-group"><label>Summary / Excerpt</label><input value={item.excerpt} onChange={e => {
                               const next = [...data.journal]; next[idx].excerpt = e.target.value; setData({...data, journal: next});
                             }} /></div>
                          <div className="admin-group"><label>Tags (e.g. Handmade, Portfolio)</label><input value={item.tags} onChange={e => {
                               const next = [...data.journal]; next[idx].tags = e.target.value; setData({...data, journal: next});
                             }} /></div>
                          <div className="admin-group" style={{marginBottom:0}}><label>Main Content</label><textarea value={item.content} onChange={e => {
                               const next = [...data.journal]; next[idx].content = e.target.value; setData({...data, journal: next});
                             }} /></div>
                        </div>
                      ))}
                      <button className="add-btn" onClick={() => setData({...data, journal: [{title:"New Entry", date:"", image:"", excerpt:"", tags:"Handmade", content:""}, ...data.journal]})}>+ Add New Entry</button>
                    </div>
                  )}
                </div>
              </div>
              <div className="admin-footer">
                <span style={{fontSize:'0.65rem', color:'#999'}}>Minescout Multi-Tenant Node</span>
                <button className="shop-cta" style={{marginTop:0}} onClick={saveToProduction}>Publish Updates</button>
              </div>
            </div>
          </div>
        );
      }

      // --- PUBLIC UI ---
      return (
        <div className={`site-wrapper ${isMenuOpen ? 'menu-open' : ''}`}>
          <div className="mobile-nav-bar">
            <div className="mobile-brand">Jayme M. Carleton</div>
            <button className="hamburger" onClick={() => setIsMenuOpen(!isMenuOpen)}>
              <span></span><span></span><span></span>
            </button>
          </div>
          <div className="sidebar-overlay" onClick={() => setIsMenuOpen(false)}></div>

          <aside className="sidebar">
            <div className="sidebar-brand" onClick={() => setView('home')}>
              <h1>Jayme M.<br/>Carleton</h1>
            </div>
            <nav className="nav-links">
              {['journal', 'portfolio', 'handmade', 'resume', 'contact'].map(v => (
                <button key={v} className={`nav-btn ${view === v ? 'active' : ''}`} onClick={() => { setView(v); setIsMenuOpen(false); window.location.hash = v; }}>
                  {v}
                </button>
              ))}
            </nav>
          </aside>

          <main>
            {['home', 'handmade', 'contact'].includes(view) && (
              <div className="hero-container">
                <div className="profile-card">
                  <img className={view === 'handmade' ? 'is-logo' : ''} src={view === 'handmade' ? HANDMADE_LOGO : (view === 'contact' ? CONTACT_PHOTO : HOME_PHOTO)} />
                </div>
                <div className="hero-text">
                  <div dangerouslySetInnerHTML={{ __html: marked.parse(data[view === 'home' ? 'welcome' : view] || '') }} />
                  {view === 'home' && (
                    <div className="signature">JAYME M. CARLETON<small>CSBA, LEED GREEN ASSOCIATE</small></div>
                  )}
                  {view === 'handmade' && (
                    <a href="https://etsy.com/shop/HandmadeByJayme" target="_blank" className="shop-cta">Visit Shop on Etsy</a>
                  )}
                </div>
              </div>
            )}

            {view === 'journal' && (
              <div>
                <h2 className="section-title">Journal</h2>
                {data.journal.map((p, i) => (
                  <article className="post-card" key={i}>
                    <img src={p.image} className="post-thumb" />
                    <div>
                      <span className="post-date">{p.date}</span>
                      <h3>{p.title}</h3>
                      <p className="post-excerpt">{p.excerpt}</p>
                      <a onClick={() => { setView('post-' + i); window.scrollTo(0,0); }} style={{fontWeight:700, borderBottom:'1px solid'}}>READ ENTRY ➔</a>
                    </div>
                  </article>
                ))}
              </div>
            )}

            {view === 'portfolio' && (
              <div>
                <h2 className="section-title">Portfolio</h2>
                <div className="portfolio-grid">
                  {data.journal.filter(p => p.tags.toLowerCase().includes('portfolio')).map((p, i) => (
                    <div className="portfolio-card" key={i} onClick={() => { setView('post-' + i); window.scrollTo(0,0); }}>
                      <img src={p.image} />
                      <div className="portfolio-overlay"><h4>{p.title}</h4></div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {view === 'resume' && (
              <div className="resume-container">
                <div className="signature" style={{textAlign:'center', borderBottom:'2px solid var(--forest)', paddingBottom:'2rem', marginBottom:'3rem'}}>
                  <h1 style={{fontSize:'3rem', letterSpacing:'0.1em'}}>Jayme M. Carleton</h1>
                  <p style={{fontSize:'0.8rem', fontWeight:'600'}}>jayme@jaymecarleton.com</p>
                </div>
                <div dangerouslySetInnerHTML={{ __html: marked.parse(data.resume || '') }} />
              </div>
            )}

            {view.startsWith('post-') && (
              <div className="article-content">
                <button onClick={() => setView('journal')} style={{background:'none', border:'none', color:'var(--wood)', fontWeight:'700', textTransform:'uppercase', cursor:'pointer', marginBottom:'2rem'}}>← Back to Journal</button>
                <span className="post-date" style={{display:'block', marginBottom:'1rem'}}>{data.journal[view.split('-')[1]].date}</span>
                <h1 style={{fontFamily:'var(--font-header)', fontSize:'3.5rem', marginBottom:'2rem', textTransform:'uppercase', color:'var(--forest)'}}>{data.journal[view.split('-')[1]].title}</h1>
                <div dangerouslySetInnerHTML={{ __html: marked.parse(data.journal[view.split('-')[1]].content || '') }} />
              </div>
            )}

          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
