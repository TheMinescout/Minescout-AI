<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAYME M. CARLETON</title>
  
  <link rel="icon" type="image/png" href="https://jaymecarleton.com/wp-content/uploads/2015/11/leaf-only.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    :root {
      --forest: #2D3A2D; --sage: #4F5D4F; --wood: #C2A378; --clay: #E8E2D6;
      --wall: #F9F7F2; --charcoal: #2C3333; --white: #FFFFFF; --border: #e8e4dd;
      --font-header: 'Playfair Display', serif; --font-body: 'Inter', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: var(--wall); font-family: var(--font-body); color: var(--charcoal); line-height: 1.6; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
    a { color: var(--wood); text-decoration: none; transition: 0.2s; }
    a:hover { color: var(--forest); }

    .site-wrapper { display: flex; min-height: 100vh; }
    .sidebar { width: 280px; background-color: var(--clay); padding: 4rem 2.5rem; position: fixed; height: 100vh; display: flex; flex-direction: column; border-right: 1px solid rgba(0,0,0,0.05); z-index: 1000; }
    .sidebar-brand { margin-bottom: 5rem; cursor: pointer; }
    .sidebar-brand h1 { font-family: var(--font-header); font-size: 1.6rem; color: var(--forest); text-transform: uppercase; letter-spacing: 0.15em; line-height: 1.2; font-weight: 500; }
    .nav-links { display: flex; flex-direction: column; gap: 1.75rem; }
    .nav-links button { background: none; border: none; text-align: left; color: var(--charcoal); font-weight: 600; text-transform: uppercase; letter-spacing: 0.15em; font-size: 0.7rem; transition: 0.3s; opacity: 0.5; cursor: pointer; outline: none; }
    .nav-links button.active { opacity: 1; color: var(--forest); transform: translateX(4px); }

    main { flex: 1; margin-left: 280px; padding: 5rem 4rem; max-width: 1400px; }
    #hero-container { display: grid; grid-template-columns: 1.2fr 1.5fr; gap: 5rem; align-items: start; margin-top: 1rem; }
    .profile-card img { width: 100%; border-radius: 100px 30px 100px 30px; display: block; }
    .profile-card img.is-logo { width: 128px; height: 128px; border-radius: 50%; mix-blend-mode: multiply; margin: 0 auto; }
    .hero-text h2 { font-family: var(--font-header); font-size: 2.5rem; color: var(--forest); text-transform: uppercase; margin-bottom: 1.5rem; }
    .hero-text-body { white-space: pre-wrap; }

    .section-header-flex { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 3.5rem; border-bottom: 2px solid var(--clay); padding-bottom: 1.5rem; }
    .section-title { font-family: var(--font-header); font-size: 2.8rem; text-transform: uppercase; color: var(--forest); }
    .filter-pills { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .pill { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; padding: 8px 16px; border: 1px solid var(--border); border-radius: 50px; cursor: pointer; background: var(--white); transition: 0.2s; }
    .pill.active { background: var(--forest); color: var(--white); border-color: var(--forest); }

    .post-card { display: grid; grid-template-columns: 280px 1fr; gap: 3rem; background: var(--white); padding: 2.5rem; margin-bottom: 2.5rem; border-radius: 4px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
    .post-thumb { width: 100%; height: 200px; object-fit: cover; border-radius: 2px; background: var(--clay); cursor: pointer;}
    .post-content-text { white-space: pre-wrap; color: #444; }

    /* SINGLE POST / ARTICLE CSS */
    .article-content { max-width: 900px; margin: 0 auto; background: var(--white); padding: 5rem; border-radius: 4px; }
    .article-content h1 { font-family: var(--font-header); font-size: 3rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1rem; color: var(--forest); font-weight: 400; line-height: 1.2; }
    .article-content .article-date { display: block; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--sage); margin-bottom: 3.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; font-weight: 600;}
    .article-body { font-size: 1.15rem; line-height: 1.8; color: #333; }
    .article-body p { margin-bottom: 1.5rem; }
    .article-body img { display: block; max-width: 100%; height: auto; margin: 3.5rem auto; border-radius: 2px; }
    .article-tag-section { margin-top: 4rem; padding-top: 2rem; border-top: 1px solid var(--border); display: flex; gap: 10px; }
    .article-tag-section span { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--sage); background: var(--wall); padding: 6px 16px; border-radius: 50px; }

    /* PORTFOLIO GRID CSS */
    .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 3rem; margin-top: 1rem; }
    .portfolio-card { position: relative; overflow: hidden; border-radius: 4px; background: var(--clay); aspect-ratio: 4/3; cursor: pointer; }
    .portfolio-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1); }
    .portfolio-card:hover img { transform: scale(1.05); }
    .portfolio-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(45,58,45,0.9), transparent 60%); display: flex; flex-direction: column; justify-content: flex-end; padding: 2rem; opacity: 0; transition: 0.3s; }
    .portfolio-card:hover .portfolio-overlay { opacity: 1; }
    .portfolio-overlay h4 { color: white; font-family: var(--font-header); font-size: 1.4rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 400;}

    /* RESUME GRID CSS */
    .resume-container { max-width: 1000px; margin: 0 auto; background: var(--white); padding: 6rem; border-radius: 4px; }
    .res-row { display: grid; grid-template-columns: 240px 1fr; gap: 4rem; margin-bottom: 3rem; }
    .res-label { font-weight: 700; text-transform: uppercase; font-size: 0.95rem; color: var(--charcoal); border-left: 4px solid var(--wood); padding-left: 15px; }

    /* Admin UI Overlay */
    .admin-overlay { position: fixed; inset: 0; z-index: 99999; background: #f4f4f4; overflow-y: auto; padding: 40px 0; }
    .admin-card { background: white; width: 95%; max-width: 1100px; margin: 0 auto; border-radius: 12px; box-shadow: 0 40px 100px rgba(0,0,0,0.2); overflow: hidden; font-family: sans-serif; }
    .admin-header { background: var(--forest); color: white; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; }
    .admin-nav { display: flex; background: #eee; border-bottom: 1px solid #ddd; overflow-x: auto; }
    .admin-nav-btn { background: none; border: none; padding: 15px 25px; font-family: 'Space Mono', monospace; font-size: 11px; text-transform: uppercase; cursor: pointer; color: #666; }
    .admin-nav-btn.active { background: white; color: var(--forest); font-weight: bold; border-top: 3px solid var(--forest); }
    .admin-content { padding: 40px; background: white; }
    .input-box { border: 1px solid #eee; padding: 25px; margin-bottom: 20px; border-radius: 8px; background: #fafafa; position: relative; }
    .input-row { margin-bottom: 15px; }
    .input-row label { display: block; font-size: 10px; font-weight: bold; text-transform: uppercase; color: var(--wood); margin-bottom: 5px; font-family: 'Space Mono', monospace;}
    .input-row input, .input-row textarea { width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 4px; font-family: inherit; font-size: 15px; background: white; }
    .btn-save { background: var(--forest); color: white; border: none; padding: 20px; width: 100%; font-family: 'Space Mono'; font-weight: bold; text-transform: uppercase; cursor: pointer; }

    @media (max-width: 1024px) { .sidebar { display: none; } main { margin-left: 0; padding: 2rem; } #hero-container, .post-card, .res-row, .portfolio-grid { grid-template-columns: 1fr; } .article-content, .resume-container { padding: 3rem 1.5rem; } }
  </style>
</head>
<body id="body-context">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;
    const WORKER_URL = "https://backend.tmcarleton11.workers.dev/"; 
    const SITE_ID = "handmadebyjayme"; 

    const slugify = (text) => text?.toString().toLowerCase().replace(/\s+/g, '-').replace(/[^\w\-]+/g, '').replace(/\-\-+/g, '-').replace(/^-+/, '').replace(/-+$/, '');

    const ensureSafeData = (d) => {
      return {
        pages: {
          welcome: { title: d?.pages?.welcome?.title || "", content: d?.pages?.welcome?.content || "", image: d?.pages?.welcome?.image || "" },
          handmade: { title: d?.pages?.handmade?.title || "", content: d?.pages?.handmade?.content || "", image: d?.pages?.handmade?.image || "" },
          contact: { title: d?.pages?.contact?.title || "", content: d?.pages?.contact?.content || "", image: d?.pages?.contact?.image || "" }
        },
        posts: Array.isArray(d?.posts) ? d?.posts : [],
        resume: Array.isArray(d?.resume) ? d?.resume : []
      };
    };

    // --- OG RESUME FORMATTER ---
    function formatResumeHtml(markdownText) {
      if (!markdownText) return "";
      const rawHtml = marked.parse(markdownText);
      const div = document.createElement('div');
      div.innerHTML = rawHtml;
      div.querySelectorAll('h3').forEach(h => {
        const section = h.innerText.toLowerCase();
        const gridTypes = ['education', 'history', 'recognitions', 'certifications'];
        if (gridTypes.some(type => section.includes(type))) {
          const list = h.nextElementSibling;
          if (list && list.tagName === 'UL') {
            const grid = document.createElement('div');
            grid.className = 'res-grid';
            list.querySelectorAll('li').forEach(li => {
              const item = document.createElement('div');
              item.className = 'res-item';
              item.innerHTML = li.innerHTML;
              grid.appendChild(item);
            });
            list.replaceWith(grid);
          }
        } else if (section.includes('experience')) {
          let current = h.nextElementSibling;
          while (current && current.tagName !== 'H3') {
            if (current.tagName === 'P' && current.querySelector('strong')) {
              const row = document.createElement('div');
              row.className = 'res-row';
              const label = document.createElement('div');
              label.className = 'res-label';
              label.innerHTML = current.querySelector('strong').innerHTML;
              const content = document.createElement('div');
              content.className = 'res-content';
              const clone = current.cloneNode(true);
              clone.querySelector('strong').remove();
              if (clone.innerText.trim()) content.appendChild(clone);
              let sibling = current.nextElementSibling;
              while (sibling && !(sibling.tagName === 'P' && sibling.querySelector('strong')) && sibling.tagName !== 'H3') {
                const next = sibling.nextElementSibling;
                content.appendChild(sibling);
                sibling = next;
              }
              row.appendChild(label);
              row.appendChild(content);
              const nextRef = sibling;
              current.replaceWith(row);
              current = nextRef;
            } else { current = current.nextElementSibling; }
          }
        }
      });
      return div.innerHTML;
    }

    // --- ISOLATED ADMIN PANEL ---
    const AdminPanel = ({ initialData, onSave, onExit }) => {
      const [localData, setLocalData] = useState(() => ensureSafeData(initialData));
      const [tab, setTab] = useState('welcome');

      const updatePage = (field, val) => {
        setLocalData(prev => ({ ...prev, pages: { ...prev.pages, [tab]: { ...prev.pages[tab], [field]: val } } }));
      };
      const updateList = (targetList, index, field, val) => {
        const newList = [...localData[targetList]];
        newList[index][field] = val;
        setLocalData(prev => ({ ...prev, [targetList]: newList }));
      };
      const addRow = (targetList) => {
        const newItem = targetList === 'posts' ? { title: "New Entry", date: "2026", category: "", image: "", content: "" } : { label: "Label", content: "" };
        setLocalData(prev => ({ ...prev, [targetList]: [newItem, ...prev[targetList]] }));
      };
      const removeRow = (targetList, index) => {
        const newList = [...localData[targetList]];
        newList.splice(index, 1);
        setLocalData(prev => ({ ...prev, [targetList]: newList }));
      };

      return (
        <div className="admin-overlay">
          <div className="admin-card">
            <header className="admin-header">
              <h2>JAYME BACKSTAGE</h2>
              <button onClick={onExit} style={{background:'rgba(255,255,255,0.2)', border:'none', color:'white', padding:'8px 16px', borderRadius:'4px', cursor:'pointer', fontWeight:'bold', fontSize:'12px'}}>EXIT</button>
            </header>

            <nav className="admin-nav">
              {['welcome', 'handmade', 'contact', 'resume', 'posts'].map(t => (
                <button key={t} onClick={() => setTab(t)} className={`admin-nav-btn ${tab === t ? 'active' : ''}`}>
                  {t === 'posts' ? 'Journal & Portfolio Entries' : t}
                </button>
              ))}
            </nav>

            <div className="admin-content">
              {['welcome', 'handmade', 'contact'].includes(tab) && (
                <div className="input-box">
                  <div className="input-row"><label>Main Photo URL</label><input value={localData.pages[tab].image} onChange={e => updatePage('image', e.target.value)} /></div>
                  <div className="input-row"><label>Headline</label><input value={localData.pages[tab].title} onChange={e => updatePage('title', e.target.value)} /></div>
                  <div className="input-row"><label>Narrative Content (Markdown Supported)</label><textarea rows="12" value={localData.pages[tab].content} onChange={e => updatePage('content', e.target.value)} /></div>
                </div>
              )}
              {tab === 'posts' && (
                <div>
                  <button onClick={() => addRow('posts')} style={{padding: '10px 20px', marginBottom: '20px', background:'var(--clay)', color:'var(--forest)', border:'1px solid var(--border)', cursor:'pointer', fontWeight:'bold', borderRadius:'4px'}}>+ Add New Entry</button>
                  {localData.posts.map((p, i) => (
                    <div key={i} className="input-box">
                      <button onClick={() => removeRow('posts', i)} style={{position:'absolute', top:'20px', right:'20px', background:'none', border:'none', color:'red', fontWeight:'bold', cursor:'pointer'}}>REMOVE</button>
                      <div className="input-row"><label>Title</label><input value={p.title} onChange={e => updateList('posts', i, 'title', e.target.value)} /></div>
                      <div className="input-row"><label>Date</label><input value={p.date} onChange={e => updateList('posts', i, 'date', e.target.value)} /></div>
                      <div className="input-row"><label>Category Tags (Comma separated: Environment, Portfolio, Handmade...)</label><input value={p.category} onChange={e => updateList('posts', i, 'category', e.target.value)} /></div>
                      <div className="input-row"><label>Image URL</label><input value={p.image} onChange={e => updateList('posts', i, 'image', e.target.value)} /></div>
                      <div className="input-row"><label>Content (Markdown Supported)</label><textarea rows="8" value={p.content} onChange={e => updateList('posts', i, 'content', e.target.value)} /></div>
                    </div>
                  ))}
                </div>
              )}
              {tab === 'resume' && (
                <div>
                  <button onClick={() => addRow(tab)} style={{padding: '10px 20px', marginBottom: '20px', background:'var(--clay)', color:'var(--forest)', border:'1px solid var(--border)', cursor:'pointer', fontWeight:'bold', borderRadius:'4px'}}>+ Add Row</button>
                  {localData[tab].map((row, i) => (
                    <div key={i} className="input-box">
                      <button onClick={() => removeRow(tab, i)} style={{position:'absolute', top:'20px', right:'20px', background:'none', border:'none', color:'red', fontWeight:'bold', cursor:'pointer'}}>REMOVE</button>
                      <div className="input-row"><label>Section Label (e.g., "Education", "Experience")</label><input value={row.label} onChange={e => updateList(tab, i, 'label', e.target.value)} /></div>
                      <div className="input-row"><label>Content Details (Markdown supported)</label><textarea rows="5" value={row.content} onChange={e => updateList(tab, i, 'content', e.target.value)} /></div>
                    </div>
                  ))}
                </div>
              )}
            </div>
            <div style={{padding: '0 3rem 3rem 3rem', background: 'white'}}><button className="btn-save" onClick={() => onSave(localData)}>Publish Updates to Live Site</button></div>
          </div>
        </div>
      );
    };


    // --- MAIN APP ---
    const MainApp = () => {
      const [siteData, setSiteData] = useState(null);
      const [view, setView] = useState('home');
      const [filter, setFilter] = useState('all');
      
      const [isAdminMode, setIsAdminMode] = useState(window.location.hash === "#admin");
      const [isAuthed, setIsAuthed] = useState(false);
      const [adminKey, setAdminKey] = useState("");
      
      useEffect(() => {
        const fetchWorker = async () => {
          try {
            const res = await fetch(WORKER_URL, { headers: { 'X-Site-Id': SITE_ID } });
            const json = await res.json();
            setSiteData(ensureSafeData(json));
          } catch (e) {
            setSiteData(ensureSafeData(null)); 
          }
        };
        fetchWorker();

        const handleHash = () => setIsAdminMode(window.location.hash === "#admin");
        window.addEventListener('hashchange', handleHash);
        return () => window.removeEventListener('hashchange', handleHash);
      }, []);

      const saveToServer = async (updatedData) => {
        const res = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Site-Id': SITE_ID },
          body: JSON.stringify({ key: adminKey, data: updatedData })
        });
        if (res.ok) {
          setSiteData(updatedData);
          alert("Archive Successfully Deployed.");
        } else {
          alert("Verification Failed. Check your key.");
        }
      };

      const navigate = (slug) => {
        setView(slug);
        setFilter('all');
        window.scrollTo(0,0);
      };

      if (!siteData) return <div style={{padding:'5rem', textAlign:'center', fontFamily:'Playfair Display', color:'var(--wood)', fontSize:'1.5rem'}}>Synchronizing Archive...</div>;

      const currentSlug = view === '' ? 'home' : view;
      const pageKey = currentSlug === 'home' ? 'welcome' : currentSlug;

      // Extract unique tags for the Journal Pills
      const allTags = Array.from(new Set(siteData.posts.flatMap(p => (p.category || "").split(',').map(t => t.trim()).filter(Boolean)))).sort();
      
      // Determine if viewing a specific post
      const currentPost = siteData.posts.find(p => slugify(p.title) === currentSlug);

      // Manage active nav highlighting properly when in a sub-post
      const activeNav = ['home', 'journal', 'portfolio', 'handmade', 'resume', 'contact'].includes(currentSlug) 
                        ? currentSlug 
                        : (currentPost?.category?.toLowerCase().includes('portfolio') ? 'portfolio' : 'journal');

      return (
        <div>
          {/* Admin Verification Modal */}
          {isAdminMode && !isAuthed && (
             <div className="admin-overlay" style={{display:'flex', alignItems:'center', justifyContent:'center'}}>
               <div className="admin-card" style={{padding:'4rem', maxWidth: '500px'}}>
                  <div style={{display:'flex', justifyContent:'space-between', marginBottom:'2rem'}}>
                    <h3 style={{fontFamily:'Playfair Display', color:'var(--forest)', margin:0}}>Security</h3>
                    <button onClick={() => {window.location.hash=""; setIsAdminMode(false);}} style={{background:'none', border:'none', cursor:'pointer', color:'var(--wood)', fontWeight:'bold'}}>EXIT</button>
                  </div>
                  <input type="password" placeholder="Access Key" value={adminKey} onChange={e=>setAdminKey(e.target.value)} onKeyDown={e => e.key === 'Enter' && setIsAuthed(true)} style={{width:'100%', padding:'15px', marginBottom:'20px', border:'1px solid #ddd', borderRadius:'4px', outline:'none'}} />
                  <button className="btn-save" onClick={()=>setIsAuthed(true)} style={{borderRadius:'4px'}}>Verify</button>
               </div>
             </div>
          )}
          {/* Admin Editor Panel */}
          {isAdminMode && isAuthed && (
            <AdminPanel initialData={siteData} onSave={saveToServer} onExit={() => {window.location.hash=""; setIsAdminMode(false);}} />
          )}

          {/* FRONTEND UI */}
          <div className="site-wrapper">
            <aside className="sidebar">
              <div className="sidebar-brand" onClick={() => navigate('home')}><h1>Jayme M.<br/>Carleton</h1></div>
              <div className="nav-links">
                {['journal', 'portfolio', 'handmade', 'resume', 'contact'].map(slug => (
                  <button key={slug} className={activeNav === slug ? 'active' : ''} onClick={() => navigate(slug)}>{slug}</button>
                ))}
              </div>
            </aside>

            <main>
              {/* STATIC PAGES: Home, Handmade, Contact */}
              {['home', 'handmade', 'contact'].includes(currentSlug) && (
                <div id="hero-container" style={{display: 'grid'}}>
                  <div className="profile-card">
                    <img src={siteData.pages[pageKey]?.image} className={currentSlug === 'handmade' ? 'is-logo' : ''} alt="Profile" />
                  </div>
                  <div className="hero-text">
                    <h2>{siteData.pages[pageKey]?.title}</h2>
                    <div className="hero-text-body" dangerouslySetInnerHTML={{ __html: marked.parse(siteData.pages[pageKey]?.content || '') }} />
                    {currentSlug === 'home' && <div className="signature">JAYME M. CARLETON<small>CSBA, LEED GREEN ASSOCIATE</small></div>}
                    {currentSlug === 'handmade' && <a href="https://etsy.com/shop/HandmadeByJayme" target="_blank" className="shop-cta" style={{marginTop:'2rem'}}>Visit Shop on Etsy</a>}
                  </div>
                </div>
              )}

              {/* JOURNAL / FEED VIEW */}
              {currentSlug === 'journal' && (
                <div>
                  <div className="section-header-flex">
                    <h2 className="section-title">Journal</h2>
                    <div className="filter-pills">
                      <span className={`pill ${filter === 'all' ? 'active' : ''}`} onClick={() => setFilter('all')}>All</span>
                      {allTags.map(t => <span key={t} className={`pill ${filter === t ? 'active' : ''}`} onClick={() => setFilter(t)}>{t}</span>)}
                    </div>
                  </div>
                  {siteData.posts.filter(p => filter === 'all' || (p.category && p.category.includes(filter))).map((p, i) => {
                    const plainExcerpt = p.content ? p.content.replace(/<[^>]+>/g, '').substring(0, 180) + '...' : '';
                    return (
                      <article key={i} className="post-card">
                        <img src={p.image} className="post-thumb" alt={p.title} onClick={() => navigate(slugify(p.title))} />
                        <div style={{display:'flex', flexDirection:'column', height:'100%'}}>
                          <h3>{p.title}</h3>
                          <p className="post-excerpt">{plainExcerpt}</p>
                          <div className="post-card-footer">
                            <button onClick={() => navigate(slugify(p.title))} style={{background:'none', border:'none', borderBottom:'1px solid var(--wood)', color:'var(--wood)', fontWeight:'700', textTransform:'uppercase', fontSize:'0.75rem', letterSpacing:'0.1em', cursor:'pointer', padding: 0}}>Read Entry ➔</button>
                            <span className="post-date">{p.date}</span>
                          </div>
                        </div>
                      </article>
                    );
                  })}
                </div>
              )}

              {/* PORTFOLIO VIEW (Grid pulled from tags) */}
              {currentSlug === 'portfolio' && (
                <div>
                  <h2 className="section-title">Portfolio</h2>
                  <div className="portfolio-grid">
                    {siteData.posts.filter(p => p.category && p.category.toLowerCase().includes('portfolio')).map((p, i) => (
                      <div key={i} className="portfolio-card" onClick={() => navigate(slugify(p.title))}>
                        <img src={p.image} alt={p.title} />
                        <div className="portfolio-overlay"><h4>{p.title}</h4></div>
                      </div>
                    ))}
                    {siteData.posts.filter(p => p.category && p.category.toLowerCase().includes('portfolio')).length === 0 && (
                       <p style={{color:'var(--sage)'}}>Portfolio archive syncing... (Tag a Journal entry with "Portfolio" to display it here)</p>
                    )}
                  </div>
                </div>
              )}

              {/* SINGLE POST / ARTICLE VIEW */}
              {currentPost && (
                <div className="article-content">
                  <button onClick={() => navigate(currentPost.category?.toLowerCase().includes('portfolio') ? 'portfolio' : 'journal')} style={{background:'none', border:'none', color:'var(--wood)', fontWeight:'700', textTransform:'uppercase', fontSize:'0.75rem', letterSpacing:'0.1em', cursor:'pointer', padding:0, marginBottom:'2rem'}}>← BACK TO ARCHIVE</button>
                  <h1>{currentPost.title}</h1>
                  {currentPost.date && <span className="article-date">{currentPost.date}</span>}
                  <div className="article-body" dangerouslySetInnerHTML={{ __html: marked.parse(currentPost.content || '') }} />
                  {currentPost.category && (
                    <div className="article-tag-section">
                      {currentPost.category.split(',').map(t => <span key={t}>{t.trim()}</span>)}
                    </div>
                  )}
                </div>
              )}

              {/* RESUME VIEW */}
              {currentSlug === 'resume' && (
                <div className="resume-container">
                  <div className="resume-meta">
                    <h1>Jayme M. Carleton</h1>
                    <p>jayme@jaymecarleton.com &nbsp;|&nbsp; 425.289.6439</p>
                  </div>
                  {siteData.resume?.map((item, i) => (
                    <div key={i} className="res-row">
                      <div className="res-label">{item.label}</div>
                      <div className="res-content" dangerouslySetInnerHTML={{ __html: formatResumeHtml(item.content) }} />
                    </div>
                  ))}
                </div>
              )}

              <footer>
                <div className="social-links" style={{marginBottom: '1.5rem'}}>
                  <a href="https://www.linkedin.com/in/jaymecarleton" target="_blank" style={{textDecoration:'none', fontWeight:'700', fontSize:'0.8rem', textTransform:'uppercase', color:'var(--forest)', letterSpacing:'0.1em'}}>LinkedIn</a>
                </div>
                <div className="copyright">SECOND NATURE | &copy; 2015-2026. ALL RIGHTS RESERVED.</div>
                <div className="credit">Modernized by <a href="https://minescout.net/ai" target="_blank">Minescout AI</a></div>
              </footer>
            </main>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MainApp />);
  </script>
</body>
</html>
