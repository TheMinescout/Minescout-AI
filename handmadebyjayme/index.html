<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAYME M. CARLETON</title>
  
  <link rel="icon" type="image/png" href="https://jaymecarleton.com/wp-content/uploads/2015/11/leaf-only.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    :root {
      --forest: #2D3A2D;     
      --sage: #4F5D4F;       
      --wood: #C2A378;       
      --clay: #E8E2D6;       
      --wall: #F9F7F2;       
      --charcoal: #2C3333;   
      --white: #FFFFFF;
      --border: #e8e4dd;
      --font-header: 'Playfair Display', serif;
      --font-body: 'Inter', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: var(--wall); font-family: var(--font-body); color: var(--charcoal); line-height: 1.6; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
    a { color: var(--wood); text-decoration: none; transition: 0.2s; }
    a:hover { color: var(--forest); }

    /* --- SIDEBAR (OG Style) --- */
    .sidebar {
      width: 280px; background-color: var(--clay); padding: 4rem 2.5rem;
      position: fixed; height: 100vh; display: flex; flex-direction: column;
      border-right: 1px solid rgba(0,0,0,0.05); z-index: 1000;
    }
    .sidebar-brand { margin-bottom: 5rem; cursor: pointer; }
    .sidebar-brand h1 { font-family: var(--font-header); font-size: 1.6rem; color: var(--forest); text-transform: uppercase; letter-spacing: 0.15em; line-height: 1.2; font-weight: 500; }
    .nav-links { display: flex; flex-direction: column; gap: 1.75rem; }
    .nav-links button {
      background: none; border: none; text-align: left; color: var(--charcoal); font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.15em; font-size: 0.7rem; transition: 0.3s; opacity: 0.5; cursor: pointer;
    }
    .nav-links button:hover, .nav-links button.active { opacity: 1; color: var(--forest); transform: translateX(4px); }

    /* --- MAIN CONTENT --- */
    main { flex: 1; margin-left: 280px; padding: 5rem 4rem; max-width: 1400px; min-height: 100vh; }

    /* --- HERO --- */
    #hero-container { display: grid; grid-template-columns: 1.2fr 1.5fr; gap: 5rem; align-items: start; margin-top: 1rem; }
    .profile-card img { width: 100%; border-radius: 100px 30px 100px 30px; display: block; filter: contrast(1.02) saturate(0.95); }
    .profile-card img.is-logo { width: 128px; height: 128px; border-radius: 50%; mix-blend-mode: multiply; margin: 0 auto; }
    .hero-text h2 { font-family: var(--font-header); font-size: 2.5rem; color: var(--forest); text-transform: uppercase; margin-bottom: 1.5rem; }

    /* --- JOURNAL & PILLS (The OG Interaction) --- */
    .section-header-flex { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 3.5rem; border-bottom: 2px solid var(--clay); padding-bottom: 1.5rem; }
    .section-title { font-family: var(--font-header); font-size: 2.8rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--forest); }
    .filter-pills { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .pill { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; padding: 8px 16px; border: 1px solid var(--border); border-radius: 50px; cursor: pointer; background: var(--white); transition: 0.2s; }
    .pill.active { background: var(--forest); color: var(--white); border-color: var(--forest); }

    /* --- POST CARDS --- */
    .post-card { display: grid; grid-template-columns: 280px 1fr; gap: 3rem; background: var(--white); padding: 2.5rem; margin-bottom: 2.5rem; border-radius: 4px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); transition: 0.3s ease; }
    .post-card:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(0,0,0,0.04); }
    .post-thumb { width: 100%; height: 200px; object-fit: cover; border-radius: 2px; background: var(--clay); }
    .post-card h3 { font-family: var(--font-header); font-size: 2rem; margin-bottom: 1rem; text-transform: uppercase; color: var(--forest); }
    .post-card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; border-top: 1px solid var(--wall); padding-top: 1rem; }

    /* --- RESUME GRID --- */
    .resume-container { max-width: 1000px; margin: 0 auto; background: var(--white); padding: 6rem; border-radius: 4px; }
    .res-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; }
    .res-row { display: grid; grid-template-columns: 240px 1fr; gap: 4rem; margin-bottom: 3rem; }
    .res-label { font-weight: 700; text-transform: uppercase; font-size: 0.95rem; color: var(--charcoal); }

    /* --- ADMIN (FERN BACKEND) --- */
    .admin-card { background: white; border-radius: 8px; box-shadow: 0 30px 80px rgba(0,0,0,0.2); width: 100%; max-width: 1000px; overflow: hidden; }
    .admin-header { background: var(--forest); color: white; padding: 1.5rem 2rem; display: flex; justify-content: space-between; }
    .admin-content { padding: 2rem; background: #f9f9f9; }
    .btn-save { background: var(--forest); color: white; border: none; padding: 1rem; width: 100%; font-family: 'Space Mono', monospace; text-transform: uppercase; cursor: pointer; font-weight: bold; }
    textarea { width: 100%; font-family: 'Space Mono', monospace; font-size: 13px; padding: 1rem; border: 1px solid #ddd; border-radius: 4px; }

    @media (max-width: 1024px) {
      .sidebar { display: none; }
      main { margin-left: 0; padding: 2rem; }
      #hero-container, .post-card, .res-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const SITE_ID = "handmadebyjayme";
    const WORKER_URL = "https://backend.tmcarleton11.workers.dev/";

    const App = () => {
      const [view, setView] = useState('home');
      const [data, setData] = useState(""); // Raw Markdown from Worker
      const [siteObj, setSiteObj] = useState({ pages: {}, posts: [], tags: [] });
      const [filter, setFilter] = useState('all');
      const [loading, setLoading] = useState(true);
      const [adminKey, setAdminKey] = useState("");
      const [isAuthed, setIsAuthed] = useState(false);

      useEffect(() => {
        refreshData();
        if (window.location.hash === "#admin") setView('admin');
      }, []);

      const refreshData = async () => {
        try {
          const res = await fetch(WORKER_URL, { headers: { 'X-Site-Id': SITE_ID } });
          const raw = await res.text();
          setData(raw);
          processMarkdown(raw);
          setLoading(false);
        } catch (e) { console.error(e); }
      };

      const processMarkdown = (text) => {
        const pages = {};
        const posts = [];
        const tagsSet = new Set();
        const sections = text.split(/(^#\s+.*$)/m);

        for (let i = 1; i < sections.length; i += 2) {
          const title = sections[i].replace(/^#\s*/, '').trim();
          const content = sections[i + 1] ? sections[i + 1].trim() : '';
          const slug = title.toLowerCase().replace(/\s+/g, '-');

          const tagMatch = content.match(/Category:\s*([^\n\r]+)/i);
          const tags = tagMatch ? tagMatch[1].split(',').map(t => t.trim()) : [];
          tags.forEach(t => tagsSet.add(t));

          const imgMatch = content.match(/!\[.*?\]\((.*?)\)/);
          const thumb = imgMatch ? imgMatch[1] : '';
          const dateMatch = content.match(/\*\*Date:\s*(.*?)\*\*/i);

          const item = { title, content, html: marked.parse(content), slug, tags, thumb, date: dateMatch ? dateMatch[1] : '' };

          if (['portfolio', 'resume', 'contact', 'welcome', 'handmade'].includes(slug)) {
            pages[slug] = item;
          } else {
            posts.push(item);
          }
        }
        setSiteObj({ pages, posts, tags: Array.from(tagsSet).sort() });
      };

      const saveToWorker = async () => {
        const res = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Site-Id': SITE_ID },
          body: JSON.stringify({ key: adminKey, data: data })
        });
        if (res.ok) alert("Markdown Archive Saved.");
        else alert("Auth Failed.");
      };

      if (loading) return <div style={{padding:'5rem', textAlign:'center', fontFamily:'Playfair Display'}}>Synchronizing Archive...</div>;

      return (
        <div className="site-wrapper">
          {view !== 'admin' && (
            <nav className="sidebar">
              <div className="sidebar-brand" onClick={() => setView('home')}>
                <h1>Jayme M.<br/>Carleton</h1>
              </div>
              <div className="nav-links">
                {['journal', 'portfolio', 'handmade', 'resume', 'contact'].map(v => (
                  <button key={v} onClick={() => setView(v)} className={view === v ? 'active' : ''}>{v}</button>
                ))}
              </div>
            </nav>
          )}

          <main style={view === 'admin' ? {marginLeft: 0, display: 'flex', justifyContent: 'center', background: '#eee'} : {}}>
            {view === 'admin' ? (
              <div className="admin-card">
                <div className="admin-header">
                  <h3>BACKSTAGE ENGINE</h3>
                  <button onClick={() => setView('home')}>Exit</button>
                </div>
                {!isAuthed ? (
                  <div style={{padding:'2rem'}}>
                    <input type="password" placeholder="Key" onChange={e => setAdminKey(e.target.value)} style={{width:'100%', padding:'10px', marginBottom:'1rem'}} />
                    <button className="btn-save" onClick={() => setIsAuthed(true)}>Auth</button>
                  </div>
                ) : (
                  <div className="admin-content">
                    <p style={{fontSize:'11px', marginBottom:'10px'}}>Edit the Master Markdown File Below:</p>
                    <textarea rows="25" value={data} onChange={e => setData(e.target.value)} />
                    <button className="btn-save" onClick={saveToWorker} style={{marginTop:'1rem'}}>Update Live Site</button>
                  </div>
                )}
              </div>
            ) : (
              <div className="animate-in">
                {/* HERO PAGES */}
                {(view === 'home' || view === 'handmade' || view === 'contact') && (
                  <div id="hero-container">
                    <div className="profile-card">
                       <img src={view === 'handmade' ? "https://jaymecarleton.com/wp-content/uploads/2015/11/leaf-only.png" : "https://i.postimg.cc/NGX3ZDdw/PXL-20251224-004703169.jpg"} className={view === 'handmade' ? 'is-logo' : ''} />
                    </div>
                    <div className="hero-text">
                      <div dangerouslySetInnerHTML={{ __html: siteObj.pages[view === 'home' ? 'welcome' : view]?.html }} />
                    </div>
                  </div>
                )}

                {/* JOURNAL VIEW (WITH PILLS) */}
                {view === 'journal' && (
                  <div>
                    <div className="section-header-flex">
                      <h2 className="section-title">Journal</h2>
                      <div className="filter-pills">
                        <span className={`pill ${filter === 'all' ? 'active' : ''}`} onClick={() => setFilter('all')}>All</span>
                        {siteObj.tags.map(t => (
                          <span key={t} className={`pill ${filter === t ? 'active' : ''}`} onClick={() => setFilter(t)}>{t}</span>
                        ))}
                      </div>
                    </div>
                    {siteObj.posts.filter(p => filter === 'all' || p.tags.includes(filter)).map((post, idx) => (
                      <article key={idx} className="post-card">
                        <img src={post.thumb} className="post-thumb" />
                        <div className="post-card-content">
                          <h3>{post.title}</h3>
                          <div dangerouslySetInnerHTML={{ __html: post.html.substring(0, 300) + '...' }} />
                          <div className="post-card-footer">
                            <span style={{fontWeight:'bold', color:'var(--wood)'}}>Read Entry ➔</span>
                            <span className="post-date">{post.date}</span>
                          </div>
                        </div>
                      </article>
                    ))}
                  </div>
                )}

                {/* RESUME / PORTFOLIO GRIDS */}
                {(view === 'resume' || view === 'portfolio') && (
                  <div className="resume-container">
                    <h2 className="section-title">{view}</h2>
                    <div dangerouslySetInnerHTML={{ __html: siteObj.pages[view]?.html }} />
                  </div>
                )}
              </div>
            )}
          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
