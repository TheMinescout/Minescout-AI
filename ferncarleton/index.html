<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FERN CARLETON | Art & Reasoning</title>
  
  <link rel="icon" type="image/png" href="https://i.postimg.cc/c4TgCHfX/Chat-GPT-Image-Mar-8-2026-08-22-54-AM.png">

  <!-- Core Frameworks -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Caveat:wght@400;700&display=swap" rel="stylesheet">

  <style>
    /* --- FILTER-PROOF INTERNAL CSS --- */
    :root {
      --paper: #fdfcf8;
      --ink: #1a1a1a;
      --muted: #555555;
      --wc-blue: rgba(65, 105, 225, 0.35);
      --wc-gold: rgba(194, 163, 120, 0.35);
      --wc-lavender: rgba(147, 112, 219, 0.3);
      --forest: #2D3A2D;
      --accent: #C2A378;
      --sidebar-width: 320px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background-color: var(--paper);
      background-image: url("https://www.transparenttextures.com/patterns/paper.png");
      background-attachment: fixed;
      font-family: 'Inter', sans-serif;
      color: var(--ink);
      line-height: 1.6;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Background Watercolor Elements */
    .bg-wash-container { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
    .wash { position: absolute; border-radius: 50%; filter: blur(100px); mix-blend-mode: multiply; opacity: 0.8; }
    .wash-1 { top: -5%; left: 5%; width: 55vw; height: 55vh; background: var(--wc-blue); }
    .wash-2 { bottom: -10%; right: -5%; width: 45vw; height: 65vh; background: var(--wc-gold); }
    .wash-3 { top: 25%; right: 10%; width: 40vw; height: 45vh; background: var(--wc-lavender); }

    /* The High-Detail Torn Sidebar */
    .sidebar {
      width: var(--sidebar-width); padding: 2.5rem 3rem 4rem; position: fixed; height: 100vh;
      display: flex; flex-direction: column; 
      background: linear-gradient(165deg, rgba(100, 149, 237, 0.4) 0%, rgba(253, 252, 248, 0.9) 60%, rgba(253, 252, 248, 1) 100%);
      backdrop-filter: blur(15px);
      clip-path: polygon(0% 0%, 100% 0%, 98% 3%, 99.5% 7%, 97.2% 11%, 98.8% 15%, 96.1% 19%, 99.8% 24%, 97.6% 28%, 99.2% 33%, 96.4% 38%, 98.2% 44%, 95.7% 49%, 99.4% 55%, 97.1% 61%, 98.6% 67%, 96.3% 73%, 99.1% 79%, 97.4% 85%, 99.6% 92%, 98.1% 97%, 100% 100%, 0% 100%);
      z-index: 1200;
    }

    .brand { margin-bottom: 3.5rem; cursor: pointer; }
    .brand h1 { font-family: 'Lora', serif; font-size: 1.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; line-height: 1; }
    .brand span { font-family: 'Space Mono', monospace; font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.2em; color: var(--muted); display: block; margin-top: 8px; }

    nav ul { list-style: none; display: flex; flex-direction: column; gap: 1.5rem; }
    nav button { background: none; border: none; font-family: 'Lora', serif; font-style: italic; font-size: 1.1rem; text-align: left; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; opacity: 0.5; transition: 0.3s; color: var(--ink); outline: none; }
    nav button.active { opacity: 1; border-left: 2px solid var(--forest); padding-left: 10px; }

    main { margin-left: var(--sidebar-width); padding: 5rem 6rem; flex: 1; max-width: 1450px; }

    /* Content Styles */
    .page-title { font-family: 'Lora', serif; font-size: 4rem; color: var(--forest); margin-bottom: 2.5rem; font-weight: 400; line-height: 1; }
    
    .hero-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: start; }
    .hero-text { max-width: 550px; font-size: 1.15rem; color: #333; }
    .hero-img-wrap { background: white; padding: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); transform: rotate(-1.5deg); border-radius: 2px; }
    .hero-img-wrap img { width: 100%; border-radius: 1px; }

    .smart-row { display: grid; grid-template-columns: 260px 1fr; gap: 4rem; margin-bottom: 4.5rem; align-items: start; }
    .smart-label { font-family: 'Space Mono', monospace; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; border-left: 6px solid var(--wc-blue); padding-left: 22px; }

    .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 3.5rem; }
    .photo-card { background: white; padding: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border-radius: 2px; transition: transform 0.4s; }
    .photo-card:hover { transform: translateY(-10px) rotate(1deg); }
    .photo-card img { width: 100%; aspect-ratio: 1; object-fit: cover; }
    .photo-card h3 { font-family: 'Caveat', cursive; font-size: 1.6rem; text-align: right; margin-top: 10px; color: var(--muted); }

    .contact-card { background: rgba(255,255,255,0.6); padding: 4rem; border-radius: 2px; box-shadow: 0 15px 35px rgba(0,0,0,0.04); backdrop-filter: blur(10px); max-width: 700px; clip-path: polygon(1% 1%, 99% 0%, 100% 2%, 98% 8%, 100% 15%, 97% 22%, 99% 30%, 98% 38%, 100% 45%, 97% 55%, 99% 65%, 98% 75%, 100% 85%, 97% 95%, 99% 100%, 0% 100%, 2% 85%, 0% 70%, 3% 55%, 1% 40%, 4% 25%, 2% 10%); }

    footer { margin-top: 10rem; padding: 5rem 0; border-top: 1px solid var(--wc-blue); font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--muted); display: flex; justify-content: space-between; align-items: center; }

    @media (max-width: 1024px) {
      .sidebar { display: none; }
      main { margin-left: 0; padding: 4rem 1.5rem; }
      .hero-grid, .smart-row { grid-template-columns: 1fr; gap: 2rem; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const App = () => {
      const [activeTab, setActiveTab] = useState('home');
      const [siteContent, setSiteContent] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        // Fetch CMS data with cache-busting timestamp
        fetch('./content/site-data.json?t=' + Date.now())
          .then(res => res.json())
          .then(data => {
            setSiteContent(data);
            setLoading(false);
          })
          .catch(err => {
            console.warn("Content initialized via CMS required.");
            setLoading(false);
          });
      }, []);

      if (loading) return <div style={{height: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'Lora', fontStyle: 'italic', color: '#c2a378'}}>Preparing the canvas...</div>;
      if (!siteContent) return <div style={{padding: '5rem', fontFamily: 'monospace', opacity: 0.4}}>Please set up content/site-data.json in your GitHub repository.</div>;

      return (
        <div>
          <div className="bg-wash-container">
            <div className="wash wash-1"></div>
            <div className="wash wash-2"></div>
            <div className="wash wash-3"></div>
          </div>

          <aside className="sidebar">
            <div className="brand" onClick={() => setActiveTab('home')}>
              <div style={{width: '60px', height: '60px', background: 'gray', borderRadius: '50%', marginBottom: '20px', overflow: 'hidden'}}>
                 <img src="https://i.postimg.cc/c4TgCHfX/Chat-GPT-Image-Mar-8-2026-08-22-54-AM.png" style={{width: '100%', height: '100%', objectFit: 'cover'}} />
              </div>
              <h1>Fern<br/>Carleton</h1>
              <span>Art & Reasoning</span>
            </div>
            <nav>
              <ul>
                {['photos', 'skills', 'resume', 'about', 'contact'].map(t => (
                  <li key={t}><button onClick={() => setActiveTab(t)} className={activeTab === t ? 'active' : ''}>{t}</button></li>
                ))}
              </ul>
            </nav>
            <div style={{marginTop: 'auto', opacity: 0.3, fontFamily: 'Space Mono', fontSize: '9px'}}>ARCHIVE v37.0 MASTER</div>
          </aside>

          <main>
            {activeTab === 'home' && <HeroView data={siteContent.welcome} />}
            {activeTab === 'about' && <HeroView data={siteContent.about} />}
            {activeTab === 'skills' && <GridView title="Skills" items={siteContent.skills} />}
            {activeTab === 'resume' && <GridView title="Resume" items={siteContent.resume} />}
            {activeTab === 'photos' && <GalleryView items={siteContent.photos} />}
            {activeTab === 'contact' && <ContactView data={siteContent.contact} />}

            <footer>
              <span>&copy; 2026 Fern Carleton &bull; Minescout Studio</span>
              <a href="./admin/" style={{color: 'inherit', textDecoration: 'none', fontSize: '10px'}}>[Studio Login]</a>
            </footer>
          </main>
        </div>
      );
    };

    const HeroView = ({ data }) => (
      <div className="hero-grid">
        <div className="hero-text">
          <h2 className="page-title">{data.title}</h2>
          <p>{data.text}</p>
        </div>
        <div className="hero-img-wrap">
          <img src={data.image} alt="Studio Visual" />
        </div>
      </div>
    );

    const GridView = ({ title, items }) => (
      <div>
        <h2 className="page-title">{title}</h2>
        {items && items.map((item, idx) => (
          <div key={idx} className="smart-row">
            <div className="smart-label">{item.label}</div>
            <div className="smart-content" dangerouslySetInnerHTML={{__html: item.content}}></div>
          </div>
        ))}
      </div>
    );

    const GalleryView = ({ items }) => (
      <div>
        <h2 className="page-title">Photography</h2>
        <div className="photo-grid">
          {items && items.map((img, idx) => (
            <div key={idx} className="photo-card">
              <img src={img.url} />
              <h3>{img.title}</h3>
            </div>
          ))}
        </div>
      </div>
    );

    const ContactView = ({ data }) => (
      <div className="contact-card">
        <h2 style={{fontFamily: 'Lora', fontSize: '3rem', marginBottom: '1rem'}}>{data.title}</h2>
        <p style={{fontStyle: 'italic', marginBottom: '2rem'}}>{data.text}</p>
        <div style={{display: 'flex', flexDirection: 'column', gap: '2rem'}}>
          <div style={{borderBottom: '1px solid #ddd', paddingBottom: '10px'}}><label style={{fontSize: '9px', fontWeight: 'bold', textTransform: 'uppercase', color: '#c2a378'}}>Name</label></div>
          <div style={{borderBottom: '1px solid #ddd', paddingBottom: '10px'}}><label style={{fontSize: '9px', fontWeight: 'bold', textTransform: 'uppercase', color: '#c2a378'}}>Email</label></div>
          <button style={{background: '#2d3a2d', color: 'white', padding: '1.2rem', border: 'none', borderRadius: '2px', fontWeight: 'bold', textTransform: 'uppercase', letterSpacing: '0.2em'}}>Send Message</button>
        </div>
      </div>
    );

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
