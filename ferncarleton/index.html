<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FERN CARLETON | Art & Reasoning</title>
  
  <link rel="icon" type="image/png" href="https://i.postimg.cc/c4TgCHfX/Chat-GPT-Image-Mar-8-2026-08-22-54-AM.png">

  <!-- Core Frameworks -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- EmailJS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Caveat:wght@400;700&display=swap" rel="stylesheet">

  <style>
    /* --- MINESCOUT BACKEND SYSTEM v52.0 --- */
    :root {
      --paper: #fdfcf8;
      --ink: #1a1a1a;
      --muted: #555555;
      --wc-blue: rgba(65, 105, 225, 0.35);
      --wc-gold: rgba(194, 163, 120, 0.35);
      --wc-lavender: rgba(147, 112, 219, 0.3);
      --forest: #2D3A2D;
      --accent: #C2A378;
      --sidebar-width: 320px;
      --header-height: 70px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background-color: var(--paper);
      background-image: url("https://www.transparenttextures.com/patterns/paper.png");
      background-attachment: fixed;
      font-family: 'Inter', sans-serif;
      color: var(--ink);
      line-height: 1.6;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Washes */
    .bg-wash-container { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
    .wash { position: absolute; border-radius: 50%; filter: blur(100px); mix-blend-mode: multiply; opacity: 0.8; }
    .wash-1 { top: -5%; left: 5%; width: 55vw; height: 55vh; background: var(--wc-blue); }
    .wash-2 { bottom: -10%; right: -5%; width: 45vw; height: 65vh; background: var(--wc-gold); }
    .wash-3 { top: 25%; right: 10%; width: 40vw; height: 45vh; background: var(--wc-lavender); }

    /* Sidebar Fix */
    .sidebar {
      width: var(--sidebar-width); padding: 2.5rem 3rem 4rem; position: fixed; height: 100vh;
      display: flex; flex-direction: column; 
      background: linear-gradient(165deg, rgba(100, 149, 237, 0.4) 0%, rgba(253, 252, 248, 0.9) 60%, rgba(253, 252, 248, 1) 100%);
      backdrop-filter: blur(15px);
      clip-path: polygon(0% 0%, 100% 0%, 98% 3%, 99.5% 7%, 97.2% 11%, 98.8% 15%, 96.1% 19%, 99.8% 24%, 97.6% 28%, 99.2% 33%, 96.4% 38%, 98.2% 44%, 95.7% 49%, 99.4% 55%, 97.1% 61%, 98.6% 67%, 96.3% 73%, 99.1% 79%, 97.4% 85%, 99.6% 92%, 98.1% 97%, 100% 100%, 0% 100%);
      z-index: 2000;
    }

    .brand { margin-bottom: 3.5rem; cursor: pointer; }
    .brand h1 { font-family: 'Lora', serif; font-size: 1.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; line-height: 1; }
    .brand span { font-family: 'Space Mono', monospace; font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.2em; color: var(--muted); display: block; margin-top: 8px; }

    /* Navigation Fix */
    .nav-list { display: flex; flex-direction: column; gap: 1.5rem; }
    .nav-btn { background: none; border: none; font-family: 'Lora', serif; font-style: italic; font-size: 1.1rem; text-align: left; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; opacity: 0.5; transition: 0.3s; color: var(--ink); outline: none; }
    .nav-btn.active { opacity: 1; border-left: 2px solid var(--forest); padding-left: 10px; }

    main { margin-left: var(--sidebar-width); padding: 5rem 6rem; flex: 1; max-width: 1450px; }

    /* Admin UI Enhancement */
    .admin-card { background: white; padding: 3rem; border-radius: 4px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); width: 100%; max-width: 1000px; margin: 0 auto; }
    .admin-instruction { background: #f4f7f4; border-left: 4px solid var(--forest); padding: 1.5rem; margin-bottom: 2rem; font-size: 0.85rem; color: #444; }
    .admin-instruction code { background: white; padding: 2px 4px; border-radius: 2px; font-weight: bold; }
    
    .admin-section-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; margin: 3rem 0 2rem; padding-bottom: 0.5rem; }
    .admin-section-header h3 { font-family: 'Lora', serif; font-size: 1.5rem; }
    
    .input-group { margin-bottom: 2rem; border-bottom: 1px solid #eee; padding-bottom: 1rem; }
    .input-group label { display: block; font-family: 'Space Mono', monospace; font-size: 10px; text-transform: uppercase; color: var(--accent); margin-bottom: 5px; font-weight: 700; }
    .input-group input, .input-group textarea { width: 100%; border: none; background: none; font-size: 1.1rem; outline: none; color: var(--ink); font-family: inherit; }
    .input-group textarea { min-height: 80px; resize: vertical; }

    .btn-action { background: var(--forest); color: white; border: none; padding: 1.2rem 2.5rem; font-family: 'Space Mono'; font-weight: bold; text-transform: uppercase; cursor: pointer; border-radius: 2px; transition: 0.2s; }
    .btn-action:hover { background: var(--ink); transform: translateY(-2px); }
    .btn-outline { background: none; border: 1px solid #ccc; color: #666; padding: 0.5rem 1rem; font-size: 10px; text-transform: uppercase; cursor: pointer; font-family: 'Space Mono'; }
    .btn-outline:hover { border-color: var(--ink); color: var(--ink); }

    /* Content Styling */
    .page-title { font-family: 'Lora', serif; font-size: 4rem; color: var(--forest); margin-bottom: 2.5rem; font-weight: 400; }
    .hero-grid { display: grid; grid-template-columns: 1fr 1.1fr; gap: 5.5rem; align-items: start; }
    .hero-img-wrap { background: white; padding: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); transform: rotate(-1.5deg); }
    .hero-img-wrap img { width: 100%; }

    .smart-row { display: grid; grid-template-columns: 260px 1fr; gap: 4rem; margin-bottom: 4.5rem; }
    .smart-label { font-family: 'Space Mono', monospace; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; border-left: 6px solid var(--wc-blue); padding-left: 22px; }

    .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 3.5rem; }
    .photo-card { background: white; padding: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border-radius: 2px; }
    .photo-card img { width: 100%; aspect-ratio: 1; object-fit: cover; }
    .photo-card h3 { font-family: 'Caveat', cursive; font-size: 1.6rem; text-align: right; margin-top: 10px; color: var(--muted); }

    .contact-card { background: rgba(255,255,255,0.6); padding: 4rem; border-radius: 2px; box-shadow: 0 15px 35px rgba(0,0,0,0.04); backdrop-filter: blur(10px); max-width: 700px; margin: 0 auto; clip-path: polygon(1% 1%, 99% 0%, 100% 2%, 98% 8%, 100% 15%, 97% 22%, 99% 30%, 98% 38%, 100% 45%, 97% 55%, 99% 65%, 98% 75%, 100% 85%, 97% 95%, 99% 100%, 0% 100%, 2% 85%, 0% 70%, 3% 55%, 1% 40%, 4% 25%, 2% 10%); }

    @media (max-width: 1024px) {
      .sidebar { display: none; }
      main { margin-left: 0; padding: 2rem; }
      .page-title { font-size: 2.8rem; }
      .hero-grid, .smart-row { grid-template-columns: 1fr; gap: 2rem; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- CONFIGURATION ---
    const WORKER_URL = "https://backend.tmcarleton11.workers.dev/"; 
    const EMAILJS_KEY = "1tk_WpVfkT1oGuS4P";
    const EMAILJS_SERVICE = "service_91osf0m";
    const EMAILJS_TEMPLATE = "template_n98oiz5";

    const App = () => {
      const [view, setView] = useState('home');
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [adminKey, setAdminKey] = useState("");
      const [isAuthed, setIsAuthed] = useState(false);

      useEffect(() => {
        if (window.emailjs) emailjs.init(EMAILJS_KEY);

        // Fetch Archive Data
        fetch(WORKER_URL)
          .then(res => res.json())
          .then(d => { 
            // Fallback for missing arrays
            if(!d.photos) d.photos = [];
            if(!d.skills) d.skills = [];
            if(!d.resume) d.resume = [];
            setData(d); 
            setLoading(false); 
          })
          .catch(e => { console.error("Archive sync failed", e); setLoading(false); });

        if (window.location.hash === "#admin") setView('admin');
      }, []);

      const saveChanges = async () => {
        const response = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key: adminKey, data: data })
        });
        if (response.ok) { alert("Archive Updated Instantly!"); } 
        else { alert("Verification Failed."); }
      };

      const addListItem = (target) => {
        const newItem = target === 'photos' ? { title: "New Entry", url: "" } : { label: "Category", content: "Details..." };
        setData({ ...data, [target]: [...(data[target] || []), newItem] });
      };

      const updateListItem = (target, index, field, value) => {
        const newList = [...data[target]];
        newList[index][field] = value;
        setData({ ...data, [target]: newList });
      };

      const removeListItem = (target, index) => {
        setData({ ...data, [target]: data[target].filter((_, i) => i !== index) });
      };

      if (loading) return <div style={{height:'100vh', display:'flex', alignItems:'center', justifyContent:'center', fontFamily:'Lora', fontStyle:'italic', color: '#c2a378'}}>Restoring Archive...</div>;
      
      if (!data) return <div style={{padding:'5rem', textAlign:'center'}}>Connection to backend failed.</div>;

      return (
        <div className="flex">
          <div className="bg-wash-container"><div className="wash wash-1"></div><div className="wash wash-2"></div><div className="wash wash-3"></div></div>

          {view !== 'admin' && (
            <aside className="sidebar">
              <div className="brand" onClick={() => setView('home')}>
                <h1>Fern<br/>Carleton</h1>
                <span className="font-mono text-[10px] uppercase text-[#c2a378] mt-2 block tracking-widest">Art & Reasoning</span>
              </div>
              <nav className="nav-list mt-12">
                {['home', 'photos', 'skills', 'resume', 'about', 'contact'].map(tab => (
                  <button key={tab} onClick={() => setView(tab)} className={`nav-btn ${view === tab ? 'active' : ''}`}>{tab}</button>
                ))}
              </nav>
            </aside>
          )}

          <main className={view === 'admin' ? 'w-full ml-0 py-20 flex justify-center' : ''}>
            {view === 'admin' ? (
              <div className="admin-card">
                <h2 className="font-serif text-3xl mb-4 border-b pb-4">Studio Backstage</h2>
                
                {!isAuthed ? (
                  <div className="space-y-6">
                    <div className="admin-instruction">
                      Enter your <code>ADMIN_SECRET</code> key below to unlock editing for all pages.
                    </div>
                    <label className="font-mono text-[10px] uppercase font-bold text-[#c2a378]">Verification Required</label>
                    <input type="password" placeholder="ADMIN_SECRET..." className="admin-input border-b border-black w-full outline-none py-2" onChange={e => setAdminKey(e.target.value)} />
                    <button className="btn-action" onClick={() => setIsAuthed(true)}>Verify Access</button>
                  </div>
                ) : (
                  <div className="space-y-12 animate-in fade-in duration-500">
                    <div className="admin-instruction">
                      <strong>Instructions:</strong> To add photos, use <a href="https://postimg.cc" target="_blank" style={{textDecoration:'underline'}}>PostImg.cc</a>. Upload your photo, then copy the <code>Direct Link</code> (it must end in .jpg or .png) and paste it into the URL box below.
                    </div>

                    <section>
                      <div className="admin-section-header"><h3>Welcome Page</h3></div>
                      <div className="input-group"><label>Headline</label><input value={data.welcome?.title || ''} onChange={e => setData({...data, welcome: {...data.welcome, title: e.target.value}})} /></div>
                      <div className="input-group"><label>Description</label><textarea value={data.welcome?.text || ''} onChange={e => setData({...data, welcome: {...data.welcome, text: e.target.value}})} /></div>
                      <div className="input-group"><label>Hero Image URL</label><input value={data.welcome?.image || ''} onChange={e => setData({...data, welcome: {...data.welcome, image: e.target.value}})} /></div>
                    </section>

                    <section>
                      <div className="admin-section-header"><h3>About Page</h3></div>
                      <div className="input-group"><label>Headline</label><input value={data.about?.title || ''} onChange={e => setData({...data, about: {...data.about, title: e.target.value}})} /></div>
                      <div className="input-group"><label>Bio Body Text</label><textarea value={data.about?.text || ''} onChange={e => setData({...data, about: {...data.about, text: e.target.value}})} /></div>
                      <div className="input-group"><label>Portrait URL</label><input value={data.about?.image || ''} onChange={e => setData({...data, about: {...data.about, image: e.target.value}})} /></div>
                    </section>

                    <section>
                      <div className="admin-section-header">
                        <h3>Photography Gallery</h3>
                        <button onClick={() => addListItem('photos')} className="btn-outline">+ Post New Photo</button>
                      </div>
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                        {data.photos.map((p, i) => (
                          <div key={i} className="p-6 border border-dashed border-gray-200 rounded">
                            <div className="input-group"><label>Title</label><input value={p.title} onChange={e => updateListItem('photos', i, 'title', e.target.value)} /></div>
                            <div className="input-group"><label>Direct Image URL (.jpg)</label><input value={p.url} onChange={e => updateListItem('photos', i, 'url', e.target.value)} /></div>
                            <button onClick={() => removeListItem('photos', i)} className="text-[9px] font-bold text-red-500 uppercase">Delete Post</button>
                          </div>
                        ))}
                      </div>
                    </section>

                    <section>
                      <div className="admin-section-header">
                        <h3>Skills Grid</h3>
                        <button onClick={() => addListItem('skills')} className="btn-outline">+ Add Skill Row</button>
                      </div>
                      {data.skills.map((s, i) => (
                        <div key={i} className="flex gap-10 mb-8 border-l-4 border-gray-100 pl-4">
                          <div className="w-1/3 input-group"><label>Label</label><input value={s.label} onChange={e => updateListItem('skills', i, 'label', e.target.value)} /></div>
                          <div className="w-2/3 input-group"><label>Details</label><textarea value={s.content} onChange={e => updateListItem('skills', i, 'content', e.target.value)} /></div>
                          <button onClick={() => removeListItem('skills', i)} className="text-red-300">×</button>
                        </div>
                      ))}
                    </section>

                    <section>
                      <div className="admin-section-header">
                        <h3>Resume Grid</h3>
                        <button onClick={() => addListItem('resume')} className="btn-outline">+ Add Resume Row</button>
                      </div>
                      {data.resume.map((r, i) => (
                        <div key={i} className="flex gap-10 mb-8 border-l-4 border-gray-100 pl-4">
                          <div className="w-1/3 input-group"><label>Year / Category</label><input value={r.label} onChange={e => updateListItem('resume', i, 'label', e.target.value)} /></div>
                          <div className="w-2/3 input-group"><label>Experience Details</label><textarea value={r.content} onChange={e => updateListItem('resume', i, 'content', e.target.value)} /></div>
                          <button onClick={() => removeListItem('resume', i)} className="text-red-300">×</button>
                        </div>
                      ))}
                    </section>
                    
                    <button className="btn-action w-full" onClick={saveChanges}>Push Changes Instantly</button>
                    <button onClick={() => setView('home')} className="block mx-auto text-[10px] uppercase opacity-40 font-bold mt-10">Return to Portfolio</button>
                  </div>
                )}
              </div>
            ) : (
              <div className="animate-in fade-in duration-700">
                {view === 'home' && <Hero data={data.welcome} />}
                {view === 'about' && <Hero data={data.about} />}
                {view === 'photos' && <Gallery items={data.photos} />}
                {view === 'skills' && <SmartGrid title="Skills" items={data.skills} />}
                {view === 'resume' && <SmartGrid title="Resume" items={data.resume} />}
                {view === 'contact' && <ContactView data={data.contact} service={EMAILJS_SERVICE} template={EMAILJS_TEMPLATE} />}
              </div>
            )}
          </main>
        </div>
      );
    };

    /** --- UI COMPONENTS --- */
    const Hero = ({ data }) => (
        <div className="hero-grid">
            <div className="hero-text"><h2 className="page-title leading-tight">{data?.title}</h2><p className="text-xl text-gray-700">{data?.text}</p></div>
            <div className="hero-img-wrap"><img src={data?.image} className="w-full shadow-lg" alt="Studio View" /></div>
        </div>
    );

    const Gallery = ({ items }) => (
        <div><h2 className="page-title">Photography</h2><div className="photo-grid">
            {items && items.map((p, i) => (
                <div key={i} className="photo-card"><img src={p.url} alt={p.title} /><h3 className="font-handwriting text-2xl text-right mt-4 text-[#555]">{p.title}</h3></div>
            ))}
        </div></div>
    );

    const SmartGrid = ({ title, items }) => (
        <div><h2 className="page-title">{title}</h2>{items && items.map((item, i) => (
            <div key={i} className="smart-row"><div className="smart-label">{item.label}</div><div className="text-lg text-gray-700 leading-relaxed">{item.content}</div></div>
        ))}</div>
    );

    const ContactView = ({ data, service, template }) => {
        const formRef = useRef();
        const [sent, setSent] = useState(false);
        const [status, setStatus] = useState("Deliver Inquiry");

        const sendEmail = (e) => {
            e.preventDefault(); 
            setStatus("Sending...");
            emailjs.sendForm(service, template, formRef.current)
                .then(() => setSent(true))
                .catch((err) => { console.error(err); setStatus("Error - Try Again"); });
        };

        if (sent) return (
            <div className="contact-card">
                <h2 className="font-serif text-3xl mb-4 text-green-700">Inquiry Delivered.</h2>
                <p className="italic">Your message has been added to the PNW Archive. I will respond to your reasoning shortly.</p>
            </div>
        );

        return (
            <div className="contact-card">
                <h2 className="font-serif text-5xl mb-6">{data?.title}</h2>
                <p className="italic text-gray-600 mb-12">{data?.text}</p>
                <form ref={formRef} onSubmit={sendEmail}>
                    <div className="input-group"><label>Your Name</label><input className="w-full font-serif text-xl italic" type="text" name="user_name" required /></div>
                    <div className="input-group"><label>Your Email</label><input className="w-full font-serif text-xl italic" type="email" name="user_email" required /></div>
                    <div className="input-group" style={{border:'none'}}><label>Share your reasoning</label><textarea className="w-full font-serif text-xl italic min-h-[150px] border-b outline-none" name="message" required></textarea></div>
                    <button type="submit" className="btn-action w-full">{status}</button>
                </form>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
