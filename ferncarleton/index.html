<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FERN CARLETON | Art & Reasoning</title>
  
  <link rel="icon" type="image/png" href="https://i.postimg.cc/c4TgCHfX/Chat-GPT-Image-Mar-8-2026-08-22-54-AM.png">

  <!-- Core Frameworks -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- EmailJS SDK Integration -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Caveat:wght@400;700&display=swap" rel="stylesheet">

  <style>
    /* --- THE MINESCOUT FILTER-PROOF SYSTEM v44.0 --- */
    :root {
      --paper: #fdfcf8;
      --ink: #1a1a1a;
      --muted: #555555;
      --wc-blue: rgba(65, 105, 225, 0.35);
      --wc-gold: rgba(194, 163, 120, 0.35);
      --wc-lavender: rgba(147, 112, 219, 0.3);
      --forest: #2D3A2D;
      --accent: #C2A378;
      --sidebar-width: 320px;
      --header-height: 70px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background-color: var(--paper);
      background-image: url("https://www.transparenttextures.com/patterns/paper.png");
      background-attachment: fixed;
      font-family: 'Inter', sans-serif;
      color: var(--ink);
      line-height: 1.6;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .bg-wash-container { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
    .wash { position: absolute; border-radius: 50%; filter: blur(100px); mix-blend-mode: multiply; opacity: 0.8; }
    .wash-1 { top: -5%; left: 5%; width: 55vw; height: 55vh; background: var(--wc-blue); }
    .wash-2 { bottom: -10%; right: -5%; width: 45vw; height: 65vh; background: var(--wc-gold); }
    .wash-3 { top: 25%; right: 10%; width: 40vw; height: 45vh; background: var(--wc-lavender); }

    /* The High-Detail Torn Sidebar */
    .sidebar {
      width: var(--sidebar-width); padding: 2.5rem 3rem 4rem; position: fixed; height: 100vh;
      display: flex; flex-direction: column; 
      background: linear-gradient(165deg, rgba(100, 149, 237, 0.4) 0%, rgba(253, 252, 248, 0.9) 60%, rgba(253, 252, 248, 1) 100%);
      backdrop-filter: blur(15px);
      clip-path: polygon(0% 0%, 100% 0%, 98% 3%, 99.5% 7%, 97.2% 11%, 98.8% 15%, 96.1% 19%, 99.8% 24%, 97.6% 28%, 99.2% 33%, 96.4% 38%, 98.2% 44%, 95.7% 49%, 99.4% 55%, 97.1% 61%, 98.6% 67%, 96.3% 73%, 99.1% 79%, 97.4% 85%, 99.6% 92%, 98.1% 97%, 100% 100%, 0% 100%);
      z-index: 2000;
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .brand { margin-bottom: 3.5rem; cursor: pointer; }
    .brand h1 { font-family: 'Lora', serif; font-size: 1.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; line-height: 1; }
    .brand span { font-family: 'Space Mono', monospace; font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.2em; color: var(--muted); display: block; margin-top: 8px; }

    nav ul { list-style: none; display: flex; flex-direction: column; gap: 1.5rem; }
    nav button { background: none; border: none; font-family: 'Lora', serif; font-style: italic; font-size: 1.1rem; text-align: left; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; opacity: 0.5; transition: 0.3s; color: var(--ink); outline: none; }
    nav button.active { opacity: 1; border-left: 2px solid var(--forest); padding-left: 10px; }

    .mobile-header {
      display: none;
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--header-height);
      background: rgba(253, 252, 248, 0.95);
      backdrop-filter: blur(10px);
      padding: 0 1.5rem;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      z-index: 1500;
    }
    .mobile-logo { font-family: 'Lora', serif; font-weight: 700; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 0.05em; }
    .hamburger { background: none; border: none; cursor: pointer; padding: 10px; display: flex; flex-direction: column; gap: 5px; }
    .hamburger span { display: block; width: 22px; height: 2px; background: var(--ink); border-radius: 2px; transition: 0.3s; }

    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.1); backdrop-filter: blur(2px); z-index: 1900; opacity: 0; pointer-events: none; transition: 0.3s; }
    .overlay.active { opacity: 1; pointer-events: auto; }

    main { margin-left: var(--sidebar-width); padding: 5rem 6rem; flex: 1; max-width: 1450px; transition: 0.3s; }

    .page-title { font-family: 'Lora', serif; font-size: 4rem; color: var(--forest); margin-bottom: 2.5rem; font-weight: 400; line-height: 1; }
    .hero-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: start; }
    .hero-text { max-width: 550px; font-size: 1.15rem; color: #333; }
    .hero-img-wrap { background: white; padding: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); transform: rotate(-1.5deg); border-radius: 2px; }
    .hero-img-wrap img { width: 100%; border-radius: 1px; }

    .smart-row { display: grid; grid-template-columns: 260px 1fr; gap: 4rem; margin-bottom: 4.5rem; align-items: start; }
    .smart-label { font-family: 'Space Mono', monospace; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; border-left: 6px solid var(--wc-blue); padding-left: 22px; }

    .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 3.5rem; }
    .photo-card { background: white; padding: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border-radius: 2px; transition: transform 0.4s; }
    .photo-card img { width: 100%; aspect-ratio: 1; object-fit: cover; }
    .photo-card h3 { font-family: 'Caveat', cursive; font-size: 1.6rem; text-align: right; margin-top: 10px; color: var(--muted); }

    .contact-card { 
      background: rgba(255,255,255,0.6); 
      padding: 4rem; 
      border-radius: 2px; 
      box-shadow: 0 15px 35px rgba(0,0,0,0.04); 
      backdrop-filter: blur(10px); 
      max-width: 700px; 
      clip-path: polygon(1% 1%, 99% 0%, 100% 2%, 98% 8%, 100% 15%, 97% 22%, 99% 30%, 98% 38%, 100% 45%, 97% 55%, 99% 65%, 98% 75%, 100% 85%, 97% 95%, 99% 100%, 0% 100%, 2% 85%, 0% 70%, 3% 55%, 1% 40%, 4% 25%, 2% 10%); 
    }
    
    .form-group { position: relative; margin-bottom: 2rem; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 5px; }
    .form-group label { display: block; font-family: 'Space Mono', monospace; font-size: 9px; font-weight: 700; text-transform: uppercase; color: var(--accent); margin-bottom: 5px; }
    .form-group input, .form-group textarea {
      width: 100%;
      background: none;
      border: none;
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 1.2rem;
      color: var(--ink);
      outline: none;
      padding: 5px 0;
    }
    .form-group textarea { resize: none; min-height: 100px; }

    .submit-btn {
      background: var(--forest);
      color: white;
      padding: 1.5rem;
      border: none;
      width: 100%;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(45, 58, 45, 0.2);
      transition: 0.3s;
    }
    .submit-btn:hover { background: var(--ink); transform: translateY(-2px); }
    .submit-btn:disabled { background: #ccc; cursor: not-allowed; }

    footer { margin-top: 10rem; padding: 5rem 0; border-top: 1px solid var(--wc-blue); font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--muted); }

    @media (max-width: 1024px) {
      .mobile-header { display: flex; }
      .sidebar { transform: translateX(-100%); }
      .sidebar.active { transform: translateX(0); box-shadow: 20px 0 50px rgba(0,0,0,0.1); }
      main { margin-left: 0; padding: calc(var(--header-height) + 3rem) 1.5rem 4rem 1.5rem; }
      .hero-grid, .smart-row { grid-template-columns: 1fr; gap: 2rem; }
      .page-title { font-size: 2.8rem; }
      .contact-card { padding: 3rem 1.5rem; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- EMAILJS ACTIVATION ---
    const EMAILJS_SERVICE_ID = "service_91osf0m"; 
    const EMAILJS_TEMPLATE_ID = "template_n98oiz5";
    const EMAILJS_PUBLIC_KEY = "1tk_WpVfkT1oGuS4P";

    const App = () => {
      const [activeTab, setActiveTab] = useState('home');
      const [isMenuOpen, setIsMenuOpen] = useState(false);
      const [siteContent, setSiteContent] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        // Initialize EmailJS with Fern's public key
        if (typeof emailjs !== 'undefined') {
          emailjs.init(EMAILJS_PUBLIC_KEY);
        }

        // Fetch the PNW archive content
        fetch('./content/site-data.json?v=' + Date.now())
          .then(res => res.json())
          .then(data => { setSiteContent(data); setLoading(false); })
          .catch(err => { console.warn("Content sync required."); setLoading(false); });
      }, []);

      const changeTab = (t) => { setActiveTab(t); setIsMenuOpen(false); window.scrollTo({ top: 0, behavior: 'smooth' }); };

      if (loading) return <div style={{height: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'Lora', fontStyle: 'italic', color: '#c2a378'}}>Preparing the studio...</div>;
      
      if (!siteContent) return <div style={{height: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', opacity: 0.5}}>Awaiting Content Sync.</div>;

      return (
        <div>
          <div className="bg-wash-container"><div className="wash wash-1"></div><div className="wash wash-2"></div><div className="wash wash-3"></div></div>
          
          <header className="mobile-header">
              <div className="mobile-logo">Fern Carleton</div>
              <button className="hamburger" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                  <span style={{transform: isMenuOpen ? 'rotate(45deg) translate(5px, 5px)' : 'none'}}></span>
                  <span style={{opacity: isMenuOpen ? '0' : '1'}}></span>
                  <span style={{transform: isMenuOpen ? 'rotate(-45deg) translate(5px, -5px)' : 'none'}}></span>
              </button>
          </header>

          <div className={`overlay ${isMenuOpen ? 'active' : ''}`} onClick={() => setIsMenuOpen(false)}></div>

          <aside className={`sidebar ${isMenuOpen ? 'active' : ''}`}>
            <div className="brand" onClick={() => changeTab('home')}>
              <div style={{width: '64px', height: '64px', borderRadius: '50%', marginBottom: '20px', overflow: 'hidden', border: '1px solid rgba(0,0,0,0.05)', background: 'white'}}>
                 <img src="https://i.postimg.cc/c4TgCHfX/Chat-GPT-Image-Mar-8-2026-08-22-54-AM.png" style={{width: '100%', height: '100%', objectFit: 'cover'}} />
              </div>
              <h1>Fern<br/>Carleton</h1>
              <span>Art & Reasoning</span>
            </div>
            <nav>
              <ul>{['photos', 'skills', 'resume', 'about', 'contact'].map(t => (
                <li key={t}><button onClick={() => changeTab(t)} className={activeTab === t ? 'active' : ''}>{t}</button></li>
              ))}</ul>
            </nav>
            <div style={{marginTop: 'auto', opacity: 0.3, fontFamily: 'Space Mono', fontSize: '9px'}}>ARCHIVE v44.0 ACTIVE</div>
          </aside>

          <main>
            <div key={activeTab}>
                {activeTab === 'home' && <HeroView data={siteContent.welcome} />}
                {activeTab === 'about' && <HeroView data={siteContent.about} />}
                {activeTab === 'skills' && <GridView title="Skills" items={siteContent.skills} />}
                {activeTab === 'resume' && <GridView title="Resume" items={siteContent.resume} />}
                {activeTab === 'photos' && <GalleryView items={siteContent.photos} />}
                {activeTab === 'contact' && <ContactView data={siteContent.contact} />}
            </div>
            <footer><span>&copy; 2026 Fern Carleton &bull; Developed by Thomas Carleton</span></footer>
          </main>
        </div>
      );
    };

    const HeroView = ({ data }) => (
      <div className="hero-grid">
        <div className="hero-text"><h2 className="page-title">{data.title}</h2><p>{data.text}</p></div>
        <div className="hero-img-wrap"><img src={data.image} alt="Studio Work" /></div>
      </div>
    );

    const GridView = ({ title, items }) => (
      <div><h2 className="page-title">{title}</h2>{items && items.map((item, idx) => (
        <div key={idx} className="smart-row"><div className="smart-label">{item.label}</div><div className="smart-content" dangerouslySetInnerHTML={{__html: item.content}}></div></div>
      ))}</div>
    );

    const GalleryView = ({ items }) => (
      <div><h2 className="page-title">Photography</h2><div className="photo-grid">{items && items.map((img, idx) => (
        <div key={idx} className="photo-card"><img src={img.url} alt={img.title} /><h3>{img.title}</h3></div>
      ))}</div></div>
    );

    const ContactView = ({ data }) => {
      const form = useRef();
      const [submitted, setSubmitted] = useState(false);
      const [status, setStatus] = useState("Deliver Inquiry");

      const handleSubmit = (e) => {
        e.preventDefault();
        setStatus("Sending...");
        
        emailjs.sendForm(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, form.current)
          .then((result) => {
            setSubmitted(true);
          }, (error) => {
            console.error(error.text);
            setStatus("Error - Try Again");
          });
      };

      if (submitted) {
        return (
          <div className="contact-card">
            <h2 style={{fontFamily: 'Lora', fontSize: '3rem', marginBottom: '1rem', color: 'var(--forest)'}}>Message Sent.</h2>
            <p style={{fontStyle: 'italic'}}>Your inquiry has been delivered directly to the studio inbox.</p>
          </div>
        );
      }

      return (
        <div className="contact-card">
          <h2 style={{fontFamily: 'Lora', fontSize: '3rem', marginBottom: '1rem', color: 'var(--forest)'}}>{data.title}</h2>
          <p style={{fontStyle: 'italic', marginBottom: '3rem', color: 'var(--muted)'}}>{data.text}</p>
          
          <form ref={form} onSubmit={handleSubmit} className="space-y-8">
            <div className="form-group">
              <label>Name</label>
              <input type="text" name="user_name" required placeholder="Who is writing?" />
            </div>
            <div className="form-group">
              <label>Email</label>
              <input type="email" name="user_email" required placeholder="Where should I reply?" />
            </div>
            <div className="form-group">
              <label>Message</label>
              <textarea name="message" required placeholder="Share your reasoning..."></textarea>
            </div>
            <button type="submit" className="submit-btn">{status}</button>
          </form>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
