<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FERN CARLETON | Art & Reasoning</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="https://i.postimg.cc/c4TgCHfX/Chat-GPT-Image-Mar-8-2026-08-22-54-AM.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    :root {
      --cream: #F8F7F2;     
      --pink: #FDEEF4;      
      --white: #FFFFFF;     
      --ink: #000000;       
      --muted: #666666;     
      --border: #e0e0e0;
      --accent: #C2A378;    /* Carleton Family Wood-Gold */
      --forest: #2D3A2D;    /* Carleton Family Forest-Green */
      
      --font-header: 'Lora', serif;
      --font-body: 'Inter', sans-serif;
      --font-mono: 'Space Mono', monospace;
      
      --sidebar-width: 300px;
      --mobile-header-height: 60px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--white);
      font-family: var(--font-body);
      color: var(--ink);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      transition: background-color 0.4s ease;
      overflow-x: hidden;
    }

    body.wallpaper-active { background-color: var(--pink); }
    body.menu-open { overflow: hidden; }

    /* Standardized Carleton Links */
    a { color: var(--accent); text-decoration: none; transition: 0.2s; font-weight: 600; }
    a:hover { color: var(--forest); border-bottom: 1px solid var(--forest); }

    .site-wrapper { display: flex; min-height: 100vh; }

    /* --- MOBILE UI --- */
    .mobile-bar {
      display: none; position: fixed; top: 0; left: 0; right: 0;
      height: var(--mobile-header-height); background: var(--cream);
      border-bottom: 1px solid var(--border); z-index: 1100;
      padding: 0 1.5rem; align-items: center; justify-content: space-between;
    }
    .mobile-brand { font-family: var(--font-header); font-weight: 700; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 0.05em; }
    .hamburger { background: none; border: none; cursor: pointer; width: 30px; height: 20px; display: flex; flex-direction: column; justify-content: space-between; }
    .hamburger span { display: block; width: 100%; height: 2px; background: var(--ink); transition: 0.3s; }

    /* --- SIDEBAR --- */
    .sidebar {
      width: var(--sidebar-width); padding: 4rem 3rem; position: fixed; height: 100vh;
      display: flex; flex-direction: column; background: var(--cream);
      border-right: 1px solid rgba(0,0,0,0.05); z-index: 1200;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .brand { margin-bottom: 5rem; cursor: pointer; }
    .brand img.sidebar-logo { width: 64px; height: 64px; margin-bottom: 1.5rem; border-radius: 50%; display: block; object-fit: cover; mix-blend-mode: multiply; }
    .brand h1 { font-family: var(--font-header); font-size: 1.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; line-height: 1; }
    .brand span { font-family: var(--font-mono); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.2em; color: var(--muted); display: block; margin-top: 10px; }

    .nav-links { display: flex; flex-direction: column; gap: 1.5rem; }
    .nav-links a { text-decoration: none; color: var(--ink); font-family: var(--font-body); font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em; font-size: 0.75rem; opacity: 0.4; transition: 0.3s; padding: 5px 0; border: none; }
    .nav-links a:hover, .nav-links a.active { opacity: 1; padding-left: 5px; color: var(--ink); border: none; }

    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1150; opacity: 0; transition: opacity 0.3s ease; pointer-events: none; }

    /* --- MAIN CONTENT --- */
    main { margin-left: var(--sidebar-width); padding: 5rem 6rem; flex: 1; max-width: 1300px; width: 100%; }

    #hero-container { display: none; grid-template-columns: 1.1fr 1.2fr; gap: 5rem; align-items: center; margin-bottom: 6rem; }
    .hero-img-wrap { background: white; padding: 1rem; box-shadow: 0 20px 50px rgba(0,0,0,0.05); }
    .hero-img-wrap img { width: 100%; display: block; filter: contrast(1.05); border-radius: 2px; }
    .hero-text h2 { font-family: var(--font-header); font-size: 3.5rem; margin-bottom: 1.5rem; line-height: 1.1; font-weight: 400; }

    .filter-bar { display: flex; gap: 0.5rem; margin-bottom: 3rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; overflow-x: auto; white-space: nowrap; scrollbar-width: none; }
    .filter-btn { background: none; border: none; font-family: var(--font-mono); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; color: var(--muted); padding: 8px 12px; border-radius: 4px; transition: 0.2s; }
    .filter-btn.active { color: var(--ink); font-weight: 700; background: var(--white); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

    .arts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem; }
    .art-card { text-decoration: none; color: inherit; display: block; transition: 0.3s; }
    .art-card:hover { transform: translateY(-5px); }
    .art-img-wrap { background: var(--cream); aspect-ratio: 1; overflow: hidden; margin-bottom: 1rem; border: 1px solid rgba(0,0,0,0.05); }
    .art-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .art-info h4 { font-family: var(--font-header); font-size: 1.2rem; font-weight: 600; }
    .art-info span { font-family: var(--font-mono); font-size: 0.65rem; color: var(--muted); text-transform: uppercase; }

    .entry-layout { display: grid; grid-template-columns: 1.2fr 1fr; gap: 5rem; }
    .entry-visual img { width: 100%; border: 10px solid white; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
    .entry-details h2 { font-family: var(--font-header); font-size: 3rem; margin-bottom: 1rem; line-height: 1.1; }
    .section-label { font-family: var(--font-mono); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 0.5rem; display: block; border-bottom: 1px solid var(--border); padding-bottom: 5px; margin-top: 2rem; }
    
    .text-content { max-width: 800px; }
    .text-content h2 { font-family: var(--font-header); font-size: 3.5rem; margin-bottom: 2rem; }
    
    /* Adaptive Row Grid for messy lists */
    .row-grid { display: grid; grid-template-columns: 220px 1fr; gap: 3rem; margin-bottom: 3.5rem; align-items: start; }
    .row-label { font-family: var(--font-mono); font-size: 0.85rem; font-weight: 700; text-transform: uppercase; color: var(--ink); border-left: 4px solid var(--accent); padding-left: 15px; }
    .row-content strong { display: block; font-size: 1.2rem; font-family: var(--font-header); margin-bottom: 5px; }
    .row-content p { color: #333; font-size: 1.05rem; }

    .contact-form { background: var(--cream); padding: 2.5rem; border: 1px solid var(--border); margin-top: 2rem; border-radius: 4px; }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; font-family: var(--font-mono); font-size: 0.65rem; text-transform: uppercase; font-weight: 700; margin-bottom: 0.5rem; }
    .form-group input, .form-group textarea { width: 100%; padding: 1rem; border: 1px solid var(--border); font-family: var(--font-body); font-size: 1rem; outline: none; background: #fff; }
    .submit-btn { background: var(--ink); color: #fff; border: none; padding: 1rem 2.5rem; font-family: var(--font-mono); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; font-weight: 700; width: 100%; }

    footer { margin-top: 8rem; padding: 4rem 0; border-top: 1px solid var(--border); font-family: var(--font-mono); font-size: 0.65rem; color: var(--muted); text-transform: uppercase; }

    @media (max-width: 1024px) {
      .mobile-bar { display: flex; }
      .sidebar { transform: translateX(-100%); width: 280px; box-shadow: 10px 0 30px rgba(0,0,0,0.1); }
      .sidebar-overlay { display: block; }
      body.menu-open .sidebar { transform: translateX(0); }
      body.menu-open .sidebar-overlay { opacity: 1; pointer-events: auto; }
      main { margin-left: 0; padding: calc(var(--mobile-header-height) + 3rem) 1.5rem 3rem 1.5rem; }
      #hero-container { grid-template-columns: 1fr; gap: 3rem; text-align: center; }
      .entry-layout { grid-template-columns: 1fr; gap: 3rem; }
      .row-grid { grid-template-columns: 1fr; gap: 0.75rem; margin-bottom: 2.5rem; }
    }
  </style>
</head>
<body id="body">

  <div class="mobile-bar">
    <div class="mobile-brand" onclick="navigateTo('/')">Fern Carleton</div>
    <button class="hamburger" id="menu-toggle" aria-label="Toggle Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
  
  <div class="sidebar-overlay" id="overlay"></div>

  <div class="site-wrapper">
    <nav class="sidebar" id="sidebar">
      <div class="brand" onclick="navigateTo('/')">
        <img src="https://i.postimg.cc/c4TgCHfX/Chat-GPT-Image-Mar-8-2026-08-22-54-AM.png" alt="Logo" class="sidebar-logo">
        <h1>Fern<br>Carleton</h1>
        <span>Art & Reasoning</span>
      </div>
      <div class="nav-links">
        <a href="/arts/" class="nav-link" data-link>Arts</a>
        <a href="/skills/" class="nav-link" data-link>Skills</a>
        <a href="/resume/" class="nav-link" data-link>Resume</a>
        <a href="/about/" class="nav-link" data-link>About</a>
        <a href="/contact/" class="nav-link" data-link>Contact</a>
      </div>
      <div style="margin-top: auto;"><span style="font-family:var(--font-mono); font-size:0.6rem; color:var(--muted); text-transform:uppercase;">Archive v8.0 Adaptive</span></div>
    </nav>

    <main id="main-content">
      <div id="hero-container">
        <div class="hero-img-wrap"><img id="hero-image" src="" alt="Fern"></div>
        <div class="hero-text" id="hero-target"></div>
      </div>
      <div id="app-root"></div>
    </main>
  </div>

  <script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbygWtwrPzJUbH2nrt4JRxTqs2FXfGwFYU-6kP2ORKcbESaY2HswOiAKyceLOgdNI4KBuA/exec'; 
    const CACHE_KEY = 'fern_master_v8_cache';
    const CACHE_TIME = 3600000; 

    const HERO_HOME = "https://i.postimg.cc/prL9JMHh/PXL_20251223_225914443.jpg"; 
    const HERO_CONTACT = "https://i.postimg.cc/RhZ3LxBZ/PXL_20260209_161536343.jpg"; 

    marked.setOptions({ breaks: true });

    let siteData = { pages: {}, entries: [], isLoaded: false };
    let currentFilter = 'all';

    const menuToggle = document.getElementById('menu-toggle');
    const overlay = document.getElementById('overlay');
    const bodyTag = document.getElementById('body');

    function toggleMenu() { bodyTag.classList.toggle('menu-open'); }
    function closeMenu() { bodyTag.classList.remove('menu-open'); }

    menuToggle.addEventListener('click', toggleMenu);
    overlay.addEventListener('click', closeMenu);

    async function initApp() {
      const cached = localStorage.getItem(CACHE_KEY);
      if (cached) {
        const { timestamp, data } = JSON.parse(cached);
        if (Date.now() - timestamp < CACHE_TIME) {
          parseAdaptiveDoc(data); renderPage(); fetchFresh(); return;
        }
      }
      await fetchFresh();
    }

    async function fetchFresh() {
      try {
        const res = await fetch(APPS_SCRIPT_URL);
        const text = await res.text();
        localStorage.setItem(CACHE_KEY, JSON.stringify({ timestamp: Date.now(), data: text }));
        parseAdaptiveDoc(text); renderPage();
      } catch (e) { console.error("Sync error", e); }
    }

    /** * ADAPTIVE INTELLIGENCE PARSER
     * Optimized for Fern's bunched-up Google Doc format.
     */
    function parseAdaptiveDoc(text) {
      siteData = { pages: {}, entries: [], isLoaded: true };
      const keywords = ["Welcome", "About", "Skills", "Resume", "Contact", "Entry:"];
      
      // Step 1: Pre-process text to handle dividers and keywords as split points
      let cleanText = text.replace(/^-{3,}/gm, "---DIVIDER---");
      const regex = new RegExp(`---DIVIDER---|(?=${keywords.join("|")})`, "g");
      const rawChunks = cleanText.split(regex).map(c => c.trim()).filter(c => c.length > 0);
      
      for (let chunk of rawChunks) {
        if (chunk.startsWith("Instructions") || chunk.startsWith("Arts")) continue;

        if (chunk.toLowerCase().startsWith("entry:")) {
          siteData.entries.push(parseSmartEntry(chunk));
        } else {
          const foundKey = keywords.find(k => chunk.startsWith(k));
          if (foundKey) {
            const content = chunk.substring(foundKey.length).trim();
            siteData.pages[foundKey.toLowerCase()] = { title: foundKey, html: marked.parse(content) };
          }
        }
      }
    }

    function parseSmartEntry(text) {
      // Find the entry title from the first line
      const titleMatch = text.match(/Entry:\s*([\s\S]*?)(?=Type:|Image:|Description:|Materials:|Process:|Location:|Camera:|Lens:|Settings:|$)/i);
      const title = titleMatch ? titleMatch[1].trim() : "Untitled Art";
      const data = { title, id: slugify(title) };

      const extract = (key) => {
        const regex = new RegExp(`${key}:\\s*([\\s\\S]*?)(?=Type:|Image:|Description:|Materials:|Process:|Location:|Camera:|Lens:|Settings:|Entry:|$)`, "i");
        return (text.match(regex) || [])[1]?.trim() || "";
      };

      data.type = extract("Type").toLowerCase() || "art";
      data.img = extract("Image").replace(/\s/g, '') || "https://via.placeholder.com/800x1000?text=Syncing+Artwork...";
      data.description = extract("Description") || "";
      data.materials = extract("Materials").split(",").map(m => m.trim()).filter(m => m);
      data.process = extract("Process") || "";
      
      data.specs = {
        location: extract("Location") || "Unknown",
        camera: extract("Camera") || "N/A",
        lens: extract("Lens") || "N/A",
        settings: extract("Settings") || "N/A"
      };
      return data;
    }

    function renderPage() {
      const path = window.location.pathname;
      const root = document.getElementById('app-root');
      const hero = document.getElementById('hero-container');
      const heroTarget = document.getElementById('hero-target');
      
      if (!siteData.isLoaded) return;
      bodyTag.classList.toggle('wallpaper-active', path.includes('/arts/view/'));
      document.querySelectorAll('.nav-link').forEach(link => {
        const href = link.getAttribute('href');
        link.classList.toggle('active', path === href || (href !== '/' && path.startsWith(href)));
      });

      if (path === '/' || path === '/about/' || path === '/contact/') {
        hero.style.display = 'grid';
        root.innerHTML = '';
        const pageKey = path === '/contact/' ? 'contact' : (path === '/about/' ? 'about' : 'welcome');
        const page = siteData.pages[pageKey];
        if (page) {
          document.getElementById('hero-image').src = path === '/contact/' ? HERO_CONTACT : HERO_HOME;
          heroTarget.innerHTML = `<span class="section-label">${pageKey}</span><h2>${page.title}</h2>${page.html}`;
          if (path === '/contact/') heroTarget.insertAdjacentHTML('beforeend', renderContactForm());
        } else {
          heroTarget.innerHTML = `<h2>Coming Soon</h2><p>Working on the archives...</p>`;
        }
      } else {
        hero.style.display = 'none';
        if (path === '/arts/') renderGallery(root);
        else if (path.includes('/arts/view/')) renderEntryView(path.split('/').pop(), root);
        else if (path === '/skills/') renderAdaptiveGrid('skills', root);
        else if (path === '/resume/') renderAdaptiveGrid('resume', root);
        else render404(root);
      }
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    /** * ADAPTIVE GRID RENDERER
     * Splits text into labeled rows by detecting short header-like paragraphs or bold tags.
     */
    function renderAdaptiveGrid(key, root) {
      const page = siteData.pages[key];
      if (!page) return render404(root);
      
      let html = `<div class="text-content"><h2>${page.title}</h2>`;
      
      // Detect common resume/skills headers even if not bolded
      const commonHeaders = ["Artistic Foundations", "Digital & Photography", "Theater Experience", "Education", "Experience", "Skills", "2026 plays", "2025 plays", "Showcase"];
      
      // Temporary div to parse the marked HTML
      const tempDiv = document.createElement('div');
      tempDiv.innerHTML = page.html;
      
      let rows = [];
      let currentLabel = "";
      let currentContent = "";

      // Walk through paragraphs to find labels
      tempDiv.childNodes.forEach(node => {
        const text = node.textContent.trim();
        const isHeaderTag = /^H[1-6]$/.test(node.tagName);
        const isShortLine = text.length > 0 && text.split(' ').length < 5;
        const isStrong = node.querySelector && node.querySelector('strong');
        const isKnownHeader = commonHeaders.some(h => text.toLowerCase().includes(h.toLowerCase()));

        if (isHeaderTag || isStrong || (isShortLine && isKnownHeader)) {
          // Push previous row
          if (currentLabel || currentContent) {
            rows.push({ label: currentLabel || "Details", content: currentContent });
          }
          currentLabel = text;
          currentContent = "";
        } else {
          currentContent += node.outerHTML || node.textContent;
        }
      });
      // Push final row
      if (currentLabel || currentContent) {
        rows.push({ label: currentLabel || "Details", content: currentContent });
      }

      if (rows.length === 0) {
        html += page.html;
      } else {
        rows.forEach(row => {
          html += `<div class="row-grid"><div class="row-label">${row.label}</div><div class="row-content">${row.content}</div></div>`;
        });
      }

      html += `</div>`;
      root.innerHTML = html;
    }

    function renderGallery(root) {
      const filtered = currentFilter === 'all' ? siteData.entries : siteData.entries.filter(e => e.type === currentFilter);
      root.innerHTML = `
        <h2 style="font-family:var(--font-header); font-size:clamp(2rem, 8vw, 3rem); margin-bottom:2rem;">Arts</h2>
        <div class="filter-bar">
          ${['all', 'art', 'photography', 'theater'].map(f => `<button class="filter-btn ${currentFilter === f ? 'active' : ''}" onclick="setFilter('${f}')">${f}</button>`).join('')}
        </div>
        <div class="arts-grid">
          ${filtered.map(item => `
            <a href="/arts/view/${item.id}" class="art-card" data-link>
              <div class="art-img-wrap"><img src="${item.img}" alt="${item.title}" onerror="this.src='https://via.placeholder.com/800x1000?text=Syncing+Image...'"></div>
              <div class="art-info"><span>${item.type}</span><h4>${item.title}</h4></div>
            </a>
          `).join('')}
        </div>
      `;
    }

    function renderEntryView(id, root) {
      const item = siteData.entries.find(e => e.id === id);
      if (!item) return render404(root);
      const isArt = item.type === 'art';
      root.innerHTML = `
        <div class="entry-layout">
          <div class="entry-visual"><img src="${item.img}" alt="${item.title}"></div>
          <div class="entry-details">
            <a href="/arts/" data-link style="font-family:var(--font-mono); font-size:0.7rem; text-transform:uppercase; margin-bottom:2rem; display:block;">← Back to Grid</a>
            <span class="section-label">${item.type}</span>
            <h2>${item.title}</h2>
            <p style="color:var(--muted); margin-bottom:1.5rem;">${item.description}</p>
            ${isArt ? `
              <span class="section-label">Materials</span>
              <ul style="list-style:none; margin-bottom:2rem;">${item.materials.map(m => `<li>☐ ${m}</li>`).join('')}</ul>
              <span class="section-label">Process</span>
              <div>${marked.parse(item.process)}</div>
            ` : `
              <span class="section-label">Specs</span>
              <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                <div><b style="display:block; font-size:0.6rem; color:var(--muted);">LOCATION</b>${item.specs.location}</div>
                <div><b style="display:block; font-size:0.6rem; color:var(--muted);">CAMERA</b>${item.specs.camera}</div>
                <div><b style="display:block; font-size:0.6rem; color:var(--muted);">LENS</b>${item.specs.lens}</div>
                <div><b style="display:block; font-size:0.6rem; color:var(--muted);">SETTINGS</b>${item.specs.settings}</div>
              </div>
            `}
          </div>
        </div>
      `;
    }

    function renderContactForm() {
      return `<form class="contact-form" onsubmit="event.preventDefault(); this.innerHTML='<h3>Message Sent.</h3><p style=font-family:var(--font-mono);font-size:0.7rem;margin-top:10px;text-transform:uppercase;color:var(--muted)>I will get back to you within 24 hours.</p>';"><div class="form-group"><label>Name</label><input type="text" required></div><div class="form-group"><label>Email</label><input type="email" required></div><div class="form-group"><label>Message</label><textarea rows="4" required></textarea></div><button type="submit" class="submit-btn">Send Message</button></form>`;
    }

    function render404(root) { root.innerHTML = `<h2>404</h2><p>Page missing.</p>`; }
    window.setFilter = (f) => { currentFilter = f; renderGallery(document.getElementById('app-root')); };
    window.navigateTo = (url) => { closeMenu(); history.pushState(null, null, url); renderPage(); };
    window.addEventListener('popstate', renderPage);
    document.body.addEventListener('click', e => {
      const link = e.target.closest('[data-link]');
      if (link) { e.preventDefault(); navigateTo(link.getAttribute('href')); }
    });
    function slugify(text) { return text.toString().toLowerCase().replace(/\s+/g, '-').replace(/[^\w\-]+/g, '').replace(/\-\-+/g, '-').replace(/^-+/, '').replace(/-+$/, ''); }
    window.onload = initApp;
  </script>
</body>
</html>
