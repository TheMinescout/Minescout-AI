<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FERN CARLETON | Photography & Reasoning</title>
  
  <link rel="icon" type="image/png" href="https://jaymecarleton.com/wp-content/uploads/2015/11/leaf-only.png">

  <!-- Fonts: Structured Serif and Modern Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Inter:wght@300;400;500;600&family=Space+Mono&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    :root {
      --bg: #f7f7f5;
      --card-bg: #ffffff;
      --ink: #1a1a1a;
      --muted: #7a7a7a;
      --accent: #c9a96e; /* Gold accent for reasoning/technical items */
      
      --font-header: 'Lora', serif;
      --font-body: 'Inter', sans-serif;
      --font-mono: 'Space Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      font-family: var(--font-body);
      color: var(--ink);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* --- SIDEBAR --- */
    .sidebar {
      width: 280px;
      padding: 4rem 2.5rem;
      position: fixed;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--card-bg);
      border-right: 1px solid rgba(0,0,0,0.05);
      z-index: 1000;
    }

    .brand { margin-bottom: 5rem; cursor: pointer; text-align: center; }
    .brand img {
      width: 60px;
      height: 60px;
      margin-bottom: 1rem;
      opacity: 0.8;
      mix-blend-mode: multiply;
    }
    .brand h1 {
      font-family: var(--font-header);
      font-size: 1.6rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      line-height: 1.1;
    }
    .brand span {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--muted);
      display: block;
      margin-top: 10px;
    }

    .nav-links { display: flex; flex-direction: column; gap: 1.25rem; }
    .nav-links a {
      text-decoration: none;
      color: var(--ink);
      font-family: var(--font-body);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      font-size: 0.75rem;
      opacity: 0.5;
      transition: 0.3s;
    }
    .nav-links a:hover, .nav-links a.active {
      opacity: 1;
      color: var(--accent);
      padding-left: 5px;
    }

    /* --- MAIN CONTENT --- */
    main {
      margin-left: 280px;
      padding: 5rem;
      max-width: 1400px;
      min-height: 100vh;
    }

    /* --- HERO PORTRAIT --- */
    #hero-section {
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 5rem;
      align-items: center;
      margin-bottom: 10rem;
    }

    .hero-img-wrap {
      position: relative;
      background: white;
      padding: 1.5rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.06);
    }
    .hero-img-wrap img {
      width: 100%;
      display: block;
      filter: sepia(0.1) contrast(1.05);
    }
    .hero-img-wrap::after {
      content: 'FERN CARLETON // PORTRAIT 01';
      position: absolute;
      bottom: -30px;
      right: 0;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .hero-text h2 {
      font-family: var(--font-header);
      font-size: 3.5rem;
      margin-bottom: 2rem;
      font-weight: 400;
      line-height: 1.1;
    }
    .hero-text p {
      font-size: 1.1rem;
      color: var(--muted);
      margin-bottom: 2rem;
      max-width: 450px;
    }

    /* --- PHOTO GALLERY (Masonry) --- */
    .masonry-gallery {
      columns: 2;
      column-gap: 2rem;
    }
    .gallery-item {
      break-inside: avoid;
      margin-bottom: 2rem;
      background: white;
      padding: 1rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.03);
      transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
      cursor: pointer;
      position: relative;
    }
    .gallery-item:hover {
      transform: scale(1.02);
      box-shadow: 0 30px 60px rgba(0,0,0,0.1);
      z-index: 10;
    }
    .gallery-item img { width: 100%; display: block; }
    .gallery-item .meta {
      margin-top: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .gallery-item h4 {
      font-family: var(--font-header);
      font-size: 1.1rem;
      font-weight: 500;
    }
    .gallery-item .tag {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      background: var(--bg);
      padding: 4px 8px;
      border-radius: 2px;
    }

    /* --- FOOTER --- */
    footer {
      margin-top: 10rem;
      padding-top: 3rem;
      border-top: 1px solid rgba(0,0,0,0.05);
      font-family: var(--font-mono);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }
    footer a { color: var(--ink); font-weight: 600; text-decoration: none; border-bottom: 1px solid var(--accent); }

    @media (max-width: 1024px) {
      .sidebar { width: 100%; height: auto; position: relative; padding: 2rem; border-right: none; border-bottom: 1px solid rgba(0,0,0,0.05); }
      main { margin-left: 0; padding: 3rem 1.5rem; }
      #hero-section { grid-template-columns: 1fr; gap: 4rem; }
      .masonry-gallery { columns: 1; }
    }
  </style>
</head>
<body>

  <div class="site-wrapper">
    <nav class="sidebar">
      <div class="brand" onclick="navigateTo('/')">
        <!-- Circular Leaf Logo Integrated -->
        <img src="https://jaymecarleton.com/wp-content/uploads/2015/11/leaf-only.png" alt="Logo">
        <h1>Fern<br>Carleton</h1>
        <span>Photography & Reasoning</span>
      </div>
      <div class="nav-links">
        <a href="/gallery/" class="nav-link" data-link>Portfolio</a>
        <a href="/journal/" class="nav-link" data-link>Journal</a>
        <a href="/about/" class="nav-link" data-link>About</a>
        <a href="/contact/" class="nav-link" data-link>Contact</a>
      </div>
    </nav>

    <main id="main-content">
      <!-- Content Dynamic Injection -->
    </main>
  </div>

  <script>
    const siteData = {
      welcome: {
        title: "Observing with *Intent.*",
        text: "I am a student at the Renaissance School of Art and Reasoning. My photography is a tool for documenting the intersection of natural chaos and human logic.",
        // Using the mountain portrait you provided
        img: "https://i.postimg.cc/mD3631qf/image-74ced8.jpg"
      },
      portfolio: [
        { title: "Volcanic Textures", tag: "Landscape", img: "https://i.postimg.cc/mD3631qf/image-74ced8.jpg" },
        { title: "Geometric Shadow", tag: "Architecture", img: "https://via.placeholder.com/800x1000?text=Portrait+Photography" },
        { title: "The Reasoning Lab", tag: "Process", img: "https://via.placeholder.com/1200x800?text=Landscape+Photography" },
        { title: "Symmetry Study", tag: "Abstract", img: "https://via.placeholder.com/800x800?text=Still+Life" }
      ]
    };

    function navigateTo(url) {
      history.pushState(null, null, url);
      renderPage();
    }

    function renderPage() {
      const path = window.location.pathname;
      const root = document.getElementById('main-content');
      
      document.querySelectorAll('.nav-link').forEach(link => {
        link.classList.toggle('active', link.getAttribute('href') === path);
      });

      if (path === '/' || path === '/about/') {
        root.innerHTML = `
          <section id="hero-section">
            <div class="hero-img-wrap">
              <img src="${siteData.welcome.img}" alt="Fern Carleton">
            </div>
            <div class="hero-text">
              <h2>${siteData.welcome.title}</h2>
              <p>${siteData.welcome.text}</p>
              <p>Welcome to my digital gallery.</p>
              <a href="/gallery/" data-link style="font-family:var(--font-mono); font-size:0.8rem; text-transform:uppercase; color:var(--accent); font-weight:700; border-bottom:2px solid var(--accent); padding-bottom:5px;">Enter Portfolio ➔</a>
            </div>
          </section>
          <footer>
            <p>&copy; ${new Date().getFullYear()} Fern Carleton. Built with <a href="https://minescout.net/ai" target="_blank">Minescout AI</a></p>
          </footer>
        `;
      } else if (path === '/gallery/') {
        root.innerHTML = `
          <h2 style="font-family:var(--font-header); margin-bottom:4rem; font-size:2.8rem; border-bottom:1px solid #ddd; padding-bottom:1rem;">Selected Works</h2>
          <div class="masonry-gallery">
            ${siteData.portfolio.map(item => `
              <div class="gallery-item">
                <img src="${item.img}" alt="${item.title}">
                <div class="meta">
                  <h4>${item.title}</h4>
                  <span class="tag">${item.tag}</span>
                </div>
              </div>
            `).join('')}
          </div>
        `;
      } else {
        root.innerHTML = `
          <div style="text-align:center; padding-top:10vh;">
            <h2 style="font-family:var(--font-header); font-size:3rem;">Development in Progress</h2>
            <p style="font-family:var(--font-mono); color:var(--muted); margin-top:1rem;">Loading archives...</p>
          </div>
        `;
      }
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    window.addEventListener('popstate', renderPage);
    window.onload = renderPage;

    document.body.addEventListener('click', e => {
      const link = e.target.closest('[data-link]');
      if (link) {
        e.preventDefault();
        navigateTo(link.getAttribute('href'));
      }
    });
  </script>

</body>
</html>
