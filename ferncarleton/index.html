<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FERN CARLETON | Art & Reasoning</title>
  
  <link rel="icon" type="image/png" href="https://i.postimg.cc/c4TgCHfX/Chat-GPT-Image-Mar-8-2026-08-22-54-AM.png">

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Caveat:wght@400;700&display=swap" rel="stylesheet">

  <style>
    /* --- THE MINESCOUT ENGINE CSS v62.0 --- */
    :root {
      --paper: #fdfcf8;
      --ink: #1a1a1a;
      --muted: #555555;
      --wc-blue: rgba(65, 105, 225, 0.35);
      --wc-gold: rgba(194, 163, 120, 0.35);
      --wc-lavender: rgba(147, 112, 219, 0.3);
      --forest: #2D3A2D;
      --accent: #C2A378;
      --sidebar-width: 320px;
      --mobile-header: 70px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background-color: var(--paper);
      background-image: url("https://www.transparenttextures.com/patterns/paper.png");
      background-attachment: fixed;
      font-family: 'Inter', sans-serif;
      color: var(--ink);
      line-height: 1.6;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Background Environment */
    .bg-wash-container { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
    .wash { position: absolute; border-radius: 50%; filter: blur(100px); mix-blend-mode: multiply; opacity: 0.8; }
    .wash-1 { top: -5%; left: 5%; width: 55vw; height: 55vh; background: var(--wc-blue); }
    .wash-2 { bottom: -10%; right: -5%; width: 45vw; height: 65vh; background: var(--wc-gold); }
    .wash-3 { top: 25%; right: 10%; width: 40vw; height: 45vh; background: var(--wc-lavender); }

    /* Mobile Header Bar */
    .mobile-bar {
      display: none;
      position: fixed; top: 0; left: 0; right: 0; height: var(--mobile-header);
      background: rgba(253, 252, 248, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0,0,0,0.05);
      z-index: 2500;
      padding: 0 1.5rem;
      align-items: center;
      justify-content: space-between;
    }

    /* Portfolio Sidebar (Desktop & Mobile) */
    .sidebar {
      width: var(--sidebar-width); padding: 2.5rem 3rem 4rem; position: fixed; height: 100vh;
      display: flex; flex-direction: column; 
      background: linear-gradient(165deg, rgba(100, 149, 237, 0.4) 0%, rgba(253, 252, 248, 0.9) 60%, rgba(253, 252, 248, 1) 100%);
      backdrop-filter: blur(15px);
      clip-path: polygon(0% 0%, 100% 0%, 98% 3%, 99.5% 7%, 97.2% 11%, 98.8% 15%, 96.1% 19%, 99.8% 24%, 97.6% 28%, 99.2% 33%, 96.4% 38%, 98.2% 44%, 95.7% 49%, 99.4% 55%, 97.1% 61%, 98.6% 67%, 96.3% 73%, 99.1% 79%, 97.4% 85%, 99.6% 92%, 98.1% 97%, 100% 100%, 0% 100%);
      z-index: 2000;
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .brand { margin-bottom: 3.5rem; cursor: pointer; }
    .brand h1 { font-family: 'Lora', serif; font-size: 1.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; line-height: 1; }
    .brand span { font-family: 'Space Mono', monospace; font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.2em; color: var(--muted); display: block; margin-top: 8px; }

    .nav-list { display: flex; flex-direction: column; gap: 1.5rem; }
    .nav-btn { background: none; border: none; font-family: 'Lora', serif; font-style: italic; font-size: 1.1rem; text-align: left; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; opacity: 0.5; transition: 0.3s; color: var(--ink); outline: none; }
    .nav-btn.active { opacity: 1; border-left: 2px solid var(--forest); padding-left: 10px; }

    /* Overlay for Mobile Sidebar */
    .sidebar-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.2);
      backdrop-filter: blur(2px); z-index: 1500;
      opacity: 0; pointer-events: none; transition: 0.3s;
    }
    .sidebar-overlay.active { opacity: 1; pointer-events: auto; }

    main { margin-left: var(--sidebar-width); padding: 5rem 6rem; flex: 1; max-width: 1450px; }

    /* Admin UI */
    .admin-card { background: white; padding: 0; border-radius: 8px; box-shadow: 0 30px 80px rgba(0,0,0,0.15); width: 95%; max-width: 1250px; margin: 0 auto; overflow: hidden; }
    .admin-header { background: var(--forest); color: white; padding: 2rem 3rem; display: flex; justify-content: space-between; align-items: center; }
    .admin-header h2 { font-family: 'Lora', serif; font-size: 1.8rem; font-weight: 400; }
    
    .admin-nav { display: flex; background: #f1f3f1; border-bottom: 1px solid #e0e4e0; padding: 0 2rem; overflow-x: auto; }
    .admin-nav-btn { background: none; border: none; padding: 1.25rem 2rem; font-family: 'Space Mono', monospace; font-size: 11px; text-transform: uppercase; font-weight: 700; color: #888; cursor: pointer; border-bottom: 3px solid transparent; transition: 0.2s; white-space: nowrap; }
    .admin-nav-btn.active { color: var(--forest); border-bottom-color: var(--forest); }

    .admin-content { padding: 3.5rem; max-height: 75vh; overflow-y: auto; background: #fafafa; }
    .input-box { background: white; border: 1px solid #e0e0e0; border-radius: 8px; padding: 2rem; margin-bottom: 2rem; }
    .input-row { margin-bottom: 1.5rem; }
    .input-row label { display: block; font-family: 'Space Mono', monospace; font-size: 10px; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; font-weight: 700; }
    .input-row input, .input-row textarea { width: 100%; border: 1.5px solid #eee; background: #fdfdfd; border-radius: 4px; padding: 14px 18px; font-size: 1rem; outline: none; font-family: inherit; }

    .btn-save { background: var(--forest); color: white; border: none; padding: 1.5rem 3rem; font-family: 'Space Mono'; font-weight: bold; text-transform: uppercase; cursor: pointer; width: 100%; font-size: 12px; }

    /* Content Styling */
    .page-title { font-family: 'Lora', serif; font-size: 4rem; color: var(--forest); margin-bottom: 2.5rem; font-weight: 400; }
    .hero-grid { display: grid; grid-template-columns: 1fr 1.1fr; gap: 5.5rem; align-items: start; }
    .hero-text p { white-space: pre-wrap; font-size: 1.1rem; color: var(--muted); }
    .hero-img-wrap { background: white; padding: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); transform: rotate(-1.5deg); }
    .hero-img-wrap img { width: 100%; border-radius: 1px; }

    .smart-row { display: grid; grid-template-columns: 260px 1fr; gap: 4rem; margin-bottom: 4.5rem; }
    .smart-label { font-family: 'Space Mono', monospace; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; border-left: 6px solid var(--wc-blue); padding-left: 22px; }
    .smart-content { white-space: pre-wrap; font-size: 1.1rem; color: #333; }

    .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 3.5rem; }
    .photo-card { background: white; padding: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border-radius: 2px; }
    .photo-card img { width: 100%; aspect-ratio: 1; object-fit: cover; }
    .photo-card h3 { font-family: 'Caveat', cursive; font-size: 1.6rem; text-align: center; margin-top: 10px; color: var(--muted); }

    /* Hamburger Animation */
    .hamburger { width: 30px; height: 20px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; border: none; background: none; }
    .hamburger span { display: block; width: 100%; height: 2px; background: var(--ink); transition: 0.3s; }

    @media (max-width: 1024px) {
      .mobile-bar { display: flex; }
      .sidebar { transform: translateX(-100%); clip-path: none; background: white; width: 300px; padding-top: 5rem; }
      .sidebar.open { transform: translateX(0); }
      main { margin-left: 0; padding: calc(var(--mobile-header) + 3rem) 1.5rem 3rem; }
      .admin-card { width: 100%; border-radius: 0; }
      .page-title { font-size: 2.8rem; }
      .hero-grid, .smart-row { grid-template-columns: 1fr; gap: 2rem; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const SITE_ID = "fern"; 
    const WORKER_URL = "https://backend.tmcarleton11.workers.dev/"; 

    // --- REUSABLE COMPONENTS ---
    const Hero = ({ data }) => {
      if (!data) return null;
      return (
        <div className="animate-in fade-in duration-700" style={{animation: 'fadeIn 0.7s ease-in'}}>
          <h2 className="page-title">{data.title}</h2>
          <div className="hero-grid">
            <div className="hero-text"><p>{data.text}</p></div>
            {data.image && (
              <div className="hero-img-wrap"><img src={data.image} alt={data.title} /></div>
            )}
          </div>
        </div>
      );
    };

    const Gallery = ({ items }) => {
      if (!items) return null;
      return (
        <div className="animate-in fade-in duration-700">
          <h2 className="page-title">Photography</h2>
          <div className="photo-grid">
            {items.map((item, i) => (
              <div key={i} className="photo-card">
                <img src={item.url} alt={item.title} />
                <h3>{item.title}</h3>
              </div>
            ))}
          </div>
        </div>
      );
    };

    const SmartGrid = ({ title, items }) => {
      if (!items) return null;
      return (
        <div className="animate-in fade-in duration-700">
          <h2 className="page-title">{title}</h2>
          <div>
            {items.map((item, i) => (
              <div key={i} className="smart-row">
                <div className="smart-label">{item.label}</div>
                <div className="smart-content">{item.content}</div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    // --- MAIN APP ---
    const App = () => {
      const [view, setView] = useState('home');
      const [adminTab, setAdminTab] = useState('home');
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [adminKey, setAdminKey] = useState("");
      const [isAuthed, setIsAuthed] = useState(false);
      const [isMenuOpen, setIsMenuOpen] = useState(false);

      useEffect(() => {
        fetch(WORKER_URL, {
          headers: { 'X-Site-Id': SITE_ID }
        })
          .then(res => res.json())
          .then(d => { 
            setData(d); 
            setLoading(false); 
          })
          .catch(e => { console.error("Sync error:", e); setLoading(false); });

        if (window.location.hash === "#admin") setView('admin');
      }, []);

      const saveChanges = async () => {
        const response = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'X-Site-Id': SITE_ID
          },
          body: JSON.stringify({ key: adminKey, data: data })
        });
        if (response.ok) { alert("Archive Successfully Deployed."); } 
        else { alert("Verification Failed."); }
      };

      const changeView = (v) => {
        setView(v);
        setIsMenuOpen(false);
        window.scrollTo(0, 0);
      };

      if (loading) return <div style={{height:'100vh', display:'flex', alignItems:'center', justifyContent:'center', fontFamily:'Lora', fontStyle:'italic', color: '#c2a378'}}>Synchronizing {SITE_ID.toUpperCase()} Archive...</div>;
      if (!data) return <div style={{padding:'5rem', textAlign:'center'}}>Engine offline. Check Cloudflare DNS.</div>;

      return (
        <div style={{display: 'flex'}}>
          <div className="bg-wash-container"><div className="wash wash-1"></div><div className="wash wash-2"></div><div className="wash wash-3"></div></div>

          {view !== 'admin' && (
            <>
              {/* Mobile Header */}
              <div className="mobile-bar">
                <div style={{fontFamily: 'Lora', fontWeight: 'bold'}} onClick={() => changeView('home')}>FERN CARLETON</div>
                <button className="hamburger" onClick={() => setIsMenuOpen(true)}>
                    <span></span><span></span><span></span>
                </button>
              </div>

              {/* Mobile Overlay */}
              <div className={`sidebar-overlay ${isMenuOpen ? 'active' : ''}`} onClick={() => setIsMenuOpen(false)}></div>

              <aside className={`sidebar ${isMenuOpen ? 'open' : ''}`}>
                <div className="brand" onClick={() => changeView('home')}>
                  <h1>Fern<br/>Carleton</h1>
                  <span>Art & Reasoning</span>
                </div>
                <nav className="nav-list" style={{marginTop: '3rem'}}>
                  {['photos', 'skills', 'portfolio', 'about'].map(tab => (
                    <button key={tab} onClick={() => changeView(tab)} className={`nav-btn ${view === tab ? 'active' : ''}`}>
                      {tab === 'portfolio' ? 'Portfolio' : tab}
                    </button>
                  ))}
                </nav>
              </aside>
            </>
          )}

          <main style={view === 'admin' ? {width: '100%', marginLeft: 0, padding: '3rem 0', display: 'flex', justifyContent: 'center', minHeight: '100vh'} : {}}>
            {view === 'admin' ? (
              <AdminPanel 
                data={data} 
                setData={setData} 
                adminTab={adminTab} 
                setAdminTab={setAdminTab} 
                isAuthed={isAuthed} 
                setIsAuthed={setIsAuthed} 
                adminKey={adminKey} 
                setAdminKey={setAdminKey} 
                saveChanges={saveChanges}
                exit={() => setView('home')} 
                SITE_ID={SITE_ID}
              />
            ) : (
              <div>
                {view === 'home' && <Hero data={data.welcome} />}
                {view === 'about' && <Hero data={data.about} />}
                {view === 'photos' && <Gallery items={data.photos} />}
                {view === 'skills' && <SmartGrid title="Skills" items={data.skills} />}
                {view === 'portfolio' && <SmartGrid title="Portfolio" items={data.resume} />}
              </div>
            )}
          </main>
        </div>
      );
    };

    /** --- ADMIN PANEL COMPONENT --- */
    const AdminPanel = ({ data, setData, adminTab, setAdminTab, isAuthed, setIsAuthed, adminKey, setAdminKey, saveChanges, exit, SITE_ID }) => {
      const addItem = (target) => {
        const newItem = target === 'photos' ? { title: "New Entry", url: "" } : { label: "Category", content: "Details..." };
        setData({ ...data, [target]: [newItem, ...(data[target] || [])] });
      };

      const updateItem = (target, index, field, value) => {
        const newList = [...data[target]];
        newList[index][field] = value;
        setData({ ...data, [target]: newList });
      };

      const removeItem = (target, index) => {
        setData({ ...data, [target]: data[target].filter((_, i) => i !== index) });
      };

      return (
        <div className="admin-card">
          <header className="admin-header">
              <h2>{SITE_ID.toUpperCase()} Backstage</h2>
              <button onClick={exit} style={{background:'rgba(255,255,255,0.15)', border:'none', color:'white', padding:'8px 18px', borderRadius:'4px', cursor:'pointer', fontSize:'11px', fontWeight:'700', textTransform:'uppercase'}}>Exit</button>
          </header>
          
          {!isAuthed ? (
            <div style={{padding: '4rem', background: 'white'}}>
              <div className="input-row">
                  <label>Secret Reasoning Key</label>
                  <input type="password" placeholder="••••••••" style={{fontSize: '1.5rem', letterSpacing:'0.2em', marginBottom: '2rem'}} value={adminKey} onChange={e => setAdminKey(e.target.value)} onKeyDown={e => e.key === 'Enter' && setIsAuthed(true)} />
              </div>
              <button className="btn-save" style={{borderRadius:'4px'}} onClick={() => setIsAuthed(true)}>Verify Access</button>
            </div>
          ) : (
            <div>
              <nav className="admin-nav">
                  {['home', 'photos', 'skills', 'portfolio', 'about'].map(t => (
                      <button key={t} onClick={() => setAdminTab(t)} className={`admin-nav-btn ${adminTab === t ? 'active' : ''}`}>{t === 'portfolio' ? 'Portfolio' : t}</button>
                  ))}
              </nav>
              <div className="admin-content">
                {adminTab === 'home' && (
                  <section>
                    <div className="input-box">
                      <div className="input-row"><label>Headline</label><input value={data.welcome?.title || ''} onChange={e => setData({...data, welcome: {...data.welcome, title: e.target.value}})} /></div>
                      <div className="input-row"><label>Intro Narrative</label><textarea value={data.welcome?.text || ''} style={{minHeight:'180px'}} onChange={e => setData({...data, welcome: {...data.welcome, text: e.target.value}})} /></div>
                      <div className="input-row"><label>Hero Image URL</label><input value={data.welcome?.image || ''} onChange={e => setData({...data, welcome: {...data.welcome, image: e.target.value}})} /></div>
                    </div>
                  </section>
                )}
                {adminTab === 'photos' && (
                  <section>
                    <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'2.5rem'}}>
                        <h3 style={{fontFamily:'Lora', fontSize:'1.6rem'}}>Photography Archive</h3>
                        <button onClick={() => addItem('photos')} style={{background:'white', border:'2px solid var(--forest)', color:'var(--forest)', padding:'0.6rem 1.5rem', fontSize:'11px', textTransform:'uppercase', fontWeight:'bold', borderRadius:'4px', cursor:'pointer'}}>+ Add Photo</button>
                    </div>
                    <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '2rem'}}>
                        {data.photos.map((p, i) => (
                            <div key={i} className="input-box" style={{position:'relative', marginBottom: 0}}>
                                <button onClick={() => removeItem('photos', i)} style={{color:'red', background:'none', border:'none', position:'absolute', top:'1rem', right:'1rem', fontSize:'9px', fontWeight:'bold', cursor:'pointer'}}>REMOVE</button>
                                <div className="input-row"><label>Title</label><input value={p.title} onChange={e => updateItem('photos', i, 'title', e.target.value)} /></div>
                                <div className="input-row" style={{marginBottom:0}}><label>Image URL (.jpg)</label><input value={p.url} onChange={e => updateItem('photos', i, 'url', e.target.value)} /></div>
                            </div>
                        ))}
                    </div>
                  </section>
                )}
                {(adminTab === 'skills' || adminTab === 'portfolio') && (
                  <section>
                    <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'2.5rem'}}>
                        <h3 style={{fontFamily:'Lora', fontSize:'1.6rem'}}>{adminTab === 'skills' ? 'Skills Archive' : 'Portfolio Archive'}</h3>
                        <button onClick={() => addItem(adminTab)} style={{background:'white', border:'2px solid var(--forest)', color:'var(--forest)', padding:'0.6rem 1.5rem', fontSize:'11px', textTransform:'uppercase', fontWeight:'bold', borderRadius:'4px', cursor:'pointer'}}>+ Add Entry</button>
                    </div>
                    <div>
                        {data[adminTab].map((item, i) => (
                            <div key={i} className="input-box" style={{position:'relative'}}>
                                <button onClick={() => removeItem(adminTab, i)} style={{color:'red', background:'none', border:'none', position:'absolute', top:'1rem', right:'1rem', fontSize:'9px', fontWeight:'bold', cursor:'pointer'}}>REMOVE</button>
                                <div className="input-row"><label>Label / Title</label><input value={item.label} onChange={e => updateItem(adminTab, i, 'label', e.target.value)} /></div>
                                <div className="input-row" style={{marginBottom:0}}><label>Content / Details</label><textarea value={item.content} style={{minHeight:'100px'}} onChange={e => updateItem(adminTab, i, 'content', e.target.value)} /></div>
                            </div>
                        ))}
                    </div>
                  </section>
                )}
                {adminTab === 'about' && (
                  <section>
                    <div className="input-box">
                      <div className="input-row"><label>Headline</label><input value={data.about?.title || ''} onChange={e => setData({...data, about: {...data.about, title: e.target.value}})} /></div>
                      <div className="input-row"><label>About Narrative</label><textarea value={data.about?.text || ''} style={{minHeight:'180px'}} onChange={e => setData({...data, about: {...data.about, text: e.target.value}})} /></div>
                      <div className="input-row"><label>Image URL</label><input value={data.about?.image || ''} onChange={e => setData({...data, about: {...data.about, image: e.target.value}})} /></div>
                    </div>
                  </section>
                )}
              </div>
              <div style={{padding:'2rem', background:'white', borderTop:'1px solid #eee'}}>
                  <button className="btn-save" onClick={saveChanges}>Deploy Updates to Live Site</button>
              </div>
            </div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
