<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html>
<html b:css='false' b:defaultwidgetversion='2' b:layoutsversion='3' expr:dir='data:blog.languageDirection' expr:lang='data:blog.locale' xmlns='http://www.w3.org/1999/xhtml' xmlns:b='http://www.google.com/namespaces/b/template' xmlns:data='http://www.google.com/namespaces/data' xmlns:expr='http://www.google.com/namespaces/expr'>
<head>
  <meta charset='UTF-8'/>
  <meta content='width=device-width, initial-scale=1.0' name='viewport'/>
  <title><data:blog.pageTitle/></title>

  <b:include data='blog' name='all-head-content'/>

  <!-- High-End Typography -->
  <link href='https://fonts.googleapis.com' rel='preconnect'/>
  <link crossorigin='' href='https://fonts.gstatic.com' rel='preconnect'/>
  <link href='https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&amp;family=Inter:wght@300;400;500;600;700&amp;family=Space+Mono:wght@400;700&amp;family=Caveat:wght@400;700&amp;display=swap' rel='stylesheet'/>

  <b:skin><![CDATA[
    /* --- MINESCOUT DESIGN SYSTEM v34.0 --- */
    :root {
      --paper: #fdfcf8;
      --ink: #1a1a1a;
      --muted: #555555;
      --wc-blue: rgba(100, 149, 237, 0.35);
      --wc-gold: rgba(194, 163, 120, 0.35);
      --wc-lavender: rgba(147, 112, 219, 0.3);
      --forest: #2D3A2D;
      --accent: #C2A378;
      --sidebar-width: 320px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background-color: var(--paper);
      background-image: url("https://www.transparenttextures.com/patterns/paper.png");
      background-attachment: fixed;
      font-family: 'Inter', sans-serif;
      color: var(--ink);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* Background Watercolor Elements */
    .bg-wash-container { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
    .wash { position: absolute; border-radius: 50%; filter: blur(100px); mix-blend-mode: multiply; opacity: 0.8; }
    .wash-1 { top: -5%; left: 5%; width: 55vw; height: 55vh; background: var(--wc-blue); }
    .wash-2 { bottom: -10%; right: -5%; width: 45vw; height: 65vh; background: var(--wc-gold); }
    .wash-3 { top: 25%; right: 10%; width: 40vw; height: 45vh; background: var(--wc-lavender); }

    /* The Torn Edge Sidebar */
    .sidebar {
      width: var(--sidebar-width); padding: 2.5rem 3rem; position: fixed; height: 100vh;
      display: flex; flex-direction: column; 
      background: linear-gradient(165deg, rgba(100, 149, 237, 0.4) 0%, rgba(253, 252, 248, 0.9) 60%, rgba(253, 252, 248, 1) 100%);
      backdrop-filter: blur(15px);
      clip-path: polygon(0% 0%, 100% 0%, 98% 3%, 99.5% 7%, 97.2% 11%, 98.8% 15%, 96.1% 19%, 99.8% 24%, 97.6% 28%, 99.2% 33%, 96.4% 38%, 98.2% 44%, 95.7% 49%, 99.4% 55%, 97.1% 61%, 98.6% 67%, 96.3% 73%, 99.1% 79%, 97.4% 85%, 99.6% 92%, 98.1% 97%, 100% 100%, 0% 100%);
      z-index: 1200;
    }

    .brand { margin-bottom: 3.5rem; text-decoration: none; color: inherit; display: block; }
    .brand h1 { font-family: 'Lora', serif; font-size: 1.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; line-height: 1; }
    .brand span { font-family: 'Space Mono', monospace; font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.2em; color: var(--muted); display: block; margin-top: 8px; }

    nav ul { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 1.5rem; }
    nav a { text-decoration: none; color: var(--ink); font-weight: 700; text-transform: uppercase; font-size: 0.78rem; opacity: 0.55; transition: 0.3s; }
    nav a:hover, .active-link { opacity: 1; padding-left: 10px; border-left: 2px solid var(--forest); }

    main { margin-left: calc(var(--sidebar-width) - 20px); padding: 5rem 6rem; flex: 1; max-width: 1450px; }

    /* Page Content */
    .post-outer { margin-bottom: 5rem; }
    .post-title { font-family: 'Lora', serif; font-size: 3.5rem; color: var(--forest); margin-bottom: 2rem; font-weight: 400; }
    .post-body { font-size: 1.15rem; color: #222; }
    
    /* Photography Grid (For Home Feed) */
    .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 3.5rem; }
    .photo-card { background: white; padding: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.04); border-radius: 2px; }
    .photo-card img { width: 100%; aspect-ratio: 1; object-fit: cover; }
    .photo-card h3 { font-family: 'Caveat', cursive; font-size: 1.6rem; text-align: right; margin-top: 12px; color: var(--muted); }

    /* Smart Grid Support (H3 headings) */
    .post-body h3 { font-family: 'Space Mono', monospace; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; color: var(--ink); border-left: 6px solid var(--wc-blue); padding-left: 22px; margin-top: 4rem; margin-bottom: 1rem; }

    footer { margin-top: 10rem; padding: 5rem 0; border-top: 1px solid var(--wc-blue); font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--muted); text-transform: uppercase; }

    @media (max-width: 1024px) {
      .sidebar { display: none; }
      main { margin-left: 0; padding: 4rem 1.5rem; }
    }
  ]]></b:skin>
</head>
<body>

  <div class='bg-wash-container'>
    <div class='wash wash-1'/>
    <div class='wash wash-2'/>
    <div class='wash wash-3'/>
  </div>

  <aside class='sidebar'>
    <a class='brand' expr:href='data:blog.homepageUrl'>
      <h1>Fern<br/>Carleton</h1>
      <span>Art and Reasoning</span>
    </a>
    <nav>
      <ul>
        <li><a expr:href='data:blog.homepageUrl'>Photos</a></li>
        <li><a href='/p/about.html'>About</a></li>
        <li><a href='/p/skills.html'>Skills</a></li>
        <li><a href='/p/resume.html'>Resume</a></li>
        <li><a href='/p/contact.html'>Contact</a></li>
      </ul>
    </nav>
  </aside>

  <main>
    <b:section id='main-content' showaddelement='yes'>
      <b:widget id='Blog1' locked='true' title='Blog Posts' type='Blog'>
        <b:includable id='main'>
          <b:if cond='data:view.isHomepage'>
            <h2 class='post-title'>Photography</h2>
            <div class='photo-grid'>
              <b:loop values='data:posts' var='post'>
                <div class='photo-card'>
                  <b:if cond='data:post.firstImageUrl'>
                    <img expr:src='data:post.firstImageUrl'/>
                  </b:if>
                  <h3><data:post.title/></h3>
                </div>
              </b:loop>
            </div>
          <b:else/>
            <b:loop values='data:posts' var='post'>
              <div class='post-outer'>
                <h2 class='post-title'><data:post.title/></h2>
                <div class='post-body'>
                  <data:post.body/>
                </div>
              </div>
            </b:loop>
          </b:if>
        </b:includable>
      </b:widget>
    </b:section>

    <footer>
      &copy; <data:blog.copyrightResharable/> Fern Carleton &bull; Minescout Archive v34.0
    </footer>
  </main>

  <b:include data='blog' name='all-head-content'/>
</body>
</html>
