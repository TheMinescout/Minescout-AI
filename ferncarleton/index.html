<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FERN CARLETON | Art & Reasoning</title>
  
  <link rel="icon" type="image/png" href="https://i.postimg.cc/c4TgCHfX/Chat-GPT-Image-Mar-8-2026-08-22-54-AM.png">

  <!-- Core Frameworks -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- EmailJS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Caveat:wght@400;700&display=swap" rel="stylesheet">

  <style>
    /* --- MINESCOUT BACKEND SYSTEM v53.0 --- */
    :root {
      --paper: #fdfcf8;
      --ink: #1a1a1a;
      --muted: #555555;
      --wc-blue: rgba(65, 105, 225, 0.35);
      --wc-gold: rgba(194, 163, 120, 0.35);
      --wc-lavender: rgba(147, 112, 219, 0.3);
      --forest: #2D3A2D;
      --accent: #C2A378;
      --sidebar-width: 320px;
      --header-height: 70px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background-color: var(--paper);
      background-image: url("https://www.transparenttextures.com/patterns/paper.png");
      background-attachment: fixed;
      font-family: 'Inter', sans-serif;
      color: var(--ink);
      line-height: 1.6;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Background Environment */
    .bg-wash-container { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
    .wash { position: absolute; border-radius: 50%; filter: blur(100px); mix-blend-mode: multiply; opacity: 0.8; }
    .wash-1 { top: -5%; left: 5%; width: 55vw; height: 55vh; background: var(--wc-blue); }
    .wash-2 { bottom: -10%; right: -5%; width: 45vw; height: 65vh; background: var(--wc-gold); }
    .wash-3 { top: 25%; right: 10%; width: 40vw; height: 45vh; background: var(--wc-lavender); }

    /* The High-Detail Torn Sidebar */
    .sidebar {
      width: var(--sidebar-width); padding: 2.5rem 3rem 4rem; position: fixed; height: 100vh;
      display: flex; flex-direction: column; 
      background: linear-gradient(165deg, rgba(100, 149, 237, 0.4) 0%, rgba(253, 252, 248, 0.9) 60%, rgba(253, 252, 248, 1) 100%);
      backdrop-filter: blur(15px);
      clip-path: polygon(0% 0%, 100% 0%, 98% 3%, 99.5% 7%, 97.2% 11%, 98.8% 15%, 96.1% 19%, 99.8% 24%, 97.6% 28%, 99.2% 33%, 96.4% 38%, 98.2% 44%, 95.7% 49%, 99.4% 55%, 97.1% 61%, 98.6% 67%, 96.3% 73%, 99.1% 79%, 97.4% 85%, 99.6% 92%, 98.1% 97%, 100% 100%, 0% 100%);
      z-index: 2000;
    }

    .brand { margin-bottom: 3.5rem; cursor: pointer; }
    .brand h1 { font-family: 'Lora', serif; font-size: 1.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; line-height: 1; }
    .brand span { font-family: 'Space Mono', monospace; font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.2em; color: var(--muted); display: block; margin-top: 8px; }

    /* Navigation */
    .nav-list { display: flex; flex-direction: column; gap: 1.5rem; }
    .nav-btn { background: none; border: none; font-family: 'Lora', serif; font-style: italic; font-size: 1.1rem; text-align: left; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; opacity: 0.5; transition: 0.3s; color: var(--ink); outline: none; }
    .nav-btn.active { opacity: 1; border-left: 2px solid var(--forest); padding-left: 10px; }

    main { margin-left: var(--sidebar-width); padding: 5rem 6rem; flex: 1; max-width: 1450px; }

    /* Admin UI CSS Update */
    .admin-card { background: white; padding: 0; border-radius: 8px; box-shadow: 0 30px 60px rgba(0,0,0,0.12); width: 100%; max-width: 1100px; margin: 0 auto; overflow: hidden; }
    .admin-header { background: var(--forest); color: white; padding: 2rem 3rem; display: flex; justify-content: space-between; align-items: center; }
    .admin-header h2 { font-family: 'Lora', serif; font-size: 1.8rem; font-weight: 400; }
    
    .admin-nav { display: flex; background: #f8f9f8; border-bottom: 1px solid #eee; padding: 0 2rem; }
    .admin-nav-btn { background: none; border: none; padding: 1.2rem 1.5rem; font-family: 'Space Mono', monospace; font-size: 11px; text-transform: uppercase; font-weight: 700; color: #888; cursor: pointer; border-bottom: 2px solid transparent; transition: 0.2s; }
    .admin-nav-btn.active { color: var(--forest); border-bottom-color: var(--forest); }
    .admin-nav-btn:hover:not(.active) { color: #333; }

    .admin-content { padding: 3rem; max-height: 70vh; overflow-y: auto; }
    .admin-instruction { background: #fdfaf3; border: 1px solid #eee; padding: 1.5rem; margin-bottom: 2.5rem; font-size: 0.85rem; border-radius: 4px; }
    
    .input-row { margin-bottom: 2.5rem; }
    .input-row label { display: block; font-family: 'Space Mono', monospace; font-size: 9px; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; font-weight: 700; }
    .input-row input, .input-row textarea { width: 100%; border: 1px solid #eee; background: #fafafa; border-radius: 4px; padding: 12px 15px; font-size: 1rem; outline: none; color: var(--ink); font-family: inherit; transition: 0.2s; }
    .input-row input:focus, .input-row textarea:focus { border-color: var(--accent); background: white; box-shadow: 0 0 0 4px rgba(194, 163, 120, 0.05); }

    .btn-save { background: var(--forest); color: white; border: none; padding: 1.2rem 2.5rem; font-family: 'Space Mono'; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.2s; width: 100%; border-radius: 0 0 8px 8px; }
    .btn-save:hover { background: var(--ink); letter-spacing: 0.05em; }

    .post-box { background: #fff; border: 1px solid #eee; padding: 2rem; border-radius: 6px; margin-bottom: 1.5rem; position: relative; transition: 0.3s; }
    .post-box:hover { border-color: #ddd; box-shadow: 0 5px 15px rgba(0,0,0,0.02); }
    .btn-delete { color: #ff5c5c; background: none; border: none; font-size: 9px; font-weight: bold; text-transform: uppercase; cursor: pointer; position: absolute; top: 2rem; right: 2rem; opacity: 0.5; }
    .btn-delete:hover { opacity: 1; text-decoration: underline; }

    /* Content Styling */
    .page-title { font-family: 'Lora', serif; font-size: 4rem; color: var(--forest); margin-bottom: 2.5rem; font-weight: 400; }
    .hero-grid { display: grid; grid-template-columns: 1fr 1.1fr; gap: 5.5rem; align-items: start; }
    .hero-img-wrap { background: white; padding: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); transform: rotate(-1.5deg); }
    .hero-img-wrap img { width: 100%; border-radius: 1px; }

    .smart-row { display: grid; grid-template-columns: 260px 1fr; gap: 4rem; margin-bottom: 4.5rem; }
    .smart-label { font-family: 'Space Mono', monospace; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; border-left: 6px solid var(--wc-blue); padding-left: 22px; }

    .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 3.5rem; }
    .photo-card { background: white; padding: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border-radius: 2px; }
    .photo-card img { width: 100%; aspect-ratio: 1; object-fit: cover; }
    .photo-card h3 { font-family: 'Caveat', cursive; font-size: 1.6rem; text-align: right; margin-top: 10px; color: var(--muted); }

    .contact-card { background: rgba(255,255,255,0.6); padding: 4rem; border-radius: 2px; box-shadow: 0 15px 35px rgba(0,0,0,0.04); backdrop-filter: blur(10px); max-width: 700px; margin: 0 auto; clip-path: polygon(1% 1%, 99% 0%, 100% 2%, 98% 8%, 100% 15%, 97% 22%, 99% 30%, 98% 38%, 100% 45%, 97% 55%, 99% 65%, 98% 75%, 100% 85%, 97% 95%, 99% 100%, 0% 100%, 2% 85%, 0% 70%, 3% 55%, 1% 40%, 4% 25%, 2% 10%); }

    @media (max-width: 1024px) {
      .sidebar { display: none; }
      main { margin-left: 0; padding: 2rem; }
      .page-title { font-size: 2.8rem; }
      .hero-grid, .smart-row { grid-template-columns: 1fr; gap: 2rem; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- CONFIGURATION ---
    const WORKER_URL = "https://backend.tmcarleton11.workers.dev/"; 
    const EMAILJS_KEY = "1tk_WpVfkT1oGuS4P";
    const EMAILJS_SERVICE = "service_91osf0m";
    const EMAILJS_TEMPLATE = "template_n98oiz5";

    const App = () => {
      const [view, setView] = useState('home');
      const [adminTab, setAdminTab] = useState('photos');
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [adminKey, setAdminKey] = useState("");
      const [isAuthed, setIsAuthed] = useState(false);

      useEffect(() => {
        if (window.emailjs) emailjs.init(EMAILJS_KEY);

        fetch(WORKER_URL)
          .then(res => res.json())
          .then(d => { 
            if(!d.photos) d.photos = [];
            if(!d.skills) d.skills = [];
            if(!d.resume) d.resume = [];
            setData(d); 
            setLoading(false); 
          })
          .catch(e => { console.error("Archive sync failed", e); setLoading(false); });

        if (window.location.hash === "#admin") setView('admin');
      }, []);

      const saveChanges = async () => {
        const response = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key: adminKey, data: data })
        });
        if (response.ok) { alert("Archive Successfully Deployed."); } 
        else { alert("Verification Failed."); }
      };

      const addItem = (target) => {
        const newItem = target === 'photos' ? { title: "Untitled Entry", url: "" } : { label: "Category", content: "Write details here..." };
        setData({ ...data, [target]: [newItem, ...(data[target] || [])] });
      };

      const updateItem = (target, index, field, value) => {
        const newList = [...data[target]];
        newList[index][field] = value;
        setData({ ...data, [target]: newList });
      };

      const removeItem = (target, index) => {
        setData({ ...data, [target]: data[target].filter((_, i) => i !== index) });
      };

      if (loading) return <div style={{height:'100vh', display:'flex', alignItems:'center', justifyContent:'center', fontFamily:'Lora', fontStyle:'italic', color: '#c2a378'}}>Restoring Archive...</div>;
      if (!data) return <div style={{padding:'5rem', textAlign:'center'}}>Connection to backend failed.</div>;

      return (
        <div className="flex">
          <div className="bg-wash-container"><div className="wash wash-1"></div><div className="wash wash-2"></div><div className="wash wash-3"></div></div>

          {view !== 'admin' && (
            <aside className="sidebar">
              <div className="brand" onClick={() => setView('home')}>
                <h1>Fern<br/>Carleton</h1>
                <span className="font-mono text-[10px] uppercase text-[#c2a378] mt-2 block tracking-widest">Art & Reasoning</span>
              </div>
              <nav className="nav-list mt-12">
                {['home', 'photos', 'skills', 'resume', 'about', 'contact'].map(tab => (
                  <button key={tab} onClick={() => setView(tab)} className={`nav-btn ${view === tab ? 'active' : ''}`}>{tab}</button>
                ))}
              </nav>
              <div style={{marginTop:'auto', opacity:0.2, fontSize:'9px', fontFamily:'Space Mono'}}>ARCHIVE v53.0</div>
            </aside>
          )}

          <main className={view === 'admin' ? 'w-full ml-0 py-20 flex justify-center bg-gray-50/50 min-h-screen' : ''}>
            {view === 'admin' ? (
              <div className="admin-card animate-in fade-in duration-500">
                <header className="admin-header">
                    <h2>Studio Backstage</h2>
                    <button onClick={() => setView('home')} style={{background:'rgba(255,255,255,0.1)', border:'none', color:'white', padding:'8px 15px', borderRadius:'4px', cursor:'pointer', fontSize:'10px', fontWeight:'bold', textTransform:'uppercase'}}>Exit Dashboard</button>
                </header>
                
                {!isAuthed ? (
                  <div className="p-12 space-y-8">
                    <div className="admin-instruction">
                      Enter your <code>ADMIN_SECRET</code> key below to manage the digital archive.
                    </div>
                    <div className="input-row">
                        <label>Secret Reasoning Key</label>
                        <input type="password" placeholder="••••••••" onChange={e => setAdminKey(e.target.value)} onKeyDown={e => e.key === 'Enter' && setIsAuthed(true)} />
                    </div>
                    <button className="btn-save" style={{borderRadius:'4px'}} onClick={() => setIsAuthed(true)}>Verify Access</button>
                  </div>
                ) : (
                  <div>
                    <nav className="admin-nav">
                        {['photos', 'skills', 'resume', 'about', 'contact'].map(t => (
                            <button key={t} onClick={() => setAdminTab(t)} className={`admin-nav-btn ${adminTab === t ? 'active' : ''}`}>{t}</button>
                        ))}
                    </nav>

                    <div className="admin-content">
                        {adminTab === 'photos' && (
                            <section className="animate-in slide-in-from-bottom-4 duration-500">
                                <div className="admin-instruction">
                                    <strong>Photography Workflow:</strong> Use <a href="https://postimg.cc" target="_blank" style={{color:'var(--forest)', fontWeight:'bold'}}>PostImg.cc</a>. Upload your photo, click "Share," then copy the <code>Direct Link</code> (ends in .jpg) and paste it below.
                                </div>
                                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'2rem'}}>
                                    <h3 style={{fontFamily:'Lora', fontSize:'1.4rem'}}>Gallery Library</h3>
                                    <button onClick={() => addItem('photos')} className="btn-outline">+ Post New Photo</button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {data.photos.map((p, i) => (
                                        <div key={i} className="post-box">
                                            <button className="btn-delete" onClick={() => removeItem('photos', i)}>Remove Post</button>
                                            <div className="input-row"><label>Post Title</label><input value={p.title} onChange={e => updateItem('photos', i, 'title', e.target.value)} /></div>
                                            <div className="input-row" style={{marginBottom:0}}><label>Direct Link (.jpg)</label><input value={p.url} onChange={e => updateItem('photos', i, 'url', e.target.value)} /></div>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        )}

                        {(adminTab === 'skills' || adminTab === 'resume') && (
                            <section className="animate-in slide-in-from-bottom-4 duration-500">
                                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'2rem'}}>
                                    <h3 style={{fontFamily:'Lora', fontSize:'1.4rem'}}>{adminTab.charAt(0).toUpperCase() + adminTab.slice(1)} Grid</h3>
                                    <button onClick={() => addItem(adminTab)} className="btn-outline">+ Add Row</button>
                                </div>
                                {data[adminTab].map((item, i) => (
                                    <div key={i} className="post-box" style={{display:'flex', gap:'2rem'}}>
                                        <button className="btn-delete" onClick={() => removeItem(adminTab, i)}>Delete Row</button>
                                        <div className="input-row" style={{width:'240px', marginBottom:0}}><label>Label</label><input value={item.label} onChange={e => updateItem(adminTab, i, 'label', e.target.value)} /></div>
                                        <div className="input-row" style={{flex:1, marginBottom:0}}><label>Details</label><textarea value={item.content} onChange={e => updateItem(adminTab, i, 'content', e.target.value)} /></div>
                                    </div>
                                ))}
                            </section>
                        )}

                        {adminTab === 'about' && (
                            <section className="animate-in slide-in-from-bottom-4 duration-500">
                                <h3 style={{fontFamily:'Lora', fontSize:'1.4rem', marginBottom:'2rem'}}>Bio & Identity</h3>
                                <div className="input-row"><label>Biography Headline</label><input value={data.about?.title || ''} onChange={e => setData({...data, about: {...data.about, title: e.target.value}})} /></div>
                                <div className="input-row"><label>Bio Body Text</label><textarea value={data.about?.text || ''} style={{minHeight:'250px'}} onChange={e => setData({...data, about: {...data.about, text: e.target.value}})} /></div>
                                <div className="input-row"><label>About Page Photo URL</label><input value={data.about?.image || ''} onChange={e => setData({...data, about: {...data.about, image: e.target.value}})} /></div>
                            </section>
                        )}

                        {adminTab === 'contact' && (
                            <section className="animate-in slide-in-from-bottom-4 duration-500">
                                <h3 style={{fontFamily:'Lora', fontSize:'1.4rem', marginBottom:'2rem'}}>Inquiry Page</h3>
                                <div className="input-row"><label>Page Headline</label><input value={data.contact?.title || ''} onChange={e => setData({...data, contact: {...data.contact, title: e.target.value}})} /></div>
                                <div className="input-row"><label>Instructional Text</label><textarea value={data.contact?.text || ''} onChange={e => setData({...data, contact: {...data.contact, text: e.target.value}})} /></div>
                            </section>
                        )}
                    </div>
                    <button className="btn-save" onClick={saveChanges}>Push Changes Instantly</button>
                  </div>
                )}
              </div>
            ) : (
              <div className="animate-in fade-in duration-700">
                {view === 'home' && <Hero data={data.welcome} />}
                {view === 'about' && <Hero data={data.about} />}
                {view === 'photos' && <Gallery items={data.photos} />}
                {view === 'skills' && <SmartGrid title="Skills" items={data.skills} />}
                {view === 'resume' && <SmartGrid title="Resume" items={data.resume} />}
                {view === 'contact' && <ContactView data={data.contact} service={EMAILJS_SERVICE} template={EMAILJS_TEMPLATE} />}
              </div>
            )}
          </main>
        </div>
      );
    };

    /** --- UI COMPONENTS --- */
    const Hero = ({ data }) => (
        <div className="hero-grid">
            <div className="hero-text"><h2 className="page-title leading-tight">{data?.title}</h2><p className="text-xl text-gray-700">{data?.text}</p></div>
            <div className="hero-img-wrap"><img src={data?.image} className="w-full shadow-lg" alt="Studio View" /></div>
        </div>
    );

    const Gallery = ({ items }) => (
        <div><h2 className="page-title">Photography</h2><div className="photo-grid">
            {items && items.map((p, i) => (
                <div key={i} className="photo-card group hover:-translate-y-2 transition-transform duration-500">
                    <img src={p.url} alt={p.title} />
                    <h3 className="font-handwriting text-2xl text-right mt-4 text-[#555]">{p.title}</h3>
                </div>
            ))}
        </div></div>
    );

    const SmartGrid = ({ title, items }) => (
        <div><h2 className="page-title">{title}</h2>{items && items.map((item, i) => (
            <div key={i} className="smart-row"><div className="smart-label">{item.label}</div><div className="text-lg text-gray-700 leading-relaxed" dangerouslySetInnerHTML={{__html: item.content}}></div></div>
        ))}</div>
    );

    const ContactView = ({ data, service, template }) => {
        const formRef = useRef();
        const [sent, setSent] = useState(false);
        const [status, setStatus] = useState("Deliver Inquiry");

        const sendEmail = (e) => {
            e.preventDefault(); 
            setStatus("Sending...");
            emailjs.sendForm(service, template, formRef.current)
                .then(() => setSent(true))
                .catch((err) => { console.error(err); setStatus("Error - Try Again"); });
        };

        if (sent) return (
            <div className="contact-card">
                <h2 className="font-serif text-3xl mb-4 text-green-700">Inquiry Delivered.</h2>
                <p className="italic">Your message has been added to the PNW Archive. I will respond to your reasoning shortly.</p>
            </div>
        );

        return (
            <div className="contact-card">
                <h2 className="font-serif text-5xl mb-6">{data?.title}</h2>
                <p className="italic text-gray-600 mb-12">{data?.text}</p>
                <form ref={formRef} onSubmit={sendEmail}>
                    <div className="input-group"><label style={{fontSize:'9px', textTransform:'uppercase', fontWeight:'bold', color:'var(--accent)', marginBottom:'8px', display:'block'}}>Your Name</label><input style={{width:'100%', border:'none', borderBottom:'1px solid #eee', padding:'10px 0', outline:'none', background:'none', fontStyle:'italic'}} type="text" name="user_name" required /></div>
                    <div className="input-group" style={{marginTop:'20px'}}><label style={{fontSize:'9px', textTransform:'uppercase', fontWeight:'bold', color:'var(--accent)', marginBottom:'8px', display:'block'}}>Your Email</label><input style={{width:'100%', border:'none', borderBottom:'1px solid #eee', padding:'10px 0', outline:'none', background:'none', fontStyle:'italic'}} type="email" name="user_email" required /></div>
                    <div className="input-group" style={{marginTop:'20px'}}><label style={{fontSize:'9px', textTransform:'uppercase', fontWeight:'bold', color:'var(--accent)', marginBottom:'8px', display:'block'}}>Share your reasoning</label><textarea style={{width:'100%', border:'none', borderBottom:'1px solid #eee', padding:'10px 0', outline:'none', background:'none', fontStyle:'italic', minHeight:'120px', resize:'none'}} name="message" required></textarea></div>
                    <button type="submit" className="btn-action w-full" style={{marginTop:'40px'}}>{status}</button>
                </form>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
