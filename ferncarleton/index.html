<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FERN CARLETON | Art & Reasoning</title>
  
  <!-- Favicon Updated to Fern's Personal Logo -->
  <link rel="icon" type="image/png" href="https://i.postimg.cc/c4TgCHfX/Chat-GPT-Image-Mar-8-2026-08-22-54-AM.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    :root {
      --cream: #F8F7F2;     /* Sidebar / Accents */
      --pink: #FDEEF4;      /* Wallpaper background for art pages */
      --white: #FFFFFF;     /* Base background */
      --ink: #000000;       /* Primary text */
      --muted: #666666;     /* Secondary text */
      --border: #e0e0e0;
      --accent: #C2A378;    /* Wood Gold accent */
      
      --font-header: 'Lora', serif;
      --font-body: 'Inter', sans-serif;
      --font-mono: 'Space Mono', monospace;
      
      --sidebar-width: 300px;
      --mobile-header-height: 60px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--white);
      font-family: var(--font-body);
      color: var(--ink);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      transition: background-color 0.5s ease;
      overflow-x: hidden;
    }

    body.wallpaper-active { background-color: var(--pink); }
    body.menu-open { overflow: hidden; }

    .site-wrapper { display: flex; min-height: 100vh; }

    /* --- MOBILE TOP BAR --- */
    .mobile-bar {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--mobile-header-height);
      background: var(--cream);
      border-bottom: 1px solid var(--border);
      z-index: 1100;
      padding: 0 1.5rem;
      align-items: center;
      justify-content: space-between;
    }
    
    .mobile-brand {
      font-family: var(--font-header);
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
    }

    .hamburger {
      background: none;
      border: none;
      cursor: pointer;
      width: 30px;
      height: 20px;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .hamburger span {
      display: block;
      width: 100%;
      height: 2px;
      background: var(--ink);
      transition: 0.3s;
    }

    /* --- SIDEBAR --- */
    .sidebar {
      width: var(--sidebar-width);
      padding: 4rem 3rem;
      position: fixed;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--cream);
      border-right: 1px solid rgba(0,0,0,0.05);
      z-index: 1200;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .brand { margin-bottom: 5rem; cursor: pointer; }
    .brand img.sidebar-logo {
      width: 64px; height: 64px; margin-bottom: 1.5rem; border-radius: 50%;
      display: block; object-fit: cover; mix-blend-mode: multiply;
    }
    .brand h1 { font-family: var(--font-header); font-size: 1.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; line-height: 1; }
    .brand span { font-family: var(--font-mono); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.2em; color: var(--muted); display: block; margin-top: 10px; }

    .nav-links { display: flex; flex-direction: column; gap: 1.5rem; }
    .nav-links a {
      text-decoration: none; color: var(--ink); font-family: var(--font-body);
      font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em;
      font-size: 0.75rem; opacity: 0.4; transition: 0.3s;
      padding: 5px 0;
    }
    .nav-links a:hover, .nav-links a.active { opacity: 1; padding-left: 5px; }

    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 1150;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    /* --- MAIN CONTENT --- */
    main {
      margin-left: var(--sidebar-width);
      padding: 5rem 6rem;
      flex: 1;
      max-width: 1300px;
      width: 100%;
    }

    /* --- HERO PORTRAIT --- */
    #hero-container {
      display: none;
      grid-template-columns: 1.1fr 1.2fr;
      gap: 5rem;
      align-items: center;
      margin-bottom: 6rem;
    }
    .hero-img-wrap {
      background: white;
      padding: 1rem;
      box-shadow: 0 20px 50px rgba(0,0,0,0.05);
    }
    .hero-img-wrap img {
      width: 100%;
      display: block;
      filter: contrast(1.05);
      border-radius: 2px;
    }
    .hero-text h2 {
      font-family: var(--font-header);
      font-size: 3.5rem;
      margin-bottom: 1.5rem;
      line-height: 1.1;
      font-weight: 400;
    }
    .hero-text p {
      font-size: 1.15rem;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    /* --- FILTERS --- */
    .filter-bar {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 3rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1rem;
      overflow-x: auto;
      white-space: nowrap;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }

    .filter-btn {
      background: none;
      border: none;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      color: var(--muted);
      padding: 8px 12px;
      border-radius: 4px;
      transition: 0.2s;
    }
    .filter-btn.active {
      color: var(--ink);
      font-weight: 700;
      background: var(--white);
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    /* --- GRID --- */
    .arts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 2rem;
    }
    .art-card {
      text-decoration: none;
      color: inherit;
      display: block;
      transition: 0.3s;
    }
    .art-card:hover { transform: translateY(-5px); }
    .art-img-wrap {
      background: var(--cream);
      aspect-ratio: 1;
      overflow: hidden;
      margin-bottom: 1rem;
      border: 1px solid rgba(0,0,0,0.05);
    }
    .art-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .art-info h4 { font-family: var(--font-header); font-size: 1.2rem; font-weight: 600; }
    .art-info span { font-family: var(--font-mono); font-size: 0.65rem; color: var(--muted); text-transform: uppercase; }

    /* --- ENTRY VIEW --- */
    .entry-layout { display: grid; grid-template-columns: 1.2fr 1fr; gap: 5rem; }
    .entry-visual img { width: 100%; border: 10px solid white; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
    .entry-details h2 { font-family: var(--font-header); font-size: 3rem; margin-bottom: 1rem; line-height: 1.1; }
    .entry-details .meta-tag { font-family: var(--font-mono); font-size: 0.7rem; background: var(--ink); color: var(--white); padding: 4px 12px; border-radius: 50px; display: inline-block; margin-bottom: 2rem; text-transform: uppercase; }
    .section-label { font-family: var(--font-mono); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 0.5rem; display: block; border-bottom: 1px solid var(--border); padding-bottom: 5px; margin-top: 2rem; }
    
    .materials-list { list-style: none; margin-bottom: 2rem; }
    .materials-list li::before { content: "☐ "; color: var(--accent); }
    .specs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .spec-item b { display: block; font-family: var(--font-mono); font-size: 0.6rem; color: var(--muted); text-transform: uppercase; }

    /* --- TEXT CONTENT --- */
    .text-content { max-width: 800px; }
    .text-content h2 { font-family: var(--font-header); font-size: 3.5rem; margin-bottom: 2rem; }
    .text-content p { font-size: 1.15rem; margin-bottom: 1.5rem; }

    footer { margin-top: 8rem; padding: 4rem 0; border-top: 1px solid var(--border); font-family: var(--font-mono); font-size: 0.65rem; color: var(--muted); text-transform: uppercase; }
    
    /* --- RESPONSIVE / MOBILE OVERRIDES --- */
    @media (max-width: 1024px) {
      .mobile-bar { display: flex; }
      .sidebar {
        transform: translateX(-100%);
        width: 280px;
        box-shadow: 10px 0 30px rgba(0,0,0,0.1);
      }
      .sidebar-overlay { display: block; }
      
      body.menu-open .sidebar { transform: translateX(0); }
      body.menu-open .sidebar-overlay { opacity: 1; pointer-events: auto; }
      
      main {
        margin-left: 0;
        padding: calc(var(--mobile-header-height) + 3rem) 1.5rem 3rem 1.5rem;
      }
      
      #hero-container { grid-template-columns: 1fr; gap: 3rem; text-align: center; }
      .entry-layout { grid-template-columns: 1fr; gap: 3rem; }
      .entry-details h2 { font-size: 2.2rem; }
      .text-content h2 { font-size: 2.5rem; }
      
      .arts-grid {
        grid-template-columns: repeat(auto-fill, minmax(100%, 1fr));
      }
    }

    @media (min-width: 600px) and (max-width: 1024px) {
      .arts-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body id="body">

  <div class="mobile-bar">
    <div class="mobile-brand" onclick="navigateTo('/')">Fern Carleton</div>
    <button class="hamburger" id="menu-toggle" aria-label="Toggle Menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
  
  <div class="sidebar-overlay" id="overlay"></div>

  <div class="site-wrapper">
    <nav class="sidebar" id="sidebar">
      <div class="brand" onclick="navigateTo('/')">
        <img src="https://i.postimg.cc/c4TgCHfX/Chat-GPT-Image-Mar-8-2026-08-22-54-AM.png" alt="Fern Carleton Logo" class="sidebar-logo">
        <h1>Fern<br>Carleton</h1>
        <span>Art & Reasoning</span>
      </div>
      <div class="nav-links">
        <a href="/arts/" class="nav-link" data-link>Arts</a>
        <a href="/skills/" class="nav-link" data-link>Skills</a>
        <a href="/resume/" class="nav-link" data-link>Resume</a>
        <a href="/about/" class="nav-link" data-link>About</a>
        <a href="/contact/" class="nav-link" data-link>Contact</a>
      </div>
      
      <div style="margin-top: auto;">
        <span style="font-family:var(--font-mono); font-size:0.6rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em;">Archive v5.0 Zero-Hashtag</span>
      </div>
    </nav>

    <main id="main-content">
      <div id="hero-container">
        <div class="hero-img-wrap"><img id="hero-image" src="" alt="Fern Carleton"></div>
        <div class="hero-text" id="hero-target"></div>
      </div>
      <div id="app-root"></div>
    </main>
  </div>

  <script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbygWtwrPzJUbH2nrt4JRxTqs2FXfGwFYU-6kP2ORKcbESaY2HswOiAKyceLOgdNI4KBuA/exec'; 
    const CACHE_KEY = 'fern_master_v5_cache';
    const CACHE_TIME = 3600000; 

    const HERO_HOME = "https://i.postimg.cc/prL9JMHh/PXL_20251223_225914443.jpg"; 
    const HERO_CONTACT = "https://i.postimg.cc/RhZ3LxBZ/PXL_20260209_161536343.jpg"; 

    let siteData = { pages: {}, entries: [] };
    let currentFilter = 'all';

    const menuToggle = document.getElementById('menu-toggle');
    const overlay = document.getElementById('overlay');
    const bodyTag = document.getElementById('body');

    function toggleMenu() { bodyTag.classList.toggle('menu-open'); }
    function closeMenu() { bodyTag.classList.remove('menu-open'); }

    menuToggle.addEventListener('click', toggleMenu);
    overlay.addEventListener('click', closeMenu);

    async function initApp() {
      const cached = localStorage.getItem(CACHE_KEY);
      if (cached) {
        const { timestamp, data } = JSON.parse(cached);
        if (Date.now() - timestamp < CACHE_TIME) {
          parseDoc(data); renderPage(); fetchFresh(); return;
        }
      }
      await fetchFresh();
    }

    async function fetchFresh() {
      try {
        const res = await fetch(APPS_SCRIPT_URL);
        const text = await res.text();
        localStorage.setItem(CACHE_KEY, JSON.stringify({ timestamp: Date.now(), data: text }));
        parseDoc(text); renderPage();
      } catch (e) { console.error("Sync error", e); }
    }

    /** * THE ZERO-HASHTAG PARSER
     * Looks for --- as the divider. The line immediately after is the Title.
     * No hashtags required.
     */
    function parseDoc(text) {
      siteData = { pages: {}, entries: [] };
      // Split by 3 dashes or more on their own line
      const sections = text.split(/^-{3,}\s*$/m).map(s => s.trim()).filter(s => s.length > 0);
      
      // We skip the first section (Instructions/Notes)
      for (let i = 1; i < sections.length; i++) {
        const section = sections[i];
        const lines = section.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        if (lines.length === 0) continue;

        const titleLine = lines[0]; // First non-empty line after dashes is the Title
        const bodyContent = lines.slice(1).join('\n');
        const slug = slugify(titleLine);

        if (titleLine.toLowerCase().startsWith('entry:')) {
          const entryTitle = titleLine.replace(/entry:\s*/i, '');
          siteData.entries.push(parseEntry(entryTitle, bodyContent));
        } else {
          // Normal page (Welcome, About, Skills, etc.)
          siteData.pages[slug] = { title: titleLine, html: marked.parse(bodyContent) };
        }
      }
    }

    function parseEntry(title, body) {
      const data = { title, id: slugify(title), body };
      const typeMatch = body.match(/Type:\s*([a-zA-Z]+)/i);
      data.type = typeMatch ? typeMatch[1].trim().toLowerCase() : 'art';
      const imgMatch = body.match(/Image:\s*(https:\/\/[^\s\n]+)/i);
      data.img = imgMatch ? imgMatch[1].trim() : 'https://via.placeholder.com/800x800';
      const descMatch = body.match(/Description:\s*([\s\S]*?)(?=\n[A-Z][a-z]+:|$)/);
      data.description = descMatch ? descMatch[1].trim() : '';
      const matMatch = body.match(/Materials:\s*([^.\n]+)/i);
      data.materials = matMatch ? matMatch[1].split(',').map(m => m.trim()) : [];
      const procMatch = body.match(/Process:\s*([\s\S]*?)(?=\n[A-Z][a-z]+:|$)/);
      data.process = procMatch ? procMatch[1].trim() : '';
      data.specs = {
        location: (body.match(/Location:\s*([^.\n]+)/i) || [])[1] || 'Unknown',
        camera: (body.match(/Camera:\s*([^.\n]+)/i) || [])[1] || 'N/A',
        lens: (body.match(/Lens:\s*([^.\n]+)/i) || [])[1] || 'N/A',
        settings: (body.match(/Settings:\s*([^.\n]+)/i) || [])[1] || 'N/A'
      };
      return data;
    }

    function renderPage() {
      const path = window.location.pathname;
      const root = document.getElementById('app-root');
      const hero = document.getElementById('hero-container');
      
      bodyTag.classList.toggle('wallpaper-active', path.includes('/arts/view/'));

      document.querySelectorAll('.nav-link').forEach(link => {
        const href = link.getAttribute('href');
        link.classList.toggle('active', path === href || (href !== '/' && path.startsWith(href)));
      });

      if (path === '/' || path === '/about/' || path === '/contact/') {
        hero.style.display = 'grid';
        root.innerHTML = '';
        const pageKey = path === '/contact/' ? 'contact' : 'welcome';
        const page = siteData.pages[pageKey];
        if (page) {
          document.getElementById('hero-image').src = path === '/contact/' ? HERO_CONTACT : HERO_HOME;
          document.getElementById('hero-target').innerHTML = `
            <span class="section-label">${pageKey}</span>
            <h2>${page.title}</h2>
            ${page.html}
            ${path === '/contact/' ? renderContactForm() : ''}
          `;
        }
      } else {
        hero.style.display = 'none';
        if (path === '/arts/') renderGallery(root);
        else if (path.includes('/arts/view/')) renderEntryView(path.split('/').pop(), root);
        else if (path === '/skills/') renderPageContent('skills', root);
        else if (path === '/resume/') renderPageContent('resume', root);
        else render404(root);
      }

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderPageContent(key, root) {
      const page = siteData.pages[key];
      if (!page) return render404(root);
      root.innerHTML = `
        <div class="text-content">
          <span class="section-label">${key}</span>
          <h2>${page.title}</h2>
          <div class="page-body-html">${page.html}</div>
        </div>
      `;
    }

    function renderGallery(root) {
      const filtered = currentFilter === 'all' ? siteData.entries : siteData.entries.filter(e => e.type === currentFilter);
      root.innerHTML = `
        <h2 style="font-family:var(--font-header); font-size:clamp(2rem, 8vw, 3rem); margin-bottom:2rem;">Arts</h2>
        <div class="filter-bar">
          <button class="filter-btn ${currentFilter === 'all' ? 'active' : ''}" onclick="setFilter('all')">All</button>
          <button class="filter-btn ${currentFilter === 'art' ? 'active' : ''}" onclick="setFilter('art')">Art</button>
          <button class="filter-btn ${currentFilter === 'photography' ? 'active' : ''}" onclick="setFilter('photography')">Photography</button>
          <button class="filter-btn ${currentFilter === 'theater' ? 'active' : ''}" onclick="setFilter('theater')">Theater</button>
        </div>
        <div class="arts-grid">
          ${filtered.map(item => `
            <a href="/arts/view/${item.id}" class="art-card" data-link>
              <div class="art-img-wrap"><img src="${item.img}" alt="${item.title}"></div>
              <div class="art-info">
                <span>${item.type}</span>
                <h4>${item.title}</h4>
              </div>
            </a>
          `).join('')}
        </div>
      `;
    }

    function renderEntryView(id, root) {
      const item = siteData.entries.find(e => e.id === id);
      if (!item) return render404(root);

      let extras = '';
      if (item.type === 'art') {
        extras = `
          <span class="section-label">Materials</span>
          <ul class="materials-list">${item.materials.map(m => `<li>${m}</li>`).join('')}</ul>
          <span class="section-label">The Process</span>
          <div class="steps-list">${marked.parse(item.process)}</div>
        `;
      } else if (item.type === 'photography') {
        extras = `
          <span class="section-label">Specifications</span>
          <div class="specs-grid">
            <div class="spec-item"><b>Location</b><span>${item.specs.location}</span></div>
            <div class="spec-item"><b>Camera</b><span>${item.specs.camera}</span></div>
            <div class="spec-item"><b>Lens</b><span>${item.specs.lens}</span></div>
            <div class="spec-item"><b>Settings</b><span>${item.specs.settings}</span></div>
          </div>
        `;
      }

      root.innerHTML = `
        <div class="entry-layout">
          <div class="entry-visual"><img src="${item.img}" alt="${item.title}"></div>
          <div class="entry-details">
            <a href="/arts/" data-link style="font-family:var(--font-mono); font-size:0.7rem; text-transform:uppercase; margin-bottom:2rem; display:block;">← Back to Gallery</a>
            <span class="meta-tag">${item.type}</span>
            <h2>${item.title}</h2>
            <p style="color:var(--muted); margin-bottom:1.5rem;">${item.description}</p>
            ${extras}
          </div>
        </div>
      `;
    }

    function renderContactForm() {
      return `
        <form class="contact-form" onsubmit="event.preventDefault(); this.innerHTML='<h3>Message Sent.</h3>';">
          <div class="form-group"><label>Name</label><input type="text" required></div>
          <div class="form-group"><label>Email</label><input type="email" required></div>
          <div class="form-group"><label>Message</label><textarea rows="5" required></textarea></div>
          <button type="submit" class="submit-btn">Send Message</button>
        </form>
      `;
    }

    function render404(root) { root.innerHTML = `<h2 style="font-family:var(--font-header); font-size:3rem;">404</h2><p>Page missing from archive.</p>`; }

    window.setFilter = (f) => { currentFilter = f; renderGallery(document.getElementById('main-content')); };
    window.navigateTo = (url) => { closeMenu(); history.pushState(null, null, url); renderPage(); };
    window.addEventListener('popstate', renderPage);
    document.body.addEventListener('click', e => {
      const link = e.target.closest('[data-link]');
      if (link) { e.preventDefault(); navigateTo(link.getAttribute('href')); }
    });

    function slugify(text) { return text.toString().toLowerCase().replace(/\s+/g, '-').replace(/[^\w\-]+/g, '').replace(/\-\-+/g, '-').replace(/^-+/, '').replace(/-+$/, ''); }
    window.onload = initApp;
  </script>
</body>
</html>
