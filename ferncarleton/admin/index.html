<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Studio Manager | Fern Carleton</title>
  <!-- Restore the Identity Widget to handle the login popup -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <!-- The main script that builds the dashboard and applies the CMS styling -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    /**
     * MINESCOUT AUTH SYNC
     * This script monitors the login state. Once Fern logs in, 
     * it refreshes the page to reveal the 'Backstage' dashboard.
     */
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>
