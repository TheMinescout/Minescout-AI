# MINESCOUT BACKSTAGE CONFIG (v37.0 - GitHub Native)
backend:
  name: github
  repo: theminescout/ferncarleton # thomas: update this!
  branch: main
  # Proxy service that handles the GitHub login on non-Netlify domains
  base_url: https://github-cms-proxy.herokuapp.com
  auth_endpoint: auth

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "content"
    label: "Site Content"
    delete: false
    editor:
      preview: false
    files:
      - name: "master"
        label: "Master Website Data"
        file: "content/site-data.json"
        fields:
          - label: "Welcome Section"
            name: "welcome"
            widget: "object"
            fields:
              - {label: "Headline", name: "title", widget: "string"}
              - {label: "Intro Text", name: "text", widget: "text"}
              - {label: "Hero Image (URL)", name: "image", widget: "string"}
          
          - label: "About Section"
            name: "about"
            widget: "object"
            fields:
              - {label: "Headline", name: "title", widget: "string"}
              - {label: "Bio Text", name: "text", widget: "text"}
              - {label: "Portrait (URL)", name: "image", widget: "string"}

          - label: "Photography Gallery"
            name: "photos"
            widget: "list"
            fields:
              - {label: "Photo Title", name: "title", widget: "string"}
              - {label: "Image (URL)", name: "url", widget: "string"}

          - label: "Skills Grid"
            name: "skills"
            widget: "list"
            fields:
              - {label: "Category Name", name: "label", widget: "string"}
              - {label: "Details", name: "content", widget: "text"}

          - label: "Resume Grid"
            name: "resume"
            widget: "list"
            fields:
              - {label: "Year/Category", name: "label", widget: "string"}
              - {label: "Experience Details", name: "content", widget: "text"}
          
          - label: "Contact Section"
            name: "contact"
            widget: "object"
            fields:
              - {label: "Headline", name: "title", widget: "string"}
              - {label: "Text", name: "text", widget: "text"}