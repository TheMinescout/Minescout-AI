<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

  <style>
    /* --- SOGGYMALK32 CORE STYLES (PERSISTENT LAYER) --- */
    :root { 
      --neon-green: #0f0; 
      --neon-red: #f00;
      --neon-pink: #ff5fa2;
      --neon-dark: #111; 
    }
    
    * { cursor: none !important; box-sizing: border-box; }

    body {
      margin: 0; padding: 0; background: black; color: #fff;
      font-family: 'Courier New', monospace; overflow-x: hidden;
      animation: flicker 2s infinite; position: relative;
    }

    /* VHS Persistent Overlay */
    .vhs-overlay::before {
      content: ""; position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: repeating-linear-gradient(to bottom, rgba(255,255,255,0.02), rgba(255,255,255,0.02) 1px, transparent 1px, transparent 2px);
      pointer-events: none; z-index: 1000;
    }

    /* SPA Content Mount */
    #spa-content { min-height: 100vh; transition: opacity 0.4s ease; }

    /* Custom Cursor - FIXED Z-INDEX */
    .custom-cursor {
      position: fixed; top: 0; left: 0; width: 16px; height: 16px; border-radius: 50%;
      background: rgba(0, 255, 0, 0.7); pointer-events: none; transform: translate(-50%, -50%);
      transition: width 0.2s, height 0.2s, background 0.2s; z-index: 100000; mix-blend-mode: difference;
    }
    .custom-cursor.grow { width: 28px; height: 28px; background: rgba(0, 255, 0, 0.4); }

    /* Glitch UI Components */
    .vhs-text { text-shadow: 1px 0 red, -1px 0 blue; }
    .jitter { animation: jitter 0.1s infinite; }
    @keyframes jitter { 0% { transform: translateX(0); } 50% { transform: translateX(1px); } 100% { transform: translateX(0); } }
    
    .flicker-neon {
      text-shadow: 0 0 5px #0f0, 0 0 20px #0f0, 0 0 40px #0f0;
      animation: flicker 2s infinite;
    }

    /* Boxes / Buttons */
    .box-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 50px; max-width: 1000px; margin: 60px auto; padding-bottom: 60px; }
    .box { 
      flex: 0 0 calc(50% - 50px); padding: 120px 20px; background: #111; border: 2px solid var(--neon-green);
      box-shadow: 0 0 10px var(--neon-green); font-family: 'Orbitron', sans-serif; text-align: center;
      transition: transform 0.3s; color: #fff; text-decoration: none; cursor: pointer;
    }
    .box:hover { transform: scale(1.05); background: #1a1a1a; }

    /* Transition Screen */
    .fade-screen { position: fixed; top: -100%; left: 0; width: 100%; height: 100%; background: black; z-index: 99998; transition: top 0.6s cubic-bezier(0.7, 0, 0.3, 1); }
    .fade-screen.active { top: 0; }

    /* Jumpscare Overlay */
    #jumpscareOverlay {
      display: none; position: fixed; inset: 0; background: black; z-index: 99999;
      justify-content: center; align-items: center;
    }
    #jumpscareOverlay img { max-width: 100%; max-height: 100%; }

    /* --- BACKSTAGE DASHBOARD --- */
    #admin-view {
      display: none; position: fixed; inset: 0; background: #000; z-index: 10001;
      padding: 40px; overflow-y: auto; font-family: 'Courier New', monospace;
    }
    .admin-card { max-width: 1100px; margin: 0 auto; border: 2px solid var(--neon-green); background: #111; display: flex; flex-direction: column; height: 85vh; }
    .admin-header { border-bottom: 2px solid var(--neon-green); padding: 20px; display: flex; justify-content: space-between; align-items: center; }
    .admin-main { display: grid; grid-template-columns: 240px 1fr; flex: 1; overflow: hidden; }
    .admin-sidebar { border-right: 1px solid #333; overflow-y: auto; padding: 20px; background: #000; }
    .admin-tab { 
      width: 100%; padding: 12px; text-align: left; background: none; border: 1px solid #222; 
      color: #666; cursor: pointer; margin-bottom: 8px; font-size: 0.75rem; font-weight: bold;
    }
    .admin-tab.active { color: var(--neon-green); border-color: var(--neon-green); background: rgba(0,255,0,0.05); }
    .admin-body { padding: 30px; overflow-y: auto; position: relative; }
    
    .html-editor { width: 100%; height: 85%; background: #050505; color: var(--neon-green); border: 1px solid #333; padding: 20px; font-family: 'Space Mono', monospace; font-size: 0.85rem; resize: none; outline: none; }
    .save-btn { background: var(--neon-green); color: black; border: none; padding: 12px 25px; font-weight: 700; cursor: pointer; text-transform: uppercase; }
    .save-btn:hover { background: #fff; }
    
    .add-page-btn { width: 100%; padding: 10px; border: 1px dashed #444; background: none; color: #444; font-size: 0.65rem; text-transform: uppercase; cursor: pointer; margin-top: 10px; }
    .add-page-btn:hover { color: #fff; border-color: #fff; }

    /* Launcher Specifics */
    .game-list { height: 300px; overflow-y: auto; margin-top: 10px; border: 2px solid var(--neon-pink); padding: 10px; background: rgba(0,0,0,0.4); }
    .game-item { padding: 10px; border-bottom: 1px solid rgba(255,95,162,0.3); cursor: pointer; font-weight: bold; color: #444; font-size: 0.9rem; transition: 0.2s; }
    .game-item:hover { background: var(--neon-pink); color: white; padding-left: 20px; }

    @keyframes flicker { 0%,100%{opacity:1;} 49%{opacity:0.95;} 50%{opacity:1;} 51%{opacity:0.97;} 52%{opacity:0.9;} }
  </style>
</head>

    let activeAdminTab = 'home';
    let adminSecret = "";

    /* --- SPA ENGINE --- */
    function navigateTo(pageKey) {
      const fade = document.getElementById('fade');
      fade.classList.add('active');

      setTimeout(() => {
        renderView(pageKey);
        fade.classList.remove('active');
      }, 600);
    }

    function renderView(pageKey) {
      const root = document.getElementById('spa-content');
      const content = siteData.pages[pageKey] || siteData.pages['home'];
      
      root.innerHTML = content.html;
      
      const cursor = document.getElementById('customCursor');
      cursor.style.background = content.cursorColor || 'rgba(0, 255, 0, 0.7)';
      
      window.location.hash = pageKey;
      addHoverListeners();
      window.scrollTo(0,0);
      
      if(pageKey === 'silly') initGameLauncher();
    }

    /* --- SYNC LOGIC --- */
    async function initApp() {
      try {
        const res = await fetch(BACKEND_URL, { headers: { 'X-Site-Id': SITE_ID } });
        if(res.ok) {
          const d = await res.json();
          if (d && d.pages) siteData = d;
        }
      } catch (e) { console.warn("Minescout: Standalone Mode."); }
      
      const startHash = window.location.hash.replace('#', '') || 'home';
      renderView(startHash);
    }

    /* --- ADMIN INTERFACE --- */
    document.addEventListener('keydown', e => {
      if(e.shiftKey && e.key.toLowerCase() === 'j') {
        document.getElementById('admin-view').style.display = 'block';
      }
    });

    function closeAdmin() { document.getElementById('admin-view').style.display = 'none'; }

    function unlockDashboard() {
      adminSecret = document.getElementById('admin-pass').value;
      document.getElementById('admin-auth').style.display = 'none';
      document.getElementById('admin-dashboard').style.display = 'grid';
      renderAdminTabs();
      loadPageToEditor('home');
    }

    function renderAdminTabs() {
      const container = document.getElementById('admin-tabs');
      container.innerHTML = Object.keys(siteData.pages).map(key => `
        <button class="admin-tab ${activeAdminTab === key ? 'active' : ''}" onclick="loadPageToEditor('${key}')">${key.toUpperCase()}</button>
      `).join('');
    }

    function loadPageToEditor(key) {
      if(activeAdminTab) {
        siteData.pages[activeAdminTab].html = document.getElementById('html-editor').value;
      }
      activeAdminTab = key;
      document.getElementById('editor-label').innerText = `Editing: ${key}`;
      document.getElementById('html-editor').value = siteData.pages[key].html;
      renderAdminTabs();
    }

    function addNewPage() {
      const name = prompt("Enter unique Page ID (e.g. downloads):");
      if(!name) return;
      const key = slugify(name);
      siteData.pages[key] = { html: "<h1 class='flicker-neon'>New Node</h1><button class='box' onclick='navigateTo(\"home\")'>Home</button>" };
      renderAdminTabs();
      loadPageToEditor(key);
    }

    async function saveToBackend() {
      siteData.pages[activeAdminTab].html = document.getElementById('html-editor').value;
      const status = document.getElementById('sync-status');
      status.innerText = "Transmitting...";

      try {
        const res = await fetch(BACKEND_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Site-Id': SITE_ID },
          body: JSON.stringify({ key: adminSecret, data: siteData })
        });
        if (res.ok) {
          status.innerText = "Production Sync Success";
          renderView(activeAdminTab);
        } else {
          status.innerText = "Auth Rejected";
        }
      } catch (e) { status.innerText = "Server Error"; }
      setTimeout(() => status.innerText = "Ready", 3000);
    }

    const pusher = new Pusher('c5084903d87f528f8aa4', { cluster: 'us2', forceTLS: true });
    pusher.subscribe('global-jumpscare').bind('trigger-jumpscare', showJumpscare);

    function showJumpscare() {
      const overlay = document.getElementById('jumpscareOverlay');
      const audio = document.getElementById('jumpscareAudio');
      overlay.style.display = 'flex';
      audio.currentTime = 0; audio.play();
      setTimeout(() => { overlay.style.display = 'none'; audio.pause(); }, 3000);
    }

    const cursor = document.getElementById('customCursor');
    let mX=0, mY=0, cX=0, cY=0;
    document.addEventListener('mousemove', e => { mX=e.clientX; mY=e.clientY; });
    function animateCursor(){ 
      cX += (mX-cX)*0.15; cY += (mY-cY)*0.15;
      cursor.style.left=cX+'px'; cursor.style.top=cY+'px';
      requestAnimationFrame(animateCursor);
    }
    animateCursor();

    function addHoverListeners(){
      document.querySelectorAll('.box, button, a, .game-item').forEach(el => {
        el.onmouseenter = () => cursor.classList.add('grow');
        el.onmouseleave = () => cursor.classList.remove('grow');
      });
    }

    function slugify(t) { return t.toLowerCase().replace(/\s+/g, '-').replace(/[^\w\-]+/g, ''); }

    /* --- CHAOS LAUNCHER PORT --- */
    function initGameLauncher() {

              style="width:100%; padding:12px 18px; margin: 20px 0; border:3px dashed var(--neon-pink); border-radius:15px; outline:none; font-family:inherit;">
            
            <div class="game-list" id="game-results"></div>
            
            <button class="box" onclick="navigateTo('home')" 
              style="width:100%; border:none; background:var(--neon-pink); color:white; padding:12px; border-radius:10px; margin-top:20px; height:auto; font-size:0.8rem; box-shadow:none;">
              BACK_TO_SAFETY
            </button>
          </div>
        </div>
      `;

      const searchInput = document.getElementById('game-search');
      searchInput.addEventListener('input', (e) => renderGames(e.target.value.toLowerCase()));
      renderGames();
    }

    function cleanName(p){
      let parts = p.split("/");
      let n = parts.at(-1) === "index.html" ? parts.at(-2) : parts.at(-1).replace(".html","");
      return n.replace(/[-_]/g," ").replace(/\b\w/g, c => c.toUpperCase());
    }

    function renderGames(filter = "") {
      const listEl = document.getElementById('game-results');
      if(!listEl) return;
      
      listEl.innerHTML = "";
      const filtered = siteData.games.filter(g => cleanName(g).toLowerCase().includes(filter));
      
      if(filtered.length === 0) {
        listEl.innerHTML = "<p style='text-align:center; color:#999; padding-top:20px;'>Nothing found in the void.</p>";
        return;
      }

      filtered.forEach(path => {
        const item = document.createElement("div");
        item.className = "game-item";
        item.textContent = cleanName(path);
        item.onclick = () => {
          window.location.href = path; // Launch the actual game page
        };
        listEl.appendChild(item);
      });
      addHoverListeners();
    }

    window.onload = initApp;
  </script>
</body>
</html>
